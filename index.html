<head>
<meta charset="UTF-8">
<title>Tap N Pray – Verse of the Day</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter', sans-serif;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100vh;
    text-align:center;
    opacity:0;
    animation:bgFadeIn 1.5s ease forwards;
}
@keyframes bgFadeIn {
    from { opacity:0; }
    to { opacity:1; }
}
body::before {
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.55));
    z-index:-2;
}
body::after {
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    backdrop-filter: blur(4px);
    z-index:-1;
}
</style>
</head>
<body>

<div class="logo-container">
    <img src="logo.svg" alt="Tap N Pray Logo">
    <div class="tagline">One Tap Closer to Christ</div>
</div>

<div class="center-container">

    <div id="votd-header">
        Verse of the Day - <span id="todays-date"></span>
    </div>

    <div id="votd-container">
        <div id="verse-text">Loading daily verse...</div>
        <div id="verse-ref"></div>
    </div>

    <div class="translation">
        Translation:
        <select onchange="changeTranslation(this.value)">
            <option value="kjv">KJV</option>
            <option value="niv">NIV</option>
            <option value="nlt" selected>NLT</option>
        </select>
    </div>

    <div class="action-buttons">
        <button class="btn" onclick="playVerse()">Listen</button>
        <button class="btn" onclick="copyVerse()">Copy</button>
        <button class="btn" onclick="shareVerse()">Share</button>
        <button class="btn" onclick="shareVerseAsImage()">Share as Image</button>
    </div>

    <div id="listen-status">Using your device’s best devotional voice…</div>

    <div id="daily-prayer-container">
        <button class="btn" id="daily-prayer-toggle" onclick="toggleDailyPrayer()">Show Daily Prayer</button>
        <div id="daily-prayer"></div>
    </div>

    <div id="tap-streak">Tap Streak: Loading...</div>

</div>
<script>
// MAIN SITE BACKGROUNDS
const backgrounds = [
  "backgrounds/Background1.png",
  "backgrounds/Background2.png",
  "backgrounds/Background3.png"
];

function setRandomBackground() {
  const randomBackground = backgrounds[Math.floor(Math.random() * backgrounds.length)];
  document.body.style.backgroundImage = `url('${randomBackground}')`;
}

setRandomBackground();
/* ---------------------------------------------
   VERSE SYSTEM + BIBLE LOADING
--------------------------------------------- */

let verses = { kjv:{}, niv:{}, nlt:{} };
let dailyKey = "";
let translation = "nlt";

function flattenJSON(json){
    let flat = {};
    for (const book in json) {
        const chapters = json[book];
        for (const chapterNum in chapters) {
            const versesObj = chapters[chapterNum];
            for (const verseNum in versesObj) {
                const ref = `${book} ${chapterNum}:${verseNum}`;
                flat[ref] = versesObj[verseNum];
            }
        }
    }
    return flat;
}

async function loadTranslation(trans, url){
    const res = await fetch(url);
    const data = await res.json();
    verses[trans] = flattenJSON(data);
}

function pickDailyVerse(){
    const keys = Object.keys(verses.nlt);
    const date = new Date();
    const seed = date.getUTCFullYear()*10000 +
                 (date.getUTCMonth()+1)*100 +
                 date.getUTCDate();
    dailyKey = keys[seed % keys.length];
}

function displayVerse(){
    document.getElementById("votd-container").classList.add("show");
    document.getElementById("verse-text").innerText =
        verses[translation][dailyKey] || "Verse not available";
    document.getElementById("verse-ref").innerText =
        `${dailyKey} (${translation.toUpperCase()})`;
}

function changeTranslation(val){
    translation = val;
    displayVerse();
}

function displayTodaysDate(){
    const today = new Date();
    const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById("todays-date").innerText =
        today.toLocaleDateString('en-US', options);
}
</script>
<script>
/* ---------------------------------------------
   SHARE AS IMAGE SYSTEM (fixed + isolated)
--------------------------------------------- */

/* Share-image backgrounds (new naming structure) */
const shareBackgrounds = [
    "share-backgrounds/bg1.jpg",
    "share-backgrounds/bg2.jpg",
    "share-backgrounds/bg3.jpg"
];

/* Wrap text for canvas */
function wrapText(ctx, text, maxWidth) {
    const words = text.split(" ");
    const lines = [];
    let line = "";

    for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n] + " ";
        const metrics = ctx.measureText(testLine);
        const testWidth = metrics.width;

        if (testWidth > maxWidth && n > 0) {
            lines.push(line.trim());
            line = words[n] + " ";
        } else {
            line = testLine;
        }
    }

    lines.push(line.trim());
    return lines;
}

/* Share verse as image */
async function shareVerseAsImage() {

    // Pick a random share background
    const bg = shareBackgrounds[Math.floor(Math.random() * shareBackgrounds.length)];

    // Load image
    const img = new Image();
    img.src = bg;
    await img.decode();

    // Create canvas
    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1920;
    const ctx = canvas.getContext("2d");

    // Draw background
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    // Verse text
    const verse = document.getElementById("verse-text").innerText;
    const ref = document.getElementById("verse-ref").innerText;

    ctx.fillStyle = "white";
    ctx.font = "48px Inter";
    ctx.textAlign = "center";

    const lines = wrapText(ctx, verse, 900);
    let y = 700;

    lines.forEach(line => {
        ctx.fillText(line, canvas.width / 2, y);
        y += 60;
    });

    // Reference
    ctx.font = "40px Inter";
    ctx.fillText(ref, canvas.width / 2, y + 40);

    // Share
    canvas.toBlob(blob => {
        const file = new File([blob], "tapnpray_verse.jpg", { type: "image/jpeg" });
        navigator.share({
            files: [file],
            title: "Verse of the Day",
            text: "Shared from Tap N Pray"
        });
    });
}
</script>
</body>
</html>
