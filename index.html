<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Arial,sans-serif;color:#fff;
 background-size:cover;background-position:center;
 transition:background-image 1.5s ease-in-out;
}

.center{
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:20px;
}

#votd{
 position:relative;
 background:rgba(0,0,0,.6);
 backdrop-filter:blur(25px);
 border-radius:28px;
 padding:20px;
 max-width:520px;width:100%;
 max-height:75vh;
 display:flex;
 flex-direction:column;
 text-align:center;
}

/* TEXT */
#verse{
 font-size:clamp(22px,5vw,30px);
 line-height:1.6;
 overflow-y:auto;
}
.word{opacity:.35;transition:.2s;}
.word.active{opacity:1;}

#title{font-size:14px;opacity:.85;}
#date{color:#108cd7;font-size:13px;}
#ref{color:#108cd7;margin-top:6px;font-size:13px;}

/* ICONS */
#favoriteStar{position:absolute;top:12px;left:12px;cursor:pointer;}
#ambientToggle{position:absolute;top:12px;right:12px;cursor:pointer;}
#ambientToggle.active{color:#7CFFB2;}

/* TRANSLATION */
.translation-select{
 margin-top:6px;
 padding:3px 8px;
 font-size:11px;
 border-radius:999px;
 border:none;
 background:rgba(255,255,255,.15);
 color:#fff;
}

/* BUTTONS */
.mode-buttons{
 display:flex;
 gap:10px;
 margin-top:12px;
}
.mode-buttons button{
 flex:1;
 padding:10px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,.15);
 color:#fff;
}
.mode-buttons button.active{background:#108cd7;}

.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;margin-top:10px;
}
.btn{
 padding:10px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;
}
.primary{background:#108cd7}

/* FAVORITES */
#favoritesModal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.95);
 display:none;overflow:auto;padding:20px;
}
.favorite-item{
 background:rgba(255,255,255,.1);
 padding:12px;margin-bottom:10px;
 border-radius:10px;
}

/* STREAK */
#streak{
 position:fixed;bottom:25px;left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:6px 14px;border-radius:999px;
}
</style>
</head>

<body>

<div class="center">
<div id="votd">

<div id="favoriteStar" onclick="toggleFavorite()">☆</div>
<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="title">Daily Bible Verse</div>
<div id="date"></div>
<div id="verse"></div>
<div id="ref"></div>

<select id="translationSelect" class="translation-select">
<option value="nlt">NLT</option>
<option value="niv">NIV</option>
<option value="kjv">KJV</option>
</select>

<div class="mode-buttons">
<button id="dailyBtn" class="active" onclick="showDaily()">Daily</button>
<button id="randomBtn" onclick="showRandom()">Random</button>
</div>

<div class="actions">
<button class="btn primary" onclick="readVerse()">Read</button>
<button class="btn" onclick="openFavorites()">Favorites</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="streak"></div>

<div id="favoritesModal" onclick="closeFavorites(event)">
<div id="favoritesContent"></div>
</div>

<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>

<script>

/* BACKGROUNDS */
const bgSets={
 morning:["/backgrounds/morning1.png","/backgrounds/morning2.png"],
 day:["/backgrounds/day1.png","/backgrounds/day2.png"],
 evening:["/backgrounds/evening1.png","/backgrounds/evening2.png"],
 night:["/backgrounds/night1.png","/backgrounds/night2.png"]
};
let bgIndex=0;

function getTimeBlock(){
 const h=new Date().getHours();
 if(h>=5&&h<11) return "morning";
 if(h>=11&&h<17) return "day";
 if(h>=17&&h<21) return "evening";
 return "night";
}

function updateBackground(){
 const set=bgSets[getTimeBlock()];
 document.body.style.backgroundImage=`url('${set[bgIndex%set.length]}')`;
 bgIndex++;
}
updateBackground();
setInterval(updateBackground,60000);

/* VERSES */
let verses={nlt:{},niv:{},kjv:{}};
let translation="nlt";
let dailyKey="",currentKey="";
let mode="daily";

/* LOAD */
async function loadTranslation(t){
 if(Object.keys(verses[t]).length) return;
 const res=await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 const data=await res.json();

 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    verses[t][`${b} ${c}:${v}`]=data[b][c][v];
}

/* DAILY */
function getSeed(str){let h=0;for(let i=0;i<str.length;i++){h=(h<<5)-h+str.charCodeAt(i);h|=0;}return Math.abs(h);}
function generateDaily(){
 const today=new Date().toDateString();
 const stored=JSON.parse(localStorage.getItem("dailyVerse")||"{}");

 if(stored.date===today){
  dailyKey=stored.key;
 }else{
  const keys=Object.keys(verses["nlt"]);
  dailyKey=keys[getSeed(today)%keys.length];
  localStorage.setItem("dailyVerse",JSON.stringify({date:today,key:dailyKey}));
 }

 currentKey=dailyKey;
 update("Daily Bible Verse");
 streak();
}

/* BUTTONS */
function showDaily(){
 mode="daily";
 currentKey=dailyKey;
 setActive("dailyBtn");
 update("Daily Bible Verse");
}
function showRandom(){
 mode="random";
 const keys=Object.keys(verses[translation]);
 currentKey=keys[Math.floor(Math.random()*keys.length)];
 setActive("randomBtn");
 update("Random Verse");
}
function setActive(id){
 document.getElementById("dailyBtn").classList.remove("active");
 document.getElementById("randomBtn").classList.remove("active");
 document.getElementById(id).classList.add("active");
}

/* UPDATE */
function update(title){
 const text=verses[translation][currentKey];
 if(!text) return;

 document.getElementById("title").innerText=title;
 document.getElementById("verse").innerHTML=
  text.split(" ").map(w=>`<span class="word">${w}</span>`).join(" ");
 document.getElementById("ref").innerText=currentKey;
 document.getElementById("date").innerText=new Date().toDateString();
}

/* READ */
function readVerse(){
 const words=document.querySelectorAll(".word");
 words.forEach(w=>w.classList.remove("active"));

 let i=0;
 const utter=new SpeechSynthesisUtterance(
  verses[translation][currentKey] + " " + currentKey
 );

 utter.onboundary=e=>{
  if(e.name==="word"&&words[i]){
   words[i].classList.add("active");i++;
  }
 };

 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* AMBIENT */
let ambientOn=false;
function toggleAmbient(){
 const a=document.getElementById("ambientAudio");

 if(ambientOn){
  fadeOut(a);
 }else{
  a.volume=0;
  a.play();
  fadeIn(a);
 }

 ambientOn=!ambientOn;
 document.getElementById("ambientToggle").classList.toggle("active");
}

function fadeIn(a){
 let v=0;
 const i=setInterval(()=>{
  v+=0.05;
  if(v>=0.3){v=0.3;clearInterval(i);}
  a.volume=v;
 },100);
}

function fadeOut(a){
 let v=a.volume;
 const i=setInterval(()=>{
  v-=0.05;
  if(v<=0){
   v=0;clearInterval(i);
   a.pause();a.currentTime=0;
  }
  a.volume=v;
 },100);
}

/* FAVORITES */
function getFavs(){return JSON.parse(localStorage.getItem("favs")||"[]");}
function toggleFavorite(){
 let f=getFavs();
 f.includes(currentKey)?f=f.filter(x=>x!==currentKey):f.push(currentKey);
 localStorage.setItem("favs",JSON.stringify(f));
 document.getElementById("favoriteStar").innerText=f.includes(currentKey)?"⭐":"☆";
}
function openFavorites(){
 let c=document.getElementById("favoritesContent");
 c.innerHTML="<h2>Saved</h2>";
 getFavs().forEach(ref=>{
  c.innerHTML+=`<div class="favorite-item"><b>${ref}</b><br>${verses[translation][ref]}
  <br><button onclick="removeFav('${ref}')">Delete</button></div>`;
 });
 document.getElementById("favoritesModal").style.display="block";
}
function removeFav(ref){
 let f=getFavs().filter(x=>x!==ref);
 localStorage.setItem("favs",JSON.stringify(f));
 openFavorites();
}
function closeFavorites(e){
 if(e.target.id==="favoritesModal")
 document.getElementById("favoritesModal").style.display="none";
}

/* SHARE */
async function shareVerse(){
 const canvas=document.createElement("canvas");
 canvas.width=1080;canvas.height=1080;
 const ctx=canvas.getContext("2d");

 ctx.fillStyle="#000";ctx.fillRect(0,0,1080,1080);

 ctx.fillStyle="rgba(255,255,255,.08)";
 ctx.fillRect(140,260,800,520);

 ctx.fillStyle="#fff";
 ctx.font="40px Arial";
 ctx.textAlign="center";

 wrapText(ctx,verses[translation][currentKey],540,350,640,50);

 ctx.fillStyle="#108cd7";
 ctx.fillText(currentKey,540,700);

 canvas.toBlob(b=>{
  const file=new File([b],"verse.png",{type:"image/png"});
  navigator.share?.({files:[file]});
 });
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
 const words=text.split(' ');
 let line='';
 for(let n=0;n<words.length;n++){
  const test=line+words[n]+' ';
  const w=ctx.measureText(test).width;
  if(w>maxWidth&&n>0){
   ctx.fillText(line,x,y);
   line=words[n]+' ';
   y+=lineHeight;
  }else line=test;
 }
 ctx.fillText(line,x,y);
}

/* UTIL */
function copyVerse(){
 navigator.clipboard.writeText(verses[translation][currentKey]+" — "+currentKey);
}
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

/* INIT */
async function init(){
 await loadTranslation("nlt");
 await loadTranslation("niv");
 await loadTranslation("kjv");

 document.getElementById("translationSelect").onchange=(e)=>{
  translation=e.target.value;
  update(document.getElementById("title").innerText);
 };

 generateDaily();
}

init();

</script>
</body>
</html>
