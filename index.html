<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  color: #fff;
  padding-bottom: env(safe-area-inset-bottom);
  padding-top: env(safe-area-inset-top);
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-size: cover;
  background-position: center;
  background-image: var(--bg-image);
  filter: brightness(var(--brightness)) blur(2px);
  transform: scale(1.05);
  transition: filter 1s ease;
  z-index: -1;
}

@media (max-width: 600px) {
  body::before {
    transform: scale(1.03);
    filter: brightness(var(--brightness)) blur(1.5px);
  }
}

/* LAYOUT */
.center {
  min-height: 100vh;
  display: flex;
  align-items: stretch;
  justify-content: center;
  padding: 16px;
  box-sizing: border-box;
}

/* BIG VERSE BOX */
#votd {
  position: relative;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 20px 20px 16px;
  max-width: 800px;
  width: 100%;
  max-height: 100%;
  display: flex;
  flex-direction: column;
  text-align: center;
  overflow: hidden;
}

/* ICONS */
#readIcon, #ambientToggle {
  position: absolute;
  top: 10px;
  font-size: 26px;
  padding: 8px;
  cursor: pointer;
}

#readIcon { left: 10px; }
#ambientToggle { right: 10px; }

#readIcon.speaking { animation: pulse 1s infinite; }
@keyframes pulse { 50% { transform: scale(1.2); } }

#ambientToggle.active { color: #7CFFB2; }

/* TEXT */
#title {
  font-size: 15px;
  margin-top: 6px;
}

#date, #ref {
  color: #108cd7;
  font-size: 14px;
}

#verse {
  margin-top: 10px;
  font-size: clamp(22px, 5vw, 32px);
  line-height: 1.7;
  overflow-y: auto;
  cursor: pointer;
  -webkit-overflow-scrolling: touch;
  word-wrap: break-word;
  flex: 1;
}

.word { opacity: .35; }
.word.active { opacity: 1; }

/* CONTROLS */
.translation-select {
  margin-top: 8px;
  border-radius: 999px;
  background: rgba(255,255,255,.15);
  color: #fff;
  border: none;
  padding: 4px 10px;
}

.mode-buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.mode-buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 999px;
  border: none;
  background: rgba(255,255,255,.15);
  color: #fff;
  font-size: 14px;
}

.mode-buttons button.active { background: #108cd7; }

.actions {
  margin-top: 10px;
}

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 999px;
  background: #108cd7;
  color: #fff;
  font-size: 15px;
}

/* STREAK */
#streak {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.6);
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
  font-size: 14px;
}

/* MODAL */
#streakModal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,.95);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow-y: auto;
  padding: 20px;
  box-sizing: border-box;
}

.badges {
  display: flex;
  gap: 15px;
  margin: 20px;
}

.badge { opacity: .3; font-size: 28px; }
.badge.active { opacity: 1; }

.progress {
  width: 80%;
  max-width: 400px;
  height: 10px;
  background: rgba(255,255,255,.2);
  border-radius: 999px;
}

.progress div {
  height: 100%;
  background: #108cd7;
  border-radius: 999px;
}
</style>
</head>

<body>

<div class="center">
  <div id="votd">

    <div id="readIcon" onclick="readVerse()">🔊</div>
    <div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

    <div id="title">Daily Bible Verse</div>
    <div id="date"></div>
    <div id="verse" onclick="readVerse()"></div>
    <div id="ref"></div>

    <select id="translationSelect" class="translation-select" onchange="changeTranslation(this.value)">
      <option value="nlt">NLT</option>
      <option value="niv">NIV</option>
      <option value="kjv">KJV</option>
    </select>

    <div class="mode-buttons">
      <button id="dailyBtn" class="active" onclick="showDaily()">Daily</button>
      <button id="randomBtn" onclick="showRandom()">Random</button>
    </div>

    <div class="actions">
      <button class="btn" onclick="shareVerse()">Share</button>
    </div>

  </div>
</div>

<div id="streak" onclick="openStreak()"></div>

<div id="streakModal" onclick="closeStreak(event)">
  <h1 id="streakCount"></h1>
  <div id="streakMsg"></div>

  <div class="badges">
    <span class="badge" id="b7">🌿</span>
    <span class="badge" id="b30">🔥</span>
    <span class="badge" id="b100">👑</span>
  </div>

  <div class="progress"><div id="progressBar"></div></div>
</div>

<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>

<script>
/* BACKGROUND */
const bgSets = {
  morning: ["/backgrounds/morning1.png","/backgrounds/morning2.png"],
  day: ["/backgrounds/day1.png","/backgrounds/day2.png"],
  evening: ["/backgrounds/evening1.png","/backgrounds/evening2.png"],
  night: ["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let currentBackground = "";
let currentBrightness = 1.0;

function getTimeBlock() {
  const h = new Date().getHours();
  if (h < 11) return "morning";
  if (h < 17) return "day";
  if (h < 21) return "evening";
  return "night";
}

function updateBackground() {
  const block = getTimeBlock();
  const set = bgSets[block];
  const img = set[Math.floor(Math.random() * set.length)];
  currentBackground = img;

  const brightness = (block === "night" || block === "evening") ? 0.75 : 1.0;
  currentBrightness = brightness;

  document.body.style.setProperty('--bg-image', `url('${img}')`);
  document.body.style.setProperty('--brightness', brightness);
}

updateBackground();

/* VERSES */
let verses = { nlt:{}, niv:{}, kjv:{} };
let translation = "nlt", dailyKey = "", currentKey = "";

async function loadTranslation(t) {
  try {
    const res = await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    if (!res.ok) return;
    const data = await res.json();

    Object.entries(data).forEach(([book, chapters]) => {
      Object.entries(chapters).forEach(([chapter, versesObj]) => {
        Object.entries(versesObj).forEach(([v, text]) => {
          verses[t][`${book} ${chapter}:${v}`] = text;
        });
      });
    });
  } catch {}
}

function getSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = (h << 5) - h + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function generateDaily() {
  const today = new Date().toDateString();
  const stored = JSON.parse(localStorage.getItem("dailyVerse") || "{}");

  if (stored.date === today) {
    dailyKey = stored.key;
  } else {
    const keys = Object.keys(verses.nlt);
    if (!keys.length) return;
    dailyKey = keys[getSeed(today) % keys.length];
    localStorage.setItem("dailyVerse", JSON.stringify({ date: today, key: dailyKey }));
  }

  currentKey = dailyKey;
  update("Daily Bible Verse");
  updateStreak();
}

function showDaily() {
  currentKey = dailyKey;
  update("Daily Bible Verse");
  document.getElementById("dailyBtn").classList.add("active");
  document.getElementById("randomBtn").classList.remove("active");
}

function showRandom() {
  const keys = Object.keys(verses[translation]);
  if (!keys.length) return;
  currentKey = keys[Math.floor(Math.random() * keys.length)];
  update("Random Bible Verse");
  document.getElementById("dailyBtn").classList.remove("active");
  document.getElementById("randomBtn").classList.add("active");
}

function changeTranslation(t) {
  translation = t;
  if (!verses[translation][currentKey]) {
    const keys = Object.keys(verses[translation]);
    if (!keys.length) return;
    currentKey = keys[0];
  }
  update(document.getElementById("dailyBtn").classList.contains("active") ? "Daily Bible Verse" : "Random Bible Verse");
}

function update(titleText) {
  const text = verses[translation][currentKey];
  if (!text) return;
  document.getElementById("title").innerText = titleText;
  document.getElementById("verse").innerHTML =
    text.split(" ").map(w => `<span class="word">${w}</span>`).join(" ");
  document.getElementById("ref").innerText = currentKey;
  document.getElementById("date").innerText = new Date().toDateString();
}

/* REAL DAILY STREAK SYSTEM */
function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = localStorage.getItem("lastVisit");
  let streak = parseInt(localStorage.getItem("streak")) || 1;

  if (lastVisit) {
    const last = new Date(lastVisit);
    const now = new Date(today);
    const diff = Math.floor((now - last) / (1000 * 60 * 60 * 24));

    if (diff === 1) streak++;
    else if (diff > 1) streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastVisit", today);

  document.getElementById("streak").innerText = "🔥 " + streak + " Day Streak";
  document.getElementById("streakCount").innerText = streak + " Days";

  document.getElementById("b7").classList.toggle("active", streak >= 7);
  document.getElementById("b30").classList.toggle("active", streak >= 30);
  document.getElementById("b100").classList.toggle("active", streak >= 100);

  document.getElementById("progressBar").style.width = Math.min(100, (streak / 100 * 100)) + "%";
}

function openStreak() {
  document.getElementById("streakModal").style.display = "flex";
}

function closeStreak(e) {
  if (e.target === e.currentTarget)
    document.getElementById("streakModal").style.display = "none";
}

/* READ */
function readVerse() {
  const words = document.querySelectorAll(".word");
  words.forEach(w => w.classList.remove("active"));
  let i = 0;

  const text = verses[translation][currentKey];
  if (!text) return;

  const u = new SpeechSynthesisUtterance(text + " " + currentKey);
  u.onboundary = () => {
    if (words[i]) words[i++].classList.add("active");
  };

  try {
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch {}
}

/* AMBIENT */
let ambientOn = false;

function toggleAmbient() {
  const a = document.getElementById("ambientAudio");
  if (ambientOn) fadeOut(a);
  else {
    a.volume = 0;
    a.play().catch(()=>{});
    fadeIn(a);
  }
  ambientOn = !ambientOn;
  document.getElementById("ambientToggle").classList.toggle("active");
}

function fadeIn(a) {
  let v = 0;
  const i = setInterval(() => {
    v += .05;
    if (v >= .3) { v = .3; clearInterval(i); }
    a.volume = v;
  }, 100);
}

function fadeOut(a) {
  let v = a.volume;
  const i = setInterval(() => {
    v -= .05;
    if (v <= 0) { clearInterval(i); a.pause(); a.currentTime = 0; }
    a.volume = v;
  }, 100);
}

/* PREMIUM SHARE: SQUARE IMAGE 1080x1080 */
function wrapTextAutoFit(ctx, text, x, y, maxWidth, lineHeight, maxHeight, baseFontSize) {
  let fontSize = baseFontSize;
  const minFontSize = 26;
  const lines = [];

  function computeLines(size) {
    ctx.font = `bold ${size}px Georgia`;
    const words = text.split(" ");
    const tempLines = [];
    let line = "";

    for (let n = 0; n < words.length; n++) {
      const testLine = line ? line + " " + words[n] : words[n];
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && n > 0) {
        tempLines.push(line);
        line = words[n];
      } else {
        line = testLine;
      }
    }
    if (line) tempLines.push(line);
    return tempLines;
  }

  while (fontSize >= minFontSize) {
    const tempLines = computeLines(fontSize);
    const totalHeight = tempLines.length * lineHeight;
    if (totalHeight <= maxHeight) {
      lines.length = 0;
      lines.push(...tempLines);
      break;
    }
    fontSize -= 2;
  }

  ctx.font = `bold ${fontSize}px Georgia`;
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], x, y + (i * lineHeight));
  }
}

async function shareVerse() {
  try {
    const verseText = verses[translation][currentKey];
    if (!verseText || !currentBackground) return;

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;
    const ctx = canvas.getContext("2d");

    // Background
    const bg = new Image();
    bg.crossOrigin = "anonymous";
    bg.src = currentBackground;
    await new Promise(res => { bg.onload = res; bg.onerror = res; });

    ctx.filter = `brightness(${currentBrightness})`;
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);
    ctx.filter = "none";

    // Verse panel
    const panelX = 120;
    const panelY = 180;
    const panelW = 840;
    const panelH = 540;

    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(panelX, panelY, panelW, panelH);

    // Verse text (soft white, auto-fit)
    ctx.fillStyle = "#F2F2F2";
    ctx.textAlign = "center";
    const textX = canvas.width / 2;
    const textY = panelY + 80;
    const maxWidth = panelW - 80;
    const lineHeight = 60;
    const maxHeight = panelH - 120;
    const baseFontSize = 48;

    wrapTextAutoFit(ctx, verseText, textX, textY, maxWidth, lineHeight, maxHeight, baseFontSize);

    // Reference
    ctx.font = "bold 40px Georgia";
    ctx.fillStyle = "#108cd7";
    ctx.fillText(currentKey, canvas.width / 2, panelY + panelH - 40);

    // Logo
    const logo = new Image();
    logo.crossOrigin = "anonymous";
    logo.src = "logo.svg";
    await new Promise(res => { logo.onload = res; logo.onerror = res; });

    const logoSize = 120;
    const logoX = 60;
    const logoY = canvas.height - logoSize - 80;
    ctx.drawImage(logo, logoX, logoY, logoSize, logoSize);

    // Site URL under logo
    ctx.font = "bold 32px Georgia";
    ctx.fillStyle = "#F2F2F2";
    ctx.textAlign = "left";
    ctx.fillText("tapnpray.github.io", logoX, logoY + logoSize + 40);

    // Export
    const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
    if (!blob) return;

    const file = new File([blob], "tapnpray.png", { type: "image/png" });

    // Native share with file
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: "Tap N Pray", text: verseText + "\n\n" + currentKey });
        return;
      } catch {}
    }

    // Fallback: download image
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tapnpray.png";
    a.click();
    URL.revokeObjectURL(url);

  } catch {}
}

/* INIT */
(async () => {
  await loadTranslation("nlt");
  await loadTranslation("niv");
  await loadTranslation("kjv");
  generateDaily();
})();
</script>
</body>
</html>
