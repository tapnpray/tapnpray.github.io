<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray – Verse of the Day</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Tap N Pray – Get a daily Bible verse, listen, reflect, and grow closer to Christ with one tap.">
<meta name="theme-color" content="#000000">
<link rel="icon" href="favicon.ico">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
body {
    margin:0;
    font-family:Arial,sans-serif;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    text-align:center;
    opacity:0;
    animation:fade 1.5s forwards;
}
@keyframes fade { to {opacity:1;} }

body::before {
    content:"";
    position:fixed;
    width:100%; height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
    z-index:-2;
}
body::after {
    content:"";
    position:fixed;
    width:100%; height:100%;
    backdrop-filter:blur(5px);
    z-index:-1;
}

.logo-container img {max-width:240px;width:70%;}
.tagline {color:white;font-weight:bold;margin-top:10px;}

.center {flex:1;display:flex;flex-direction:column;align-items:center;}

#votd {
    margin-top:15px;
    padding:20px;
    background:rgba(0,0,0,0.6);
    border-radius:16px;
    color:white;
    max-width:90%;
    box-shadow:0 0 25px rgba(255,255,255,0.2);
}

.btn {
    margin:6px;
    padding:10px 14px;
    border:none;
    border-radius:8px;
    background:#4db8ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.btn:hover {background:#3399dd;}
.btn:active {transform:scale(0.96);}

.small {font-size:13px;opacity:0.85;color:white;}

#loading {color:white;margin-top:20px;}

</style>
</head>

<body>

<div class="logo-container">
    <img src="logo.svg" alt="Tap N Pray logo">
    <div class="tagline">One Tap Closer to Christ</div>
</div>

<div class="center">

<div id="loading">Loading scripture...</div>

<div id="votd" style="display:none;">
    <div id="date"></div>
    <h2 id="verse"></h2>
    <div id="ref"></div>

    <div class="small">
        Translation:
        <select id="translationSelect"></select>
    </div>

    <div>
        <button class="btn" onclick="playVerse()">Listen</button>
        <button class="btn" onclick="copyVerse()">Copy</button>
        <button class="btn" onclick="shareVerse()">Share</button>
        <button class="btn" onclick="saveFavorite()">⭐ Save</button>
    </div>

    <div class="small" id="streak"></div>
    <div class="small" id="status"></div>

    <button class="btn" onclick="togglePrayer()">Daily Prayer</button>
    <div id="prayer" class="small" style="display:none;"></div>

    <button class="btn" onclick="toggleAutoplay()">Autoplay: OFF</button>
</div>

</div>

<script>
const backgrounds = ["backgrounds/Background1.png","backgrounds/Background2.png"];
document.body.style.backgroundImage = `url('${backgrounds[Math.floor(Math.random()*backgrounds.length)]}')`;

let verses = {};
let currentKey = "";
let translation = localStorage.getItem("translation") || "nlt";
let autoplay = localStorage.getItem("autoplay") === "true";

const translations = ["kjv","niv","nlt"];

function seedIndex(length){
    const d = new Date();
    return (d.getFullYear()*10000 + d.getMonth()*100 + d.getDate()) % length;
}

async function loadTranslation(t){
    if (verses[t]) return;
    const res = await fetch(`https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    const json = await res.json();

    let flat = {};
    for (let b in json)
        for (let c in json[b])
            for (let v in json[b][c])
                flat[`${b} ${c}:${v}`] = json[b][c][v];

    verses[t] = flat;
}

async function init(){
    await loadTranslation(translation);

    const keys = Object.keys(verses[translation]);
    currentKey = keys[seedIndex(keys.length)];

    updateUI();
    setupDropdown();
    updateStreak();

    document.getElementById("loading").style.display="none";
    document.getElementById("votd").style.display="block";

    if (autoplay) playVerse();
}

function updateUI(){
    document.getElementById("verse").innerText = verses[translation][currentKey];
    document.getElementById("ref").innerText = `${currentKey} (${translation.toUpperCase()})`;

    const d = new Date();
    document.getElementById("date").innerText = d.toDateString();
}

function setupDropdown(){
    const sel = document.getElementById("translationSelect");
    sel.innerHTML = "";

    translations.forEach(t=>{
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t.toUpperCase();
        if (t===translation) opt.selected=true;
        sel.appendChild(opt);
    });

    sel.onchange = async e=>{
        translation = e.target.value;
        localStorage.setItem("translation",translation);
        await loadTranslation(translation);
        updateUI();
    };
}

function copyVerse(){
    navigator.clipboard.writeText(`${verses[translation][currentKey]} — ${currentKey}`);
    alert("Copied!");
}

function shareVerse(){
    if(navigator.share){
        navigator.share({text:verses[translation][currentKey]});
    } else copyVerse();
}

function saveFavorite(){
    localStorage.setItem("favoriteVerse", `${verses[translation][currentKey]} — ${currentKey}`);
    alert("Saved!");
}

function updateStreak(){
    let s = parseInt(localStorage.getItem("streak")) || 0;
    let last = localStorage.getItem("last");

    const today = new Date().toDateString();

    if(last!==today){
        s++;
        localStorage.setItem("last",today);
        localStorage.setItem("streak",s);
    }

    document.getElementById("streak").innerText = `🔥 Streak: ${s}`;
}

const prayers = [
"Lord, quiet my heart today.",
"Father, guide my steps.",
"Jesus, give me peace.",
"God, strengthen my faith."
];

function togglePrayer(){
    const el = document.getElementById("prayer");
    if(el.style.display==="none"){
        el.style.display="block";
        el.innerText = prayers[seedIndex(prayers.length)];
    } else el.style.display="none";
}

function toggleAutoplay(){
    autoplay = !autoplay;
    localStorage.setItem("autoplay",autoplay);
    event.target.innerText = `Autoplay: ${autoplay ? "ON":"OFF"}`;
}

function playVerse(){
    const text = verses[translation][currentKey];
    const u = new SpeechSynthesisUtterance(text);
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

window.onload = init;
</script>

</body>
</html>
