<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray – Verse of the Day</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Tap N Pray – Get a daily Bible verse and grow closer to Christ.">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
    margin:0;
    font-family:'Inter',sans-serif;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    background-color:#000;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* overlays */
body::before {
    content:"";
    position:fixed;
    width:100%; height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.75));
    z-index:-2;
}
body::after {
    content:"";
    position:fixed;
    width:100%; height:100%;
    backdrop-filter:blur(10px);
    z-index:-1;
}

/* logo */
.logo-container {margin-top:20px;text-align:center;}
.logo-container img {max-width:220px;width:70%;}
.tagline {margin-top:8px;font-size:14px;opacity:0.8;}

/* layout */
.center {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
    width:100%;
}

/* card */
#votd {
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:24px;
    max-width:500px;
    width:100%;
    backdrop-filter:blur(20px);
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    text-align:center;
}

/* text */
#verse {font-size:clamp(20px,5vw,28px);line-height:1.6;}
#ref {opacity:0.7;margin-top:10px;}

.actions {margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}

.btn {
    padding:10px 14px;
    border-radius:999px;
    border:none;
    background:rgba(255,255,255,0.15);
    color:white;
    cursor:pointer;
}
.btn:hover {background:rgba(255,255,255,0.25);}
.btn:active {transform:scale(0.95);}

.small {font-size:13px;opacity:0.8;margin-top:10px;}

.favorite-item {
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
}

.delete-btn {
    margin-top:6px;
    background:#ff4d4d;
}
</style>
</head>

<body>

<div class="logo-container">
    <img src="logo.svg">
    <div class="tagline">One Tap Closer to Christ</div>
</div>

<div class="center">

<div id="votd">
    <div id="date"></div>
    <div id="verse">Loading...</div>
    <div id="ref"></div>

    <div class="small">
        Translation:
        <select id="translationSelect"></select>
    </div>

    <div class="actions">
        <button class="btn" onclick="playVerse()">Listen</button>
        <button class="btn" onclick="copyVerse()">Copy</button>
        <button class="btn" onclick="shareVerse()">Share</button>
        <button class="btn" onclick="saveFavorite()">⭐ Save</button>
        <button class="btn" onclick="toggleFavorites()">Favorites</button>
    </div>

    <div id="favoritesList" class="small" style="display:none;"></div>

    <div id="streak" class="small"></div>

    <button class="btn" onclick="togglePrayer()">Daily Prayer</button>
    <div id="prayer" class="small" style="display:none;"></div>

</div>

</div>

<script>
/* BACKGROUNDS */
const backgrounds = [
  "backgrounds/morning1.png",
  "backgrounds/morning2.png",
  "backgrounds/day1.png"
];

let bgIndex = 0;

function setBackground(index) {
  const newBg = backgrounds[index];
  const overlay = document.createElement("div");

  Object.assign(overlay.style, {
    position:"fixed",top:0,left:0,width:"100%",height:"100%",
    backgroundImage:`url('${newBg}')`,
    backgroundSize:"cover",
    backgroundPosition:"center",
    zIndex:"-3",
    opacity:"0",
    transition:"opacity 2s ease"
  });

  document.body.appendChild(overlay);

  setTimeout(()=>overlay.style.opacity="1",50);

  setTimeout(()=>{
    document.body.style.backgroundImage=`url('${newBg}')`;
    overlay.remove();
  },1500);
}

function cycleBackground(){
    bgIndex=(bgIndex+1)%backgrounds.length;
    setBackground(bgIndex);
}

setBackground(bgIndex);
setInterval(cycleBackground,60000);

/* VERSES */
let verses = {};
let currentKey = "";
let translation = "nlt";

async function loadTranslation(t){
    if (verses[t]) return;
    const res = await fetch(`https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    const json = await res.json();

    let flat = {};
    for (let b in json)
        for (let c in json[b])
            for (let v in json[b][c])
                flat[`${b} ${c}:${v}`] = json[b][c][v];

    verses[t]=flat;
}

function seedIndex(length){
    const d=new Date();
    return (d.getFullYear()*10000 + d.getMonth()*100 + d.getDate()) % length;
}

async function init(){
    await loadTranslation(translation);
    const keys=Object.keys(verses[translation]);
    currentKey=keys[seedIndex(keys.length)];
    updateUI();
    setupDropdown();
    updateStreak();
}

function updateUI(){
    document.getElementById("verse").innerText=verses[translation][currentKey];
    document.getElementById("ref").innerText=`${currentKey} (${translation.toUpperCase()})`;
    document.getElementById("date").innerText=new Date().toDateString();
}

function setupDropdown(){
    const sel=document.getElementById("translationSelect");
    ["kjv","niv","nlt"].forEach(t=>{
        const opt=document.createElement("option");
        opt.value=t;
        opt.textContent=t.toUpperCase();
        sel.appendChild(opt);
    });

    sel.onchange=async e=>{
        translation=e.target.value;
        await loadTranslation(translation);
        updateUI();
    };
}

/* FAVORITES SYSTEM */
function saveFavorite(){
    const verse = `${verses[translation][currentKey]} — ${currentKey}`;
    let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

    if (!favorites.includes(verse)) {
        favorites.push(verse);
        localStorage.setItem("favorites", JSON.stringify(favorites));
        alert("Saved!");
    } else {
        alert("Already saved!");
    }
}

function toggleFavorites(){
    const el=document.getElementById("favoritesList");

    if(el.style.display==="none"){
        renderFavorites();
        el.style.display="block";
    } else {
        el.style.display="none";
    }
}

function renderFavorites(){
    const el=document.getElementById("favoritesList");
    let favorites=JSON.parse(localStorage.getItem("favorites")) || [];

    if(favorites.length===0){
        el.innerText="No saved verses yet.";
        return;
    }

    el.innerHTML = favorites.map((v,i)=>`
        <div class="favorite-item">
            ${v}
            <br>
            <button class="btn delete-btn" onclick="deleteFavorite(${i})">Delete</button>
        </div>
    `).join("");
}

function deleteFavorite(index){
    let favorites=JSON.parse(localStorage.getItem("favorites")) || [];
    favorites.splice(index,1);
    localStorage.setItem("favorites", JSON.stringify(favorites));
    renderFavorites();
}

/* OTHER */
function copyVerse(){
    navigator.clipboard.writeText(`${verses[translation][currentKey]} — ${currentKey}`);
    alert("Copied!");
}

function shareVerse(){
    if(navigator.share){
        navigator.share({text:verses[translation][currentKey]});
    } else copyVerse();
}

function updateStreak(){
    let s=parseInt(localStorage.getItem("streak"))||0;
    let last=localStorage.getItem("last");
    const today=new Date().toDateString();

    if(last!==today){
        s++;
        localStorage.setItem("last",today);
        localStorage.setItem("streak",s);
    }

    document.getElementById("streak").innerText=`🔥 Streak: ${s}`;
}

const prayers=["Lord guide me today.","Give me peace.","Strengthen my faith."];

function togglePrayer(){
    const el=document.getElementById("prayer");
    if(el.style.display==="none"){
        el.style.display="block";
        el.innerText=prayers[seedIndex(prayers.length)];
    } else el.style.display="none";
}

function playVerse(){
    const u=new SpeechSynthesisUtterance(verses[translation][currentKey]);
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

window.onload=init;
</script>

</body>
</html>
