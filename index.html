<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Arial,sans-serif;color:#fff;
 background-size:cover;background-position:center;
}

body{
 transition: background-image 1.5s ease-in-out;
 animation: subtleZoom 60s linear infinite;
}
@keyframes subtleZoom {
 0% { background-size:100%; }
 100% { background-size:110%; }
}

body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.9));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(12px);z-index:-1;
}

.logo-container{
 position:fixed;bottom:25px;left:20px;opacity:.7;
}
.logo-container img{max-width:55px}

.center{
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:100px 15px 180px;
 box-sizing:border-box;
}

#votd{
 position:relative;
 background:rgba(0,0,0,.6);
 border-radius:28px;
 padding:24px;
 max-width:520px;width:100%;
 backdrop-filter:blur(30px);
 text-align:center;
 max-height:70vh;
 display:flex;
 flex-direction:column;
}

#verse{
 font-size:clamp(22px,5vw,30px);
 line-height:1.6;
 overflow-y:auto;
}

.word{opacity:.35;transition:.25s;}
.word.active{opacity:1;}

#favoriteStar{
 position:absolute;top:12px;left:12px;
 font-size:22px;cursor:pointer;
}
#ambientToggle{
 position:absolute;top:12px;right:12px;
 cursor:pointer;
}
#ambientToggle.active{
 color:#7CFFB2;
 text-shadow:0 0 8px rgba(124,255,178,.8);
}

#title{font-size:14px;opacity:.85;margin-bottom:4px;}
#date{color:#108cd7;font-size:14px;}
#ref{color:#108cd7;margin-top:8px;font-size:14px;}

#topics{
 display:flex;flex-wrap:wrap;gap:8px;
 justify-content:center;margin:10px 0;
}
#topics button{
 padding:6px 12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;font-size:12px;cursor:pointer;
}
#topics button.active{background:#108cd7}

.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;margin-top:10px;
}
.btn{
 padding:12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;
}
.primary{background:#108cd7}

#favoritesModal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.95);
 display:none;overflow:auto;padding:20px;
}
.favorite-item{
 margin-bottom:15px;
 padding:15px;
 background:rgba(255,255,255,.1);
 border-radius:12px;
}

#streak{
 position:fixed;bottom:25px;left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:8px 16px;border-radius:999px;
 font-size:14px;
}
</style>
</head>

<body>

<div class="logo-container"><img src="logo.svg"></div>

<div class="center">
<div id="votd">

<div id="favoriteStar" onclick="toggleFavorite()">☆</div>
<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="title">Daily Bible Verse</div>
<div id="date"></div>
<div id="verse"></div>
<div id="ref"></div>

<div id="topics">
<button onclick="goDaily(this)">Daily</button>
<button onclick="pickTopic('peace',this)">Peace</button>
<button onclick="pickTopic('strength',this)">Strength</button>
<button onclick="pickTopic('hope',this)">Hope</button>
<button onclick="pickTopic('guidance',this)">Guidance</button>
<button onclick="pickTopic('faith',this)">Faith</button>
</div>

<div class="actions">
<button class="btn primary" onclick="readVerse()">Read Verse</button>
<button class="btn" onclick="openFavorites()">Favorites</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="streak"></div>

<div id="favoritesModal" onclick="closeFavorites(event)">
<div id="favoritesContent"></div>
</div>

<audio id="ambientAudio" loop>
<source src="/sounds/calm.mp3">
</audio>

<script>

/* ================= BACKGROUNDS ================= */
const bgSets={
 morning:["/backgrounds/morning1.png","/backgrounds/morning2.png"],
 day:["/backgrounds/day1.png","/backgrounds/day2.png"],
 evening:["/backgrounds/evening1.png","/backgrounds/evening2.png"],
 night:["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let bgIndex=0,currentTimeBlock="";

function getTimeBlock(){
 const h=new Date().getHours();
 if(h>=5&&h<11)return"morning";
 if(h>=11&&h<17)return"day";
 if(h>=17&&h<21)return"evening";
 return"night";
}

function setBackground(){
 const set=bgSets[getTimeBlock()];
 if(!set)return;
 document.body.style.backgroundImage=`url('${set[bgIndex]}')`;
}

function rotateBackground(){
 const t=getTimeBlock();
 if(t!==currentTimeBlock){bgIndex=0;currentTimeBlock=t;}
 const set=bgSets[t];
 if(!set)return;
 bgIndex=(bgIndex+1)%set.length;
 setBackground();
}

function initBackgrounds(){
 currentTimeBlock=getTimeBlock();
 setBackground();
 setInterval(rotateBackground,60000);
}

/* ================= VERSES ================= */

let verses={},key="",dailyKey="";
let topicCache={};

function getSeed(str){
 let hash=0;
 for(let i=0;i<str.length;i++){
  hash=(hash<<5)-hash+str.charCodeAt(i);
  hash|=0;
 }
 return Math.abs(hash);
}

/* Emotion Profiles */
const emotionProfiles={
 morning:["hope","strength","joy"],
 day:["wisdom","guidance","faith"],
 evening:["gratitude","peace"],
 night:["peace","rest","comfort"]
};

/* User Tracking */
function trackTopic(topic){
 let d=JSON.parse(localStorage.getItem("topicUsage")||"{}");
 d[topic]=(d[topic]||0)+1;
 localStorage.setItem("topicUsage",JSON.stringify(d));
}

function getUserTopThemes(){
 let d=JSON.parse(localStorage.getItem("topicUsage")||"{}");
 return Object.entries(d).sort((a,b)=>b[1]-a[1]).slice(0,2).map(e=>e[0]);
}

/* Scoring */
function scoreVerse(text){
 text=text.toLowerCase();
 let score=0;

 ["love","peace","hope","joy","grace","faith","strength","comfort","trust"].forEach(w=>{
  if(text.includes(w))score+=3;
 });

 ["god","lord","jesus","truth","life"].forEach(w=>{
  if(text.includes(w))score+=1;
 });

 ["wrath","punishment","evil"].forEach(w=>{
  if(text.includes(w))score-=3;
 });

 return score;
}

/* Avoid repeats */
function avoidRecent(ref){
 let h=JSON.parse(localStorage.getItem("recentVerses")||"[]");
 if(h.includes(ref))return false;
 h.push(ref);
 if(h.length>7)h.shift();
 localStorage.setItem("recentVerses",JSON.stringify(h));
 return true;
}

/* Generate Daily */
function generateDaily(){
 const keys=Object.keys(verses);
 const today=new Date().toDateString();
 const seed=getSeed(today);

 const timeBlock=getTimeBlock();
 const emotionalTargets=emotionProfiles[timeBlock];
 const userThemes=getUserTopThemes();

 let scored=keys.map(ref=>{
  let text=verses[ref].toLowerCase();
  let score=scoreVerse(text);

  emotionalTargets.forEach(t=>{
   if(text.includes(t))score+=3;
  });

  userThemes.forEach(t=>{
   if(text.includes(t))score+=2;
  });

  return {ref,score};
 });

 scored.sort((a,b)=>b.score-a.score);

 const top=scored.slice(0,Math.floor(scored.length*0.2));

 let chosen;
 for(let i=0;i<top.length;i++){
  let c=top[(seed+i)%top.length].ref;
  if(avoidRecent(c)){chosen=c;break;}
 }

 dailyKey=chosen||top[0].ref;
 key=dailyKey;

 update("Daily Bible Verse");
 streak();
}

/* LOAD */
async function load(){
 const res=await fetch("/BIBLE/NLT/NLT_bible.json");
 const data=await res.json();

 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];

 verses=flat;
 generateDaily();
}

/* UPDATE */
function update(title){
 const words=verses[key].split(" ");
 document.getElementById("title").innerText=title;
 document.getElementById("verse").innerHTML=
  words.map(w=>`<span class="word">${w}</span>`).join(" ");
 document.getElementById("ref").innerText=key;
 document.getElementById("date").innerText=new Date().toDateString();
 updateStar();
}

/* TOPICS */
function pickTopic(topic,btn){
 trackTopic(topic);
 const today=new Date().toDateString();

 if(!topicCache[topic]){
  const filtered=Object.keys(verses).filter(ref=>{
   let t=verses[ref].toLowerCase();
   return t.includes(topic);
  });

  const seed=getSeed(today+topic);
  topicCache[topic]=filtered[seed%filtered.length];
 }

 key=topicCache[topic];
 update("Daily Bible Verse - "+topic.charAt(0).toUpperCase()+topic.slice(1));
 setActive(btn);
}

function goDaily(btn){
 key=dailyKey;
 update("Daily Bible Verse");
 setActive(btn);
}

function setActive(btn){
 document.querySelectorAll("#topics button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* AUDIO */
let ambientOn=false,fadeInterval=null;
function toggleAmbient(){
 const a=document.getElementById("ambientAudio");
 if(fadeInterval)clearInterval(fadeInterval);

 if(ambientOn){
  fadeInterval=setInterval(()=>{
   a.volume=Math.max(0,a.volume-0.05);
   if(a.volume===0){a.pause();a.currentTime=0;clearInterval(fadeInterval);}
  },100);
 }else{
  a.volume=0;a.play();
  fadeInterval=setInterval(()=>{
   a.volume=Math.min(0.3,a.volume+0.05);
   if(a.volume===0.3)clearInterval(fadeInterval);
  },100);
 }

 ambientOn=!ambientOn;
 document.getElementById("ambientToggle").classList.toggle("active");
}

/* READ */
function readVerse(){
 const words=document.querySelectorAll(".word");
 words.forEach(w=>w.classList.remove("active"));
 let i=0;
 const text=verses[key]+" "+key;

 const utter=new SpeechSynthesisUtterance(text);
 utter.rate=.9;

 utter.onboundary=e=>{
  if(e.name==="word"&&words[i]){
   words[i].classList.add("active");
   i++;
  }
 };

 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* FAVORITES */
function getFavs(){return JSON.parse(localStorage.getItem("favs")||"[]");}
function toggleFavorite(){
 let f=getFavs();
 if(f.includes(key))f=f.filter(x=>x!==key);
 else f.push(key);
 localStorage.setItem("favs",JSON.stringify(f));
 updateStar();
}
function updateStar(){
 document.getElementById("favoriteStar").innerText=
 getFavs().includes(key)?"⭐":"☆";
}
function openFavorites(){
 let c=document.getElementById("favoritesContent");
 c.innerHTML="<h2>Saved Verses</h2>";
 getFavs().forEach(ref=>{
  c.innerHTML+=`<div class="favorite-item">
  <b>${ref}</b><br>${verses[ref]}
  <br><button onclick="removeFav('${ref}')">Delete</button></div>`;
 });
 document.getElementById("favoritesModal").style.display="block";
}
function removeFav(ref){
 let f=getFavs().filter(x=>x!==ref);
 localStorage.setItem("favs",JSON.stringify(f));
 openFavorites();
}
function closeFavorites(e){
 if(e.target.id==="favoritesModal")
  document.getElementById("favoritesModal").style.display="none";
}

/* UTIL */
function copyVerse(){
 navigator.clipboard.writeText(verses[key]+" — "+key);
}
function shareVerse(){
 navigator.share?.({text:verses[key]+" — "+key});
}
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

/* INIT */
initBackgrounds();
load();

</script>

</body>
</html>
