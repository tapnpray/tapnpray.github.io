<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#108cd7">
<link rel="manifest" href="manifest.json">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer=[];function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Inter,sans-serif;color:#fff;
 background-size:cover;background-position:center;
}
body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.8));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(10px);z-index:-1;
}

/* HEADER */
.logo-container{
 position:fixed;top:10px;left:50%;
 transform:translateX(-50%);
 text-align:center;
}
.logo-container img{max-width:100px;}
.tagline{font-size:11px;opacity:.8}

/* MAIN */
.center{
 height:100%;
 display:flex;flex-direction:column;
 align-items:center;
 padding-top:140px;
 padding-bottom:140px;
}

/* CARD */
#votd{
 position:relative;
 background:rgba(0,0,0,.65);
 border-radius:24px;
 padding:30px 20px;
 width:92%;max-width:520px;
 backdrop-filter:blur(20px);
 display:flex;flex-direction:column;
 align-items:center;gap:14px;
}

/* SOUND ICON */
#soundIcon{
 position:absolute;top:14px;right:16px;
 cursor:pointer;
}

/* TEXT */
#date{color:#108cd7;font-size:14px;}
#verse{
 font-size:clamp(26px,6vw,36px);
 text-align:center;line-height:1.6;
}
#ref{color:#108cd7}

/* BUTTONS */
.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;width:100%;max-width:320px;
}
.btn{
 padding:14px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;
}
.primary{background:#108cd7}

/* STREAK */
#streak{
 position:fixed;bottom:18px;
 left:50%;transform:translateX(-50%);
 background:rgba(0,0,0,.5);
 padding:6px 14px;border-radius:999px;
}

/* INSTALL */
#installBanner{
 position:fixed;bottom:70px;left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.9);
 padding:10px 16px;border-radius:999px;
 display:none;gap:10px;
}
#installBanner button{
 background:#108cd7;color:#fff;
 border:none;padding:6px 12px;
 border-radius:999px;
}
</style>
</head>

<body>

<div class="logo-container">
<img src="logo.svg">
<div class="tagline">One Tap Closer to Christ</div>
</div>

<div class="center">
<div id="votd">

<div id="soundIcon" onclick="toggleSound()">🎧</div>

<div id="date"></div>
<div id="verse">Loading...</div>
<div id="ref"></div>

<select id="translationSelect"></select>

<div class="actions">
<button class="btn primary" onclick="playVerse()">Listen</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
<button class="btn" onclick="donate()">💙 Support</button>
</div>

</div>
</div>

<div id="streak"></div>

<div id="installBanner"></div>

<audio id="ambientAudio" loop>
<source src="sounds/calm.mp3">
</audio>

<script>

/* ✅ SERVICE WORKER REGISTRATION */
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('/sw.js')
  .then(() => console.log("Service Worker Registered"))
  .catch(err => console.log("SW error:", err));
}

/* BACKGROUND */
const backgrounds=["backgrounds/morning1.png","backgrounds/morning2.png","backgrounds/day1.png"];
let i=0;
function setBG(n){document.body.style.backgroundImage=`url('${backgrounds[n]}')`;}
setBG(i);
setInterval(()=>{i=(i+1)%backgrounds.length;setBG(i);},60000);

/* VERSES */
let verses={kjv:{},niv:{},nlt:{}};
let key="",translation="nlt";

async function loadTranslation(t){
 if(Object.keys(verses[t]).length)return;
 const res=await fetch(`https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 const data=await res.json();
 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];
 verses[t]=flat;
}

function seed(len){
 const d=new Date();
 return (d.getFullYear()*10000+d.getMonth()*100+d.getDate())%len;
}

async function init(){
 await loadTranslation("nlt");
 const keys=Object.keys(verses.nlt);
 key=keys[seed(keys.length)];
 setupTranslations();
 update();
 streak();
}

/* TRANSLATION */
function setupTranslations(){
 const s=document.getElementById("translationSelect");
 ["kjv","niv","nlt"].forEach(t=>{
  let o=document.createElement("option");
  o.value=t;o.textContent=t.toUpperCase();
  if(t==="nlt")o.selected=true;
  s.appendChild(o);
 });
 s.onchange=async e=>{
  translation=e.target.value;
  await loadTranslation(translation);
  update();
 };
}

/* UPDATE */
function update(){
 document.getElementById("verse").innerText=verses[translation][key];
 document.getElementById("ref").innerHTML=`<span style="color:#108cd7">${key}</span> (${translation.toUpperCase()})`;
 document.getElementById("date").innerText=new Date().toDateString();
}

/* SOUND */
let sound=false;
function fadeAudio(a,target){
 let step=(target-a.volume)/16;
 let i=setInterval(()=>{
  a.volume+=step;
  if(Math.abs(a.volume-target)<.01){
   a.volume=target;clearInterval(i);
  }
 },50);
}
function toggleSound(){
 const a=document.getElementById("ambientAudio");
 const icon=document.getElementById("soundIcon");
 if(!sound){
  a.volume=0;a.play();fadeAudio(a,.35);
  icon.innerText="🔊";sound=true;
 } else {
  fadeAudio(a,0);setTimeout(()=>a.pause(),800);
  icon.innerText="🎧";sound=false;
 }
}

/* SHARE */
async function shareVerse(){
 const verse=verses[translation][key];
 const canvas=document.createElement("canvas");
 canvas.width=1080;canvas.height=1080;
 const ctx=canvas.getContext("2d");

 const bg=new Image();
 bg.src=backgrounds[i];
 await new Promise(r=>bg.onload=r);

 ctx.drawImage(bg,0,0,1080,1080);
 ctx.fillStyle="rgba(0,0,0,.6)";
 ctx.fillRect(0,0,1080,1080);

 ctx.fillStyle="#fff";
 ctx.font="bold 48px Arial";
 ctx.textAlign="center";

 wrapText(ctx,verse,540,500,800,60);

 ctx.fillStyle="#108cd7";
 ctx.fillText(key,540,800);

 canvas.toBlob(async blob=>{
  const file=new File([blob],"verse.png",{type:"image/png"});
  if(navigator.canShare){
   await navigator.share({files:[file]});
  }
 });
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
 const words=text.split(" ");
 let line="";
 for(let n=0;n<words.length;n++){
  let test=line+words[n]+" ";
  if(ctx.measureText(test).width>maxWidth){
   ctx.fillText(line,x,y);
   line=words[n]+" ";y+=lineHeight;
  } else line=test;
 }
 ctx.fillText(line,x,y);
}

/* OTHER */
function playVerse(){
 speechSynthesis.speak(new SpeechSynthesisUtterance(verses[translation][key]));
}
function copyVerse(){
 navigator.clipboard.writeText(`${verses[translation][key]} — ${key}`);
}
function donate(){
 window.open("https://venmo.com/u/tapnpray","_blank");
}

/* STREAK */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

/* INSTALL */
function isIOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent);}
function isAndroid(){return /android/i.test(navigator.userAgent);}

let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
 e.preventDefault();
 deferredPrompt=e;
 if(isAndroid()) showInstall("install");
});

window.onload=()=>{
 init();
 if(isIOS()) showInstall("ios");
};

function showInstall(type){
 const b=document.getElementById("installBanner");
 if(type==="ios"){
  b.innerHTML=`📲 Add to Home Screen <button onclick="alert('Tap Share → Add to Home Screen')">How</button>`;
 }
 if(type==="install"){
  b.innerHTML=`📲 Install Tap N Pray <button onclick="installApp()">Install</button>`;
 }
 b.style.display="flex";
}

async function installApp(){
 if(!deferredPrompt)return;
 deferredPrompt.prompt();
 await deferredPrompt.userChoice;
 document.getElementById("installBanner").style.display="none";
}
</script>

</body>
</html>
