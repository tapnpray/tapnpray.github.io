<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Arial,sans-serif;color:#fff;
 background-size:cover;background-position:center;
}

/* Background */
body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.9));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(12px);z-index:-1;
}

/* Logo */
.logo-container{
 position:fixed;bottom:25px;left:20px;opacity:.7;
}
.logo-container img{max-width:55px}

/* Layout */
.center{
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:100px 15px 180px;
}

/* Verse Box */
#votd{
 position:relative;
 background:rgba(0,0,0,.55);
 border-radius:28px;
 padding:24px;
 max-width:520px;width:100%;
 backdrop-filter:blur(30px);
 text-align:center;
}

#verse{
 font-size:clamp(22px,5vw,30px);
 line-height:1.6;
}

.word{opacity:.9;transition:.3s}
.word.hit{opacity:0}

/* Overlay Canvas */
#breakoutOverlay{
 position:absolute;
 top:0;left:0;
 width:100%;height:100%;
 pointer-events:none;
}

/* Icons */
#favoriteStar{position:absolute;top:12px;left:12px;font-size:22px;cursor:pointer;}
#ambientToggle{position:absolute;top:12px;right:12px;cursor:pointer;}
#ambientToggle.active{color:#7CFFB2;}

/* Text */
#title{font-size:14px;opacity:.85}
#date{color:#108cd7}
#ref{color:#108cd7;margin-top:8px}

/* Topics */
#topics{
 display:flex;flex-wrap:wrap;gap:8px;
 justify-content:center;margin:10px 0;
}
#topics button{
 padding:6px 12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;font-size:12px;
}
#topics button.active{background:#108cd7}

/* Buttons */
.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;margin-top:10px;
}
.btn{
 padding:12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;
}
.primary{background:#108cd7}

/* Favorites */
#favoritesModal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.95);
 display:none;overflow:auto;padding:20px;
}
.favorite-item{
 margin-bottom:15px;
 padding:15px;
 background:rgba(255,255,255,.1);
 border-radius:12px;
}

/* Bottom UI */
#streak{
 position:fixed;bottom:25px;left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:8px 16px;border-radius:999px;
}

#gameTrigger{
 position:fixed;
 bottom:25px;
 left:20px;
 background:rgba(0,0,0,.6);
 padding:8px 14px;
 border-radius:999px;
 cursor:pointer;
 font-size:14px;
}
</style>
</head>

<body>

<div class="logo-container"><img src="logo.svg"></div>

<div class="center">
<div id="votd">

<div id="favoriteStar" onclick="toggleFavorite()">☆</div>
<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="title">Daily Bible Verse</div>
<div id="date"></div>
<div id="verse"></div>
<div id="ref"></div>

<canvas id="breakoutOverlay"></canvas>

<div id="topics">
<button onclick="goDaily()">Daily</button>
<button onclick="pickTopic('peace')">Peace</button>
<button onclick="pickTopic('strength')">Strength</button>
<button onclick="pickTopic('hope')">Hope</button>
<button onclick="pickTopic('guidance')">Guidance</button>
<button onclick="pickTopic('faith')">Faith</button>
</div>

<div class="actions">
<button class="btn primary" onclick="readVerse()">Read Verse</button>
<button class="btn" onclick="openFavorites()">Favorites</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="gameTrigger" onclick="startGame()">✝️ Play</div>
<div id="streak"></div>

<div id="favoritesModal" onclick="closeFavorites(event)">
<div id="favoritesContent"></div>
</div>

<audio id="ambientAudio" loop>
<source src="sounds/calm.mp3">
</audio>

<script>

/* ===== DATA ===== */
let verses={},key="",dailyKey="";
let topicKeys={};

/* LOAD */
async function load(){
 const res=await fetch("BIBLE/NLT/NLT_bible.json");
 const data=await res.json();
 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];
 verses=flat;
 generateDaily();
}

/* DAILY */
function generateDaily(){
 const keys=Object.keys(verses);
 const seed=new Date().toDateString().split('').reduce((a,c)=>a+c.charCodeAt(0),0);
 dailyKey=keys[seed%keys.length];
 key=dailyKey;
 update();
 streak();
}

/* UPDATE */
function update(){
 const words=verses[key].split(" ");
 document.getElementById("verse").innerHTML=
 words.map(w=>`<span class="word">${w}</span>`).join(" ");
 document.getElementById("ref").innerText=key;
 document.getElementById("date").innerText=new Date().toDateString();
}

/* AUDIO */
let ambientOn=false;
function toggleAmbient(){
 const a=document.getElementById("ambientAudio");

 if(ambientOn){
  a.pause();
  a.currentTime=0;
  a.volume=0;
 }else{
  a.volume=0;
  a.play();
  let fade=setInterval(()=>{
   a.volume+=0.05;
   if(a.volume>=0.3) clearInterval(fade);
  },100);
 }

 ambientOn=!ambientOn;
}

/* READ */
function readVerse(){
 const words=document.querySelectorAll(".word");
 words.forEach(w=>w.classList.remove("active"));
 let i=0;

 const utter=new SpeechSynthesisUtterance(verses[key]);
 utter.rate=.9;

 utter.onboundary=e=>{
  if(e.name==="word" && words[i]){
   words[i].classList.add("active");
   i++;
  }
 };

 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* FAVORITES */
function getFavs(){return JSON.parse(localStorage.getItem("favs")||"[]");}

function toggleFavorite(){
 let f=getFavs();
 if(f.includes(key)) f=f.filter(x=>x!==key);
 else f.push(key);
 localStorage.setItem("favs",JSON.stringify(f));
}

function openFavorites(){
 let c=document.getElementById("favoritesContent");
 c.innerHTML="<h2>Saved Verses</h2>";

 getFavs().forEach(ref=>{
  c.innerHTML+=`
   <div class="favorite-item">
    <b>${ref}</b><br>${verses[ref]}
    <br><button onclick="removeFav('${ref}')">Delete</button>
   </div>`;
 });

 document.getElementById("favoritesModal").style.display="block";
}

function removeFav(ref){
 let f=getFavs().filter(x=>x!==ref);
 localStorage.setItem("favs",JSON.stringify(f));
 openFavorites();
}

function closeFavorites(e){
 if(e.target.id==="favoritesModal")
  document.getElementById("favoritesModal").style.display="none";
}

/* COPY / SHARE */
function copyVerse(){
 navigator.clipboard.writeText(verses[key]+" — "+key);
}

function shareVerse(){
 navigator.share?.({text:verses[key]+" — "+key});
}

/* STREAK */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 "+s;
}

/* ===== BREAKOUT GAME ===== */

let canvas=document.getElementById("breakoutOverlay");
let ctx=canvas.getContext("2d");
let ball,blocks=[],paddleX,gameOn=false;

function startGame(){
 if(gameOn) return;
 gameOn=true;

 canvas.width=canvas.offsetWidth;
 canvas.height=canvas.offsetHeight;

 mapWords();
 initBall();
 animate();
}

function mapWords(){
 blocks=[];
 document.querySelectorAll("#verse .word").forEach(el=>{
  const r=el.getBoundingClientRect();
  const c=canvas.getBoundingClientRect();

  blocks.push({
   el,
   x:r.left-c.left,
   y:r.top-c.top,
   w:r.width,
   h:r.height,
   hit:false
  });
 });
}

function initBall(){
 ball={x:200,y:200,dx:3,dy:-3};
 paddleX=canvas.width/2;
}

function animate(){
 if(!gameOn) return;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 ctx.font="20px Arial";
 ctx.fillText("✝️",ball.x,ball.y);

 ctx.fillRect(paddleX-50,canvas.height-20,100,10);

 ball.x+=ball.dx;
 ball.y+=ball.dy;

 if(ball.x<0||ball.x>canvas.width) ball.dx*=-1;
 if(ball.y<0) ball.dy*=-1;

 if(ball.y>canvas.height-30 && ball.x>paddleX-50 && ball.x<paddleX+50)
  ball.dy*=-1;

 blocks.forEach(b=>{
  if(!b.hit && ball.x>b.x && ball.x<b.x+b.w && ball.y>b.y && ball.y<b.y+b.h){
   b.hit=true;
   b.el.classList.add("hit");
   ball.dy*=-1;
  }
 });

 if(ball.y>canvas.height || blocks.every(b=>b.hit)){
  stopGame();
 }

 requestAnimationFrame(animate);
}

window.addEventListener("mousemove",e=>{
 paddleX=e.clientX-canvas.getBoundingClientRect().left;
});
window.addEventListener("touchmove",e=>{
 paddleX=e.touches[0].clientX-canvas.getBoundingClientRect().left;
});

function stopGame(){
 gameOn=false;
 document.querySelectorAll(".word").forEach(w=>w.classList.remove("hit"));
}

/* START */
load();

</script>

</body>
</html>
