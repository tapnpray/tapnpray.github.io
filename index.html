<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray – Verse of the Day</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- GLOBAL STYLES --- */
body {
    margin:0;
    font-family:Arial,sans-serif;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100vh;
    text-align:center;
    opacity:0;
    animation:bgFadeIn 1.5s ease forwards;
}

@keyframes bgFadeIn {
    from { opacity:0; }
    to { opacity:1; }
}

/* Background gradient overlay */
body::before {
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.55));
    z-index:-2;
}

/* Background blur layer */
body::after {
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    backdrop-filter: blur(4px);
    z-index:-1;
}

/* --- LOGO --- */
.logo-container {margin-top:15px;}
.logo-container img {
    max-width:260px;
    width:70%;
}

/* --- TAGLINE --- */
.tagline {
    margin-top:10px;
    color:white;
    font-weight:bold;
    font-size:clamp(14px,4vw,18px);
    text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

/* --- MAIN CONTENT --- */
.center-container {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    width:100%;
    padding:10px;
}

#votd-header {
    color:white;
    font-weight:bold;
    font-size:clamp(18px,5vw,26px);
    margin-bottom:12px;
    text-shadow:0 2px 6px rgba(0,0,0,0.7);
}

/* Verse box with glow + blur */
#votd-container {
    font-size:clamp(22px,6.5vw,34px);
    font-weight:bold;
    line-height:1.5;
    color:white;
    background:rgba(0,0,0,0.55);
    padding:22px;
    border-radius:16px;
    max-width:92%;
    max-height:50vh;
    overflow:auto;
    box-shadow:
        0 0 25px rgba(255,255,255,0.25),
        0 0 60px rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    opacity:0;
    transform:translateY(10px);
    transition:opacity .6s ease, transform .6s ease;
}
#votd-container.show {
    opacity:1;
    transform:translateY(0);
}

#verse-ref {
    margin-top:12px;
    font-size:0.7em;
    opacity:0.85;
}

/* --- BUTTONS --- */
.btn {
    margin-top:12px;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#4db8ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:background .2s;
}
.btn:hover {background:#3399dd;}

.action-buttons {
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

.translation {
    margin-top:10px;
    color:white;
    font-size:14px;
}

/* --- DAILY PRAYER --- */
#daily-prayer {
    margin-top:18px;
    max-width:92%;
    color:white;
    font-size:clamp(16px,4.5vw,20px);
    line-height:1.5;
    background:rgba(0,0,0,0.45);
    padding:16px;
    border-radius:14px;
    box-shadow:0 0 18px rgba(0,0,0,0.5);
}

/* --- TAP TO PRAY --- */
#prayer-count {
    color:white;
    margin-top:8px;
    font-size:14px;
    opacity:0.9;
}

/* --- TAP STREAK --- */
#tap-streak {
    color:white;
    margin-top:16px;
    font-size:14px;
    opacity:0.9;
}

/* --- LISTEN STATUS --- */
#listen-status {
    margin-top:10px;
    color:white;
    font-size:13px;
    opacity:0.85;
}

/* --- MOBILE --- */
@media (max-width:480px) {
    .logo-container img {max-width:200px;}
}
</style>
</head>
<body>

<!-- LOGO -->
<div class="logo-container">
    <img src="logo.svg" alt="Logo">
    <div class="tagline">One Tap Closer to Christ</div>
</div>

<!-- MAIN CONTENT -->
<div class="center-container">
    <div id="votd-header">
        Verse of the Day - <span id="todays-date"></span>
    </div>

    <div id="votd-container">
        <div id="verse-text">Loading daily verse...</div>
        <div id="verse-ref"></div>
    </div>

    <div class="translation">
        Translation:
        <select onchange="changeTranslation(this.value)">
            <option value="kjv">KJV</option>
            <option value="niv">NIV</option>
            <option value="nlt" selected>NLT</option>
        </select>
    </div>

    <div class="action-buttons">
        <button class="btn" onclick="playNaturalTTS()">Listen</button>
        <button class="btn" onclick="copyVerse()">Copy</button>
        <button class="btn" onclick="shareVerse()">Share</button>
        <button class="btn" onclick="tapToPray()">Tap to Pray</button>
    </div>

    <div id="listen-status">Natural voice: first play may take a moment…</div>

    <div id="daily-prayer"></div>

    <div id="prayer-count">You've prayed 0 times today</div>

    <div id="tap-streak">Tap Streak: Loading...</div>
</div>

<script>
/* ------------------------------
   BACKGROUND ROTATION
--------------------------------*/
const backgrounds = [
  "backgrounds/Background1.png",
  "backgrounds/Background2.png",
  "backgrounds/Background3.png"
];

document.body.style.backgroundImage =
    `url('${backgrounds[Math.floor(Math.random() * backgrounds.length)]}')`;

/* ------------------------------
   VERSE SYSTEM
--------------------------------*/
let verses = { kjv:{}, niv:{}, nlt:{} };
let dailyKey = "";
let translation = "nlt";  /* DEFAULT TO NLT */

function flattenJSON(json){
    let flat = {};
    for (const book in json) {
        const chapters = json[book];
        for (const chapterNum in chapters) {
            const versesObj = chapters[chapterNum];
            for (const verseNum in versesObj) {
                const ref = `${book} ${chapterNum}:${verseNum}`;
                flat[ref] = versesObj[verseNum];
            }
        }
    }
    return flat;
}

async function loadTranslation(trans, url){
    const res = await fetch(url);
    const data = await res.json();
    verses[trans] = flattenJSON(data);
}

function pickDailyVerse(){
    const keys = Object.keys(verses.nlt);
    const date = new Date();
    const seed = date.getUTCFullYear()*10000 + (date.getUTCMonth()+1)*100 + date.getUTCDate();
    dailyKey = keys[seed % keys.length];
}

function displayVerse(){
    document.getElementById("votd-container").classList.add("show");
    document.getElementById("verse-text").innerText =
        verses[translation][dailyKey] || "Verse not available";
    document.getElementById("verse-ref").innerText =
        `${dailyKey} (${translation.toUpperCase()})`;
}

function changeTranslation(val){
    translation = val;
    displayVerse();
}

/* ------------------------------
   COPY + SHARE
--------------------------------*/
function copyVerse(){
    navigator.clipboard.writeText(
        `${verses[translation][dailyKey]} — ${dailyKey}`
    );
    alert("Verse copied!");
}

function shareVerse(){
    if (navigator.share){
        navigator.share({
            title:"Verse of the Day",
            text:`${verses[translation][dailyKey]} — ${dailyKey}`,
            url:"https://tapnpray.github.io"
        });
    } else {
        copyVerse();
    }
}

/* ------------------------------
   DATE
--------------------------------*/
function displayTodaysDate(){
    const today = new Date();
    const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById("todays-date").innerText =
        today.toLocaleDateString('en-US', options);
}

/* ------------------------------
   TAP STREAK SYSTEM
--------------------------------*/
function updateTapStreak() {
    const streakKey = "tapnpray_streak";
    const lastTapKey = "tapnpray_lastTap";

    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    let streak = parseInt(localStorage.getItem(streakKey)) || 0;
    let lastTap = localStorage.getItem(lastTapKey);

    if (lastTap) {
        lastTap = new Date(lastTap);
        const last = new Date(lastTap.getFullYear(), lastTap.getMonth(), lastTap.getDate());

        const diffDays = Math.floor((today - last) / (1000 * 60 * 60 * 24));

        if (diffDays === 0) {
            // Already tapped today — streak stays the same
        } else if (diffDays === 1) {
            // New day — streak continues
            streak += 1;
        } else {
            // Missed a day — streak resets
            streak = 1;
        }
    } else {
        // First ever tap
        streak = 1;
    }

    localStorage.setItem(streakKey, streak);
    localStorage.setItem(lastTapKey, today.toISOString());

    const streakEl = document.getElementById("tap-streak");
    streakEl.innerText = `Tap Streak: ${streak} day${streak === 1 ? "" : "s"}`;
}

/* ------------------------------
   DAILY PRAYER
--------------------------------*/
const dailyPrayerText = `Great God, I am amazed at Your plan to save us from sin, death, and the devil. Thank You for sending Your Son to suffer for us — the perfect, sinless Lamb that even death could not defeat. Help my heart overflow with praise every single day for Your victorious Resurrection that secured my salvation forever. Amen.`;

function displayDailyPrayer() {
    document.getElementById("daily-prayer").innerText = dailyPrayerText;
}

/* ------------------------------
   TAP TO PRAY (LOCAL DAILY COUNT)
--------------------------------*/
function getTodayKey() {
    const now = new Date();
    return `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
}

function loadPrayerCount() {
    const todayKey = getTodayKey();
    const storedDate = localStorage.getItem("tapnpray_prayerDate");
    let count = 0;

    if (storedDate === todayKey) {
        count = parseInt(localStorage.getItem("tapnpray_prayerCount")) || 0;
    } else {
        localStorage.setItem("tapnpray_prayerDate", todayKey);
        localStorage.setItem("tapnpray_prayerCount", "0");
    }

    updatePrayerCountDisplay(count);
}

function updatePrayerCountDisplay(count) {
    document.getElementById("prayer-count").innerText =
        `You've prayed ${count} time${count === 1 ? "" : "s"} today`;
}

function tapToPray() {
    const todayKey = getTodayKey();
    const storedDate = localStorage.getItem("tapnpray_prayerDate");
    let count = 0;

    if (storedDate === todayKey) {
        count = parseInt(localStorage.getItem("tapnpray_prayerCount")) || 0;
    } else {
        localStorage.setItem("tapnpray_prayerDate", todayKey);
        count = 0;
    }

    count += 1;
    localStorage.setItem("tapnpray_prayerDate", todayKey);
    localStorage.setItem("tapnpray_prayerCount", String(count));

    updatePrayerCountDisplay(count);
}

/* ------------------------------
   NATURAL TTS (HUGGINGFACE VITS)
--------------------------------*/
let ttsBusy = false;

async function playNaturalTTS() {
    if (ttsBusy) return;
    ttsBusy = true;

    const statusEl = document.getElementById("listen-status");
    statusEl.innerText = "Preparing natural voice…";

    const text = verses[translation][dailyKey] + " — " + dailyKey;

    try {
        const response = await fetch(
            "https://api-inference.huggingface.co/models/espnet/kan-bayashi_ljspeech_vits",
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: text })
            }
        );

        if (!response.ok) {
            statusEl.innerText = "Voice unavailable right now. Try again later.";
            ttsBusy = false;
            return;
        }

        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);

        const audio = new Audio(audioUrl);
        audio.onended = () => {
            URL.revokeObjectURL(audioUrl);
        };
        audio.play();

        statusEl.innerText = "Natural voice ready. Tap Listen anytime.";
    } catch (e) {
        console.error(e);
        statusEl.innerText = "Voice unavailable right now. Try again later.";
    } finally {
        ttsBusy = false;
    }
}

/* ------------------------------
   INIT
--------------------------------*/
async function init(){
    await Promise.all([
        loadTranslation("kjv","https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/KJV/KJV_bible.json"),
        loadTranslation("niv","https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/NIV/NIV_bible.json"),
        loadTranslation("nlt","https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/NLT/NLT_bible.json")
    ]);

    pickDailyVerse();

    /* --- UTC-SAFE OVERRIDE FOR TODAY --- */
    const now = new Date();
    const todayUTC = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
    const overrideDate = new Date(Date.UTC(2026, 3, 5)); // April 5, 2026

    if (
        todayUTC.getUTCFullYear() === overrideDate.getUTCFullYear() &&
        todayUTC.getUTCMonth() === overrideDate.getUTCMonth() &&
        todayUTC.getUTCDate() === overrideDate.getUTCDate()
    ) {
        dailyKey = "Matthew 28:6";
    }

    displayTodaysDate();
    displayVerse();
    displayDailyPrayer();
    loadPrayerCount();
    updateTapStreak();
}

window.addEventListener("load", init);
</script>

</body>
</html>
