<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#108cd7">
<link rel="manifest" href="manifest.json">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer=[];function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Inter,sans-serif;color:#fff;
 background-size:cover;background-position:center;
}

/* BACKGROUND */
body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.9));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(12px);z-index:-1;
}

/* HEADER */
.logo-container{
 position:fixed;top:10px;left:50%;
 transform:translateX(-50%);
 text-align:center;
}
.logo-container img{max-width:85px;}
.tagline{font-size:11px;opacity:.85}

/* MAIN */
.center{
 height:100%;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 padding:120px 20px 160px;
 box-sizing:border-box;
}

/* CARD */
#votd{
 position:relative;
 background:rgba(0,0,0,.78);
 border-radius:24px;
 padding:30px 22px;
 width:100%;max-width:520px;
 backdrop-filter:blur(20px);
 text-align:center;
}

/* AUDIO TOGGLE */
#audioToggle{
 position:absolute;
 top:12px;
 right:12px;
 font-size:20px;
 cursor:pointer;
 z-index:10;
}

/* TEXT */
#date{color:#108cd7;margin-bottom:10px;font-size:14px;}

#verse{
 font-size:clamp(26px,6vw,36px);
 line-height:1.7;
 opacity:0;
 transition:opacity 5s ease;
 padding:0 10px;
}

#verse.show{opacity:1;}

.word{
 opacity:.35;
 transition:opacity .4s ease;
}
.word.active{
 opacity:1;
}

#ref{color:#108cd7;margin-top:10px;font-size:14px}

/* BUTTONS */
.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;margin-top:20px;
}
.btn{
 padding:14px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;
 font-weight:bold;
}
.primary{background:#108cd7}

/* STREAK */
#streak{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:8px 16px;
 border-radius:999px;
 font-size:14px;
}
</style>
</head>

<body>

<div class="logo-container">
<img src="logo.svg">
<div class="tagline">One Tap Closer to Christ</div>
</div>

<div class="center">
<div id="votd">

<div id="audioToggle" onclick="toggleAudio()">🎧</div>

<div id="date"></div>
<div id="verse"></div>
<div id="ref"></div>

<select id="translationSelect"></select>

<div class="actions">
<button class="btn primary" onclick="playVerse()">Listen</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
<button class="btn" onclick="donate()">💙 Support</button>
</div>

</div>
</div>

<div id="streak"></div>

<audio id="ambientAudio" loop>
<source src="sounds/calm.mp3">
</audio>

<script>

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('/sw.js');
}

/* BACKGROUND ROTATION */
const backgrounds=[
 "backgrounds/morning1.png",
 "backgrounds/morning2.png",
 "backgrounds/day1.png"
];
let bgIndex=0;
function setBG(i){
 document.body.style.backgroundImage=`url('${backgrounds[i]}')`;
}
setBG(bgIndex);
setInterval(()=>{
 bgIndex=(bgIndex+1)%backgrounds.length;
 setBG(bgIndex);
},60000);

/* VERSES */
let verses={kjv:{},niv:{},nlt:{}};
let key="",translation="nlt";

/* LOAD */
async function loadTranslation(t){
 if(Object.keys(verses[t]).length)return;
 const res=await fetch(`https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 const data=await res.json();
 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];
 verses[t]=flat;
}

function seed(len){
 const d=new Date();
 return (d.getFullYear()*10000+d.getMonth()*100+d.getDate())%len;
}

/* INIT */
async function init(){
 await loadTranslation("nlt");
 const keys=Object.keys(verses.nlt);
 key=keys[seed(keys.length)];

 setupTranslations();
 update();
 streak();

 setupAudio();
 playVerse();
}

/* TRANSLATIONS */
function setupTranslations(){
 const s=document.getElementById("translationSelect");
 ["kjv","niv","nlt"].forEach(t=>{
  let o=document.createElement("option");
  o.value=t;o.textContent=t.toUpperCase();
  if(t==="nlt")o.selected=true;
  s.appendChild(o);
 });

 s.onchange=async e=>{
  translation=e.target.value;
  await loadTranslation(translation);
  update();
  playVerse();
 };
}

/* UPDATE */
function update(){
 const verseEl=document.getElementById("verse");
 const text=verses[translation][key];

 const words=text.split(" ");
 verseEl.innerHTML=words.map(w=>`<span class="word">${w}</span>`).join(" ");

 document.getElementById("ref").innerHTML=
 `<span style="color:#108cd7">${key}</span> (${translation.toUpperCase()})`;

 document.getElementById("date").innerText=new Date().toDateString();

 setTimeout(()=>verseEl.classList.add("show"),200);
}

/* AUDIO */
let audioOn=true;

function setupAudio(){
 const saved=localStorage.getItem("audioOn");
 audioOn = saved !== "false";

 const icon=document.getElementById("audioToggle");

 if(audioOn){
  icon.innerText="🎧";
  startAmbient();
 } else {
  icon.innerText="🔇";
 }
}

function startAmbient(){
 const a=document.getElementById("ambientAudio");
 a.volume=0;
 a.play().catch(()=>{});

 fadeAudio(a,0.25,2000);
}

function fadeAudio(audio,target,duration){
 const step=(target-audio.volume)/(duration/50);

 const fade=setInterval(()=>{
  audio.volume+=step;

  if(
   (step>0 && audio.volume>=target) ||
   (step<0 && audio.volume<=target)
  ){
   audio.volume=target;
   clearInterval(fade);
  }
 },50);
}

function toggleAudio(){
 const a=document.getElementById("ambientAudio");
 const icon=document.getElementById("audioToggle");

 if(audioOn){
  fadeAudio(a,0,800);
  icon.innerText="🔇";
  audioOn=false;
 } else {
  a.play().catch(()=>{});
  fadeAudio(a,0.25,1200);
  icon.innerText="🎧";
  audioOn=true;
 }

 localStorage.setItem("audioOn",audioOn);
}

/* BETTER VOICE */
function getBestVoice(){
 const voices=speechSynthesis.getVoices();

 const preferred=[
  "Google UK English Female",
  "Samantha",
  "Serena"
 ];

 for(const name of preferred){
  const v=voices.find(v=>v.name===name);
  if(v) return v;
 }

 return voices[0];
}

/* SPEECH */
function playVerse(){
 const text=verses[translation][key];
 const words=document.querySelectorAll(".word");

 let i=0;

 const utter=new SpeechSynthesisUtterance(text);
 utter.rate=.85;

 const voice=getBestVoice();
 if(voice) utter.voice=voice;

 utter.onboundary=(event)=>{
  if(event.name==="word" && words[i]){
   words[i].classList.add("active");
   i++;
  }
 };

 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* OTHER */
function copyVerse(){
 navigator.clipboard.writeText(verses[translation][key]+" — "+key);
}
function shareVerse(){
 navigator.share?.({text:verses[translation][key]+" — "+key});
}
function donate(){
 window.open("https://venmo.com/u/tapnpray");
}

/* STREAK */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

window.onload=init;

</script>

</body>
</html>
