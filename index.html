<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Arial,sans-serif;color:#fff;
 background-size:cover;background-position:center;
}
body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.9));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(12px);z-index:-1;
}

.logo-container{
 position:fixed;bottom:25px;left:20px;opacity:.7;
}
.logo-container img{max-width:55px}

.center{
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:100px 15px 180px;
 box-sizing:border-box;
}

#votd{
 position:relative;
 background:rgba(0,0,0,.55);
 border-radius:28px;
 padding:24px;
 max-width:520px;width:100%;
 backdrop-filter:blur(30px);
 text-align:center;
 max-height:65vh;
 display:flex;
 flex-direction:column;
}

#verse{
 font-size:clamp(22px,5vw,30px);
 line-height:1.6;
 overflow-y:auto;
}

.word{opacity:.35;transition:.3s}
.word.active{opacity:1}

#favoriteStar{position:absolute;top:12px;left:12px;font-size:22px;cursor:pointer;}
#ambientToggle{
 position:absolute;top:12px;right:12px;cursor:pointer;font-size:18px;
}
#ambientToggle.active{
 color:#7CFFB2;
 text-shadow:0 0 8px rgba(124,255,178,0.8);
 transform:scale(1.1);
}

#title{font-size:14px;opacity:.85;margin-bottom:5px;}
#date{color:#108cd7;margin-bottom:8px}
#ref{color:#108cd7;margin-top:8px}

#topics{
 display:flex;flex-wrap:wrap;gap:8px;
 justify-content:center;margin:10px 0;
}
#topics button{
 padding:6px 12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;font-size:12px;cursor:pointer;
}
#topics button.active{background:#108cd7}

.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;margin-top:10px;
}
.btn{
 padding:12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;
}
.primary{background:#108cd7}

#favoritesModal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.95);
 display:none;overflow:auto;padding:20px;
}
.favorite-item{
 margin-bottom:15px;
 padding:15px;
 background:rgba(255,255,255,.1);
 border-radius:12px;
}

#bottomTagline{
 position:fixed;bottom:70px;width:100%;
 text-align:center;font-size:12px;
}
#streak{
 position:fixed;bottom:25px;left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:8px 16px;border-radius:999px;
}
</style>
</head>

<body>

<div class="logo-container"><img src="logo.svg"></div>

<div class="center">
<div id="votd">

<div id="favoriteStar" onclick="toggleFavorite()">☆</div>
<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="title">Daily Bible Verse</div>
<div id="date"></div>
<div id="verse"></div>
<div id="ref"></div>

<div id="topics">
<button class="active" onclick="goDaily(this)">Daily</button>
<button onclick="pickTopic('peace',this)">Peace</button>
<button onclick="pickTopic('strength',this)">Strength</button>
<button onclick="pickTopic('hope',this)">Hope</button>
<button onclick="pickTopic('guidance',this)">Guidance</button>
<button onclick="pickTopic('faith',this)">Faith</button>
</div>

<div class="actions">
<button class="btn primary" onclick="readVerse()">Read Verse</button>
<button class="btn" onclick="openFavorites()">Favorites</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="bottomTagline">One Tap Closer to Christ</div>
<div id="streak"></div>

<div id="favoritesModal" onclick="closeFavorites(event)">
<div id="favoritesContent"></div>
</div>

<audio id="ambientAudio" loop>
<source src="sounds/calm.mp3">
</audio>

<script>

/* Analytics */
function track(name){ if(typeof gtag==="function"){ gtag('event',name); } }

/* Background */
const backgrounds=["backgrounds/morning1.png","backgrounds/morning2.png","backgrounds/day1.png"];
let i=0;
document.body.style.backgroundImage=`url('${backgrounds[i]}')`;
setInterval(()=>{i=(i+1)%backgrounds.length;
document.body.style.backgroundImage=`url('${backgrounds[i]}')`;},60000);

/* Data */
let verses={},key="",dailyKey="",topicKeys={};

/* Load */
async function load(){
 const res=await fetch("BIBLE/NLT/NLT_bible.json");
 const data=await res.json();
 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];
 verses=flat;
 generateDaily();
}

/* Daily */
function generateDaily(){
 const keys=Object.keys(verses);
 const seed=Math.abs([...new Date().toISOString().slice(0,10)].reduce((a,c)=>a+c.charCodeAt(0),0));
 dailyKey=keys[seed%keys.length];

 ["peace","strength","hope","guidance","faith"].forEach(t=>{
  let list=keys.filter(ref=>{
   let txt=verses[ref].toLowerCase();
   return topicMap[t].some(w=>txt.includes(w));
  });
  if(list.length) topicKeys[t]=list[(seed+t.length)%list.length];
 });

 key=dailyKey;
 update();
 streak();
}

/* Update */
function update(){
 const words=verses[key].split(" ");
 document.getElementById("verse").innerHTML=
 words.map(w=>`<span class="word">${w}</span>`).join(" ");
 document.getElementById("ref").innerText=key;
 document.getElementById("date").innerText=new Date().toDateString();
 updateStar();
}

/* Topics */
const topicMap={
 peace:["peace","rest"],
 strength:["strength","power"],
 hope:["hope","future"],
 guidance:["wisdom","path"],
 faith:["faith","trust"]
};

function pickTopic(t,btn){
 key=topicKeys[t]||dailyKey;
 track("topic_"+t);
 update();setActive(btn);
}
function goDaily(btn){
 key=dailyKey;
 update();setActive(btn);
}
function setActive(btn){
 document.querySelectorAll("#topics button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

/* AUDIO (FINAL FIXED) */
let ambientOn=localStorage.getItem("ambientOn")==="true";
let fadeInterval=null;
let tapLock=false;

const audio=document.getElementById("ambientAudio");
const btn=document.getElementById("ambientToggle");

if(ambientOn){
 btn.classList.add("active");
 audio.volume=0.3;
 audio.play().catch(()=>{});
}

function toggleAmbient(){
 if(tapLock)return;
 tapLock=true;
 setTimeout(()=>tapLock=false,300);

 if(ambientOn){
  fadeAudio(audio,0,1000,()=>{
   btn.classList.remove("active");
   ambientOn=false;
   localStorage.setItem("ambientOn","false");
   track("ambient_off");
  });
 }else{
  audio.volume=0;
  audio.play().catch(()=>{});
  fadeAudio(audio,0.3,1000,()=>{
   btn.classList.add("active");
   ambientOn=true;
   localStorage.setItem("ambientOn","true");
   track("ambient_on");
  });
 }
}

function fadeAudio(audio,target,duration,callback){
 if(fadeInterval) clearInterval(fadeInterval);

 const start=audio.volume;
 const diff=target-start;
 const steps=duration/50;
 let step=0;

 fadeInterval=setInterval(()=>{
  step++;
  audio.volume=start+(diff*(step/steps));

  if(step>=steps){
   audio.volume=target;

   if(target===0){
    audio.pause();
    audio.currentTime=0;
    audio.volume=0;
   }

   clearInterval(fadeInterval);
   if(callback) callback();
  }
 },50);
}

/* Read */
function readVerse(){
 track("read_verse");
 const words=document.querySelectorAll(".word");
 words.forEach(w=>w.classList.remove("active"));
 let i=0;
 const utter=new SpeechSynthesisUtterance(verses[key]);
 utter.onboundary=e=>{
  if(e.name==="word"&&words[i]){
   words[i].classList.add("active"); i++;
  }
 };
 utter.onend=()=>speechSynthesis.speak(new SpeechSynthesisUtterance(key));
 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* Favorites */
function getFavs(){return JSON.parse(localStorage.getItem("favs")||"[]");}
function toggleFavorite(){
 let f=getFavs();
 if(f.includes(key)){f=f.filter(x=>x!==key);}else{f.push(key);}
 localStorage.setItem("favs",JSON.stringify(f));
 updateStar();
}
function updateStar(){
 document.getElementById("favoriteStar").innerText=
 getFavs().includes(key)?"⭐":"☆";
}
function openFavorites(){
 let c=document.getElementById("favoritesContent");
 c.innerHTML="<h2>Saved Verses</h2>";
 getFavs().forEach(ref=>{
  c.innerHTML+=`<div class="favorite-item"><b>${ref}</b><br>${verses[ref]}<br><button onclick="deleteFavorite('${ref}')">🗑 Remove</button></div>`;
 });
 document.getElementById("favoritesModal").style.display="block";
}
function deleteFavorite(ref){
 let f=getFavs().filter(x=>x!==ref);
 localStorage.setItem("favs",JSON.stringify(f));
 openFavorites();updateStar();
}
function closeFavorites(e){
 if(e.target.id==="favoritesModal")
  document.getElementById("favoritesModal").style.display="none";
}

/* Share */
function shareVerse(){
 track("share");
 navigator.share?.({text:verses[key]+" — "+key});
}

/* Copy */
function copyVerse(){
 navigator.clipboard.writeText(verses[key]+" — "+key);
}

/* Streak */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

load();

</script>

</body>
</html>
