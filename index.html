<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Tap N Pray - One Tap, One Verse, One Step Closer to Christ.">

<link rel="apple-touch-icon" href="favicon.png">

<meta property="og:image:height" content="630">

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  color: #fff;
  padding-bottom: env(safe-area-inset-bottom);
  padding-top: env(safe-area-inset-top);
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-image: var(--bg-image);
  filter: brightness(calc(var(--brightness) * 0.55)) blur(3px);
  transform: scale(1.05);
  transition: filter 1s ease;
  z-index: -1;
}

/* LOGO */
#topLogo {
  width: 120px;
  margin: 20px auto 10px;
  display: block;
}

/* CENTER */
.center {
  min-height: calc(100vh - 260px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
}

/* VERSE BOX */
#votd {
  position: relative;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(25px) brightness(0.9);
  border-radius: 28px;
  padding: 24px;
  max-width: 700px;
  width: 100%;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ICONS */
#readIcon, #ambientToggle {
  position: absolute;
  top: 12px;
  font-size: 26px;
  padding: 8px;
  cursor: pointer;
}

#readIcon { left: 12px; }
#ambientToggle { right: 12px; }

#ambientToggle.active { color: #7CFFB2; }

/* TEXT */
#title { font-size: 15px; margin-top: 6px; }
#date, #ref { color: #108cd7; font-size: 14px; }

#verse {
  margin-top: 10px;
  font-size: clamp(22px, 5vw, 32px);
  line-height: 1.7;
  overflow-y: auto;
  cursor: pointer;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

.word { opacity: .35; }
.word.active { opacity: 1; }

/* CONTROLS */
.translation-select {
  margin-top: 8px;
  border-radius: 999px;
  background: rgba(255,255,255,.15);
  color: #fff;
  border: none;
  padding: 4px 10px;
}

.mode-buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.mode-buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 999px;
  border: none;
  background: rgba(255,255,255,.15);
  color: #fff;
}

.mode-buttons button.active {
  background: #108cd7;
}

.actions { margin-top: 10px; }

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 999px;
  background: #108cd7;
  color: #fff;
}

/* STREAK BADGE */
#streak {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.6);
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
  z-index: 20;
}

/* FIXED STREAK MODAL */
#streakModal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 999;
}

/* GLASS CARD (matches verse box) */
.streak-card {
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(25px) brightness(0.9);
  border-radius: 28px;
  padding: 30px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
}

/* BADGES */
.badges {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin: 20px 0;
}

.badge { opacity: .3; font-size: 28px; }
.badge.active { opacity: 1; }

/* PROGRESS BAR */
.progress {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,.2);
  border-radius: 999px;
}

.progress div {
  height: 100%;
  background: #108cd7;
}

</style>
</head>
<body>

<!-- TOP LOGO -->
<img id="topLogo" src="logo.svg" alt="Tap N Pray Logo">

<div class="center">
  <div id="votd">

    <!-- ICONS -->
    <div id="readIcon">🔊</div>
    <div id="ambientToggle">🌿</div>

    <!-- CONTENT -->
    <div id="title">Daily Bible Verse</div>
    <div id="date"></div>
    <div id="verse"></div>
    <div id="ref"></div>

    <!-- TRANSLATION -->
    <select id="translationSelect" class="translation-select">
      <option value="nlt">NLT</option>
      <option value="niv">NIV</option>
      <option value="kjv">KJV</option>
    </select>

    <!-- MODE -->
    <div class="mode-buttons">
      <button id="dailyBtn" class="active">Daily</button>
      <button id="randomBtn">Random</button>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn" id="shareBtn">Share</button>
    </div>

  </div>
</div>

<!-- STREAK BADGE -->
<div id="streak"></div>

<!-- STREAK MODAL -->
<div id="streakModal">
  <div class="streak-card">
    <h1 id="streakCount"></h1>
    <div id="streakMsg"></div>

    <div class="badges">
      <span class="badge" id="b7">🌿</span>
      <span class="badge" id="b30">🔥</span>
      <span class="badge" id="b100">👑</span>
    </div>

    <div class="progress">
      <div id="progressBar"></div>
    </div>
  </div>
</div>

<!-- AUDIO -->
<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>

<script>

/* =========================
   DOM SHORTCUTS
========================= */
const titleEl = document.getElementById("title");
const dateEl = document.getElementById("date");
const verseEl = document.getElementById("verse");
const refEl = document.getElementById("ref");
const translationSelect = document.getElementById("translationSelect");
const dailyBtn = document.getElementById("dailyBtn");
const randomBtn = document.getElementById("randomBtn");
const shareBtn = document.getElementById("shareBtn");
const readIcon = document.getElementById("readIcon");
const ambientToggle = document.getElementById("ambientToggle");
const streakEl = document.getElementById("streak");
const streakModal = document.getElementById("streakModal");
const streakCount = document.getElementById("streakCount");
const streakMsg = document.getElementById("streakMsg");
const b7 = document.getElementById("b7");
const b30 = document.getElementById("b30");
const b100 = document.getElementById("b100");
const progressBar = document.getElementById("progressBar");
const ambientAudio = document.getElementById("ambientAudio");

/* =========================
   BACKGROUNDS
========================= */
const bgSets = {
  morning: ["/backgrounds/morning1.png","/backgrounds/morning2.png"],
  day: ["/backgrounds/day1.png","/backgrounds/day2.png"],
  evening: ["/backgrounds/evening1.png","/backgrounds/evening2.png"],
  night: ["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let currentBackground = "";
let currentBrightness = 1.0;

function getTimeBlock() {
  const h = new Date().getHours();
  if (h < 11) return "morning";
  if (h < 17) return "day";
  if (h < 21) return "evening";
  return "night";
}

/* FIXED BACKGROUND (NO FLICKER) */
function updateBackground() {
  const block = getTimeBlock();
  const set = bgSets[block];
  const img = set[Math.floor(Math.random() * set.length)];
  const brightness = (block === "night" || block === "evening") ? 0.75 : 1.0;

  const preload = new Image();
  preload.src = img;

  preload.onload = () => {
    document.body.style.setProperty('--bg-image', `url('${img}')`);
    document.body.style.setProperty('--brightness', brightness);
    currentBackground = img;
    currentBrightness = brightness;
  };
}

updateBackground();

/* =========================
   VERSES SYSTEM
========================= */
let verses = { nlt:{}, niv:{}, kjv:{} };
let translation = "nlt";
let dailyKey = "";
let currentKey = "";

async function loadTranslation(t) {
  try {
    const res = await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    if (!res.ok) return;

    const data = await res.json();

    Object.entries(data).forEach(([book, chapters]) => {
      Object.entries(chapters).forEach(([chapter, versesObj]) => {
        Object.entries(versesObj).forEach(([v, text]) => {
          verses[t][`${book} ${chapter}:${v}`] = text;
        });
      });
    });
  } catch {}
}

function getSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = (h << 5) - h + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function generateDaily() {
  const today = new Date().toDateString();
  const stored = JSON.parse(localStorage.getItem("dailyVerse") || "{}");

  if (stored.date === today) {
    dailyKey = stored.key;
  } else {
    const keys = Object.keys(verses.nlt);
    if (!keys.length) return;

    dailyKey = keys[getSeed(today) % keys.length];
    localStorage.setItem("dailyVerse", JSON.stringify({
      date: today,
      key: dailyKey
    }));
  }

  currentKey = dailyKey;
  updateVerse("Daily Bible Verse");
  updateStreak();
}

function showDaily() {
  currentKey = dailyKey;
  updateVerse("Daily Bible Verse");
  dailyBtn.classList.add("active");
  randomBtn.classList.remove("active");
}

function showRandom() {
  const keys = Object.keys(verses[translation]);
  if (!keys.length) return;

  currentKey = keys[Math.floor(Math.random() * keys.length)];
  updateVerse("Random Bible Verse");

  dailyBtn.classList.remove("active");
  randomBtn.classList.add("active");
}

/* SAFE TRANSLATION SWITCH */
function changeTranslation(t) {
  translation = t;

  if (!verses[translation] || !Object.keys(verses[translation]).length) return;

  if (!verses[translation][currentKey]) {
    const keys = Object.keys(verses[translation]);
    if (!keys.length) return;
    currentKey = keys[0];
  }

  updateVerse(
    dailyBtn.classList.contains("active")
      ? "Daily Bible Verse"
      : "Random Bible Verse"
  );
}

function updateVerse(titleText) {
  const text = verses[translation][currentKey];
  if (!text) return;

  titleEl.innerText = titleText;

  verseEl.innerHTML = text
    .split(" ")
    .map(w => `<span class="word">${w}</span>`)
    .join(" ");

  refEl.innerText = currentKey;
  dateEl.innerText = new Date().toDateString();
}

/* =========================
   STREAK SYSTEM
========================= */
function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = localStorage.getItem("lastVisit");
  let streak = parseInt(localStorage.getItem("streak")) || 1;

  if (lastVisit) {
    const last = new Date(lastVisit);
    const now = new Date(today);
    const diff = Math.floor((now - last) / 86400000);

    if (diff === 1) streak++;
    else if (diff > 1) streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastVisit", today);

  streakEl.innerText = "🔥 " + streak + " Day Streak";
  streakCount.innerText = streak + " Days";
  streakMsg.innerText = "Keep going — 100 days is your next big milestone.";

  b7.classList.toggle("active", streak >= 7);
  b30.classList.toggle("active", streak >= 30);
  b100.classList.toggle("active", streak >= 100);

  progressBar.style.width = Math.min(100, streak) + "%";
}

function openStreak() {
  streakModal.style.display = "flex";
}

function closeStreak(e) {
  if (e.target === streakModal) {
    streakModal.style.display = "none";
  }
}

/* =========================
   READ (TTS)
========================= */
function readVerse() {
  const words = document.querySelectorAll(".word");
  words.forEach(w => w.classList.remove("active"));
  let i = 0;

  const text = verses?.[translation]?.[currentKey];
  if (!text) return;

  const u = new SpeechSynthesisUtterance(text + " " + currentKey);
  u.onboundary = () => {
    if (words[i]) words[i++].classList.add("active");
  };

  try {
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch {}
}

/* =========================
   AMBIENT AUDIO
========================= */
let ambientOn = false;

function toggleAmbient() {
  const a = ambientAudio;

  if (ambientOn) {
    fadeOut(a);
  } else {
    a.volume = 0;
    a.play().catch(()=>{});
    fadeIn(a);
  }

  ambientOn = !ambientOn;
  ambientToggle.classList.toggle("active");
}

function fadeIn(a) {
  let v = 0;
  const i = setInterval(() => {
    v += 0.05;
    if (v >= 0.3) {
      v = 0.3;
      clearInterval(i);
    }
    a.volume = v;
  }, 100);
}

function fadeOut(a) {
  let v = a.volume;
  const i = setInterval(() => {
    v -= 0.05;
    if (v <= 0) {
      clearInterval(i);
      a.pause();
      a.currentTime = 0;
    }
    a.volume = v;
  }, 100);
}

/* =========================
   PREMIUM SHARE (CANVAS)
========================= */
async function shareVerse() {
  try {
    if (!verses || !translation || !currentKey) return;

    const verseText = verses?.[translation]?.[currentKey];
    if (!verseText) return;

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;
    const ctx = canvas.getContext("2d");

    /* LOAD BACKGROUND SAFELY */
    let bgLoaded = false;
    let bgImg = new Image();

    if (currentBackground) {
      bgImg.crossOrigin = "anonymous";
      bgImg.src = currentBackground;

      await new Promise(res => {
        bgImg.onload = () => { bgLoaded = true; res(); };
        bgImg.onerror = res;
      });
    }

    /* DRAW BACKGROUND */
    if (bgLoaded) {
      ctx.filter = `brightness(${(currentBrightness || 1) * 0.6}) blur(6px)`;
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
      ctx.filter = "none";
    } else {
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    /* GLASS CARD */
    const x = 120, y = 200, w = 840, h = 520, r = 40;

    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();

    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fill();

    /* TEXT */
    ctx.fillStyle = "#F2F2F2";
    ctx.textAlign = "center";
    ctx.font = "bold 46px Georgia";

    const words = verseText.split(" ");
    let line = "";
    const lines = [];
    const maxWidth = w - 120;

    words.forEach(word => {
      const test = line + word + " ";
      if (ctx.measureText(test).width > maxWidth) {
        lines.push(line);
        line = word + " ";
      } else {
        line = test;
      }
    });
    lines.push(line);

    const startY = y + 120;

    lines.forEach((l, i) => {
      ctx.fillText(l.trim(), canvas.width / 2, startY + i * 60);
    });

    /* REFERENCE */
    ctx.font = "bold 36px Georgia";
    ctx.fillStyle = "#108cd7";
    ctx.fillText(currentKey, canvas.width / 2, y + h - 40);

    /* LOGO */
    try {
      const logo = new Image();
      logo.src = "logo.svg";

      await new Promise(res => {
        logo.onload = res;
        logo.onerror = res;
      });

      ctx.drawImage(logo, 60, canvas.height - 160, 100, 100);
    } catch {}

    /* URL */
    ctx.font = "bold 26px Georgia";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "left";
    ctx.fillText("tapnpray.github.io", 60, canvas.height - 30);

    /* EXPORT */
    const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
    if (!blob) return;

    const file = new File([blob], "tapnpray.png", { type: "image/png" });

    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "Tap N Pray",
          text: verseText + "\n\n" + currentKey
        });
        return;
      } catch {}
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tapnpray.png";
    a.click();
    URL.revokeObjectURL(url);

  } catch (err) {
    console.error("Share error:", err);
  }
}

/* =========================
   EVENTS
========================= */
readIcon.addEventListener("click", readVerse);
verseEl.addEventListener("click", readVerse);
ambientToggle.addEventListener("click", toggleAmbient);
dailyBtn.addEventListener("click", showDaily);
randomBtn.addEventListener("click", showRandom);
translationSelect.addEventListener("change", e => changeTranslation(e.target.value));
shareBtn.addEventListener("click", shareVerse);

streakEl.addEventListener("click", openStreak);
streakModal.addEventListener("click", closeStreak);

/* =========================
   INIT
========================= */
(async () => {
  await loadTranslation("nlt");
  await loadTranslation("niv");
  await loadTranslation("kjv");
  generateDaily();
})();
</script>
</body>
</html>
