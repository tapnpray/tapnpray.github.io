<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray – Verse of the Day</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#108cd7">
<link rel="manifest" href="manifest.json">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

html, body {
    height:100%;
    margin:0;
    overflow:hidden;
    overscroll-behavior:none;
    font-family:'Inter',sans-serif;
    color:white;
    background:#000;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

button, select {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

body::before {
    content:"";
    position:fixed;
    width:100%; height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.75));
    z-index:-2;
}
body::after {
    content:"";
    position:fixed;
    width:100%; height:100%;
    backdrop-filter:blur(10px);
    z-index:-1;
}

/* HEADER */
.logo-container {
    position:fixed;
    top:12px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}
.logo-container img {
    max-width:120px;
}
.tagline {
    font-size:11px;
    opacity:0.8;
}

/* LAYOUT */
.center {
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:150px;
    padding-bottom:90px;
    padding-left:16px;
    padding-right:16px;
    box-sizing:border-box;
}

/* CARD */
#votd {
    background:rgba(0,0,0,0.55);
    border-radius:24px;
    padding:36px 26px;
    max-width:520px;
    width:100%;
    backdrop-filter:blur(25px);
    box-shadow:0 12px 45px rgba(0,0,0,0.65);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

/* TEXT */
#date { color:#108cd7; font-size:14px; }
#verse {
    font-size:clamp(24px,6vw,34px);
    line-height:1.7;
    text-align:center;
}
#ref { color:#108cd7; }

/* BUTTON GRID */
.actions {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    width:100%;
    max-width:320px;
}

.btn {
    padding:14px 0;
    border-radius:999px;
    border:none;
    background:rgba(255,255,255,0.18);
    color:white;
    cursor:pointer;
}

.primary {
    background:#108cd7;
}

/* STREAK */
#streak {
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
}
</style>
</head>

<body>

<div class="logo-container">
    <img src="logo.svg">
    <div class="tagline">One Tap Closer to Christ</div>
</div>

<div class="center">
<div id="votd">
    <div id="date"></div>
    <div id="verse">Loading...</div>
    <div id="ref"></div>

    <select id="translationSelect"></select>

    <div class="actions">
        <button class="btn primary" onclick="playVerse()">Listen</button>
        <button class="btn" onclick="copyVerse()">Copy</button>
        <button class="btn" onclick="shareVerse()">Share</button>
        <button class="btn" onclick="saveFavorite()">⭐ Save</button>
        <button class="btn" onclick="toggleSound()" id="soundBtn">🌧️ Sound</button>
    </div>
</div>
</div>

<div id="streak"></div>

<audio id="ambientAudio" loop>
    <source src="sounds/rain.mp3" type="audio/mpeg">
</audio>

<script>
/* BACKGROUND */
const backgrounds=[
 "backgrounds/morning1.png",
 "backgrounds/morning2.png",
 "backgrounds/day1.png"
];
let i=0;

function setBG(n){
 document.body.style.backgroundImage=`url('${backgrounds[n]}')`;
}
setBG(i);
setInterval(()=>{i=(i+1)%backgrounds.length; setBG(i);},60000);

/* VERSES */
let verses={},key="",translation="nlt";

async function load(){
 let r=await fetch("https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/NLT/NLT_bible.json");
 let j=await r.json(),f={};
 for(let b in j)for(let c in j[b])for(let v in j[b][c])f[`${b} ${c}:${v}`]=j[b][c][v];
 verses=f;
 let k=Object.keys(verses);
 key=k[new Date().getDate()%k.length];
 update();
}

function update(){
 document.getElementById("verse").innerText=verses[key];
 document.getElementById("ref").innerText=key;
 document.getElementById("date").innerText=new Date().toDateString();
}

/* SHARE ELITE */
async function shareVerse(){
 const verse=verses[key];
 const ref=key;

 const canvas=document.createElement("canvas");
 canvas.width=1080;
 canvas.height=1920;
 const ctx=canvas.getContext("2d");

 const bg=new Image();
 bg.src=backgrounds[i];
 await new Promise(r=>bg.onload=r);

 ctx.drawImage(bg,0,0,1080,1920);

 const grad=ctx.createLinearGradient(0,0,0,1920);
 grad.addColorStop(0,"rgba(0,0,0,0.3)");
 grad.addColorStop(1,"rgba(0,0,0,0.8)");
 ctx.fillStyle=grad;
 ctx.fillRect(0,0,1080,1920);

 ctx.fillStyle="#fff";
 ctx.font="bold 50px Arial";
 ctx.textAlign="center";
 wrapText(ctx,verse,540,700,800,60);

 ctx.fillStyle="#108cd7";
 ctx.fillText(ref,540,1100);

 canvas.toBlob(async blob=>{
  const file=new File([blob],"verse.png",{type:"image/png"});
  if(navigator.canShare){
   await navigator.share({files:[file]});
  }
 });
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
 const words=text.split(" ");
 let line="";
 for(let n=0;n<words.length;n++){
  let test=line+words[n]+" ";
  if(ctx.measureText(test).width>maxWidth){
   ctx.fillText(line,x,y);
   line=words[n]+" ";
   y+=lineHeight;
  } else line=test;
 }
 ctx.fillText(line,x,y);
}

/* AUDIO */
function playVerse(){
 let u=new SpeechSynthesisUtterance(verses[key]);
 speechSynthesis.speak(u);
}

/* SOUND */
let sound=false;
function toggleSound(){
 const a=document.getElementById("ambientAudio");
 const b=document.getElementById("soundBtn");
 if(!sound){a.play(); b.innerText="🔇 Stop"; sound=true;}
 else{a.pause(); b.innerText="🌧️ Sound"; sound=false;}
}

/* FAVORITE */
function saveFavorite(){
 let f=JSON.parse(localStorage.getItem("fav")||"[]");
 f.push(verses[key]+" — "+key);
 localStorage.setItem("fav",JSON.stringify(f));
 alert("Saved!");
}

/* STREAK */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++; localStorage.setItem("s",s); localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

load(); streak();
</script>

</body>
</html>
