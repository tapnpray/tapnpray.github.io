<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Arial,sans-serif;color:#fff;
 background-size:cover;background-position:center;
 transition:background-image 2s ease-in-out;
}

/* BACKGROUND */
body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.9));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(12px);z-index:-1;
}

/* LOGO (BOTTOM LEFT) */
.logo-container{
 position:fixed;
 bottom:25px;
 left:20px;
 z-index:10;
 opacity:.75;
}
.logo-container img{
 max-width:55px;
}

/* MAIN */
.center{
 height:100%;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
 padding:120px 20px 180px;
 box-sizing:border-box;
}

/* GLASS CARD */
#votd{
 position:relative;
 background:rgba(0,0,0,.55);
 border-radius:28px;
 padding:34px 24px;
 width:100%;
 max-width:520px;

 backdrop-filter:blur(32px);
 -webkit-backdrop-filter:blur(32px);

 border:1px solid rgba(255,255,255,.12);

 box-shadow:
 0 10px 40px rgba(0,0,0,.5),
 inset 0 1px 0 rgba(255,255,255,.08);

 text-align:center;
}

/* AMBIENT ICON */
#ambientToggle{
 position:absolute;
 top:12px;
 right:12px;
 font-size:20px;
 cursor:pointer;
}

/* TEXT */
#date{color:#108cd7;margin-bottom:10px;font-size:14px;}

#verse{
 font-size:clamp(26px,6vw,36px);
 line-height:1.7;
 opacity:0;
 transition:opacity 5s ease;
 padding:0 10px;
}
#verse.show{opacity:1;}

.word{opacity:.35;transition:.3s;}
.word.active{opacity:1;}

#ref{color:#108cd7;margin-top:10px;font-size:14px}

/* BUTTONS */
.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;margin-top:20px;
}
.btn{
 padding:14px;
 border-radius:999px;
 border:none;
 background:rgba(255,255,255,.15);
 color:#fff;
 cursor:pointer;
 font-weight:bold;
}
.primary{background:#108cd7}

/* TAGLINE */
#bottomTagline{
 position:fixed;
 bottom:70px;
 width:100%;
 text-align:center;
 font-size:12px;
 opacity:.8;
}

/* STREAK */
#streak{
 position:fixed;
 bottom:25px;
 left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:8px 16px;
 border-radius:999px;
 font-size:14px;
}
</style>
</head>

<body>

<div class="logo-container">
<img src="logo.svg">
</div>

<div class="center">
<div id="votd">

<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="date"></div>
<div id="verse"></div>
<div id="ref"></div>

<select id="translationSelect"></select>

<div class="actions">
<button class="btn primary" onclick="readVerse()">Read Verse</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareImage()">Share</button>
<button class="btn" onclick="donate()">💙 Support</button>
</div>

</div>
</div>

<div id="bottomTagline">One Tap Closer to Christ</div>
<div id="streak"></div>

<audio id="ambientAudio" loop>
<source src="sounds/calm.mp3">
</audio>

<script>

/* BACKGROUNDS */
const backgrounds=[
 "backgrounds/morning1.png",
 "backgrounds/morning2.png",
 "backgrounds/day1.png"
];
let bgIndex=0;

function setBG(i){
 document.body.style.backgroundImage=`url('${backgrounds[i]}')`;
}
setBG(bgIndex);

setInterval(()=>{
 bgIndex=(bgIndex+1)%backgrounds.length;
 setBG(bgIndex);
},60000);

/* TOPIC FILTER */
const topics=[
 "hope","faith","love","peace","strength",
 "trust","fear","healing","joy",
 "grace","comfort","wisdom","protection"
];

function getFilteredVerses(allVerses){
 const filtered=[];

 for(const ref in allVerses){
  const text=allVerses[ref].toLowerCase();

  for(const topic of topics){
   if(text.includes(topic)){
    filtered.push(ref);
    break;
   }
  }
 }

 return filtered.length ? filtered : Object.keys(allVerses);
}

/* VERSES */
let verses={kjv:{},niv:{},nlt:{}};
let key="",translation="nlt";

async function loadTranslation(t){
 if(Object.keys(verses[t]).length)return;

 const res=await fetch(`https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 const data=await res.json();

 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];

 verses[t]=flat;
}

function seed(len){
 const d=new Date();
 return (d.getFullYear()*10000+d.getMonth()*100+d.getDate())%len;
}

async function init(){
 await loadTranslation("nlt");

 const filteredKeys=getFilteredVerses(verses.nlt);

 key=filteredKeys[seed(filteredKeys.length)];

 setupTranslations();
 update();
 streak();
}

/* TRANSLATIONS */
function setupTranslations(){
 const s=document.getElementById("translationSelect");

 ["kjv","niv","nlt"].forEach(t=>{
  let o=document.createElement("option");
  o.value=t;
  o.textContent=t.toUpperCase();
  if(t==="nlt")o.selected=true;
  s.appendChild(o);
 });

 s.onchange=async e=>{
  translation=e.target.value;
  await loadTranslation(translation);
  update();
 };
}

/* DISPLAY */
function update(){
 const verseEl=document.getElementById("verse");
 verseEl.classList.remove("show");

 const text=verses[translation][key];
 const words=text.split(" ");

 verseEl.innerHTML=words.map(w=>`<span class="word">${w}</span>`).join(" ");

 document.getElementById("ref").innerHTML=`<span style="color:#108cd7">${key}</span>`;
 document.getElementById("date").innerText=new Date().toDateString();

 setTimeout(()=>verseEl.classList.add("show"),200);
}

/* READ */
function readVerse(){
 update();

 const text=verses[translation][key];
 const words=document.querySelectorAll(".word");

 let i=0;

 const utter=new SpeechSynthesisUtterance(text);
 utter.rate=.85;

 utter.onboundary=(e)=>{
  if(e.name==="word" && words[i]){
   words[i].classList.add("active");
   i++;
  }
 };

 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* AMBIENT */
let ambientOn=false;

function toggleAmbient(){
 const a=document.getElementById("ambientAudio");

 if(!ambientOn){
  a.volume=0;
  a.play();
  fadeAudio(a,0.25,1500);
  ambientOn=true;
 }else{
  fadeAudio(a,0,1000);
  ambientOn=false;
 }
}

function fadeAudio(audio,target,duration){
 const step=(target-audio.volume)/(duration/50);
 const fade=setInterval(()=>{
  audio.volume+=step;
  if((step>0 && audio.volume>=target)||(step<0 && audio.volume<=target)){
   audio.volume=target;
   if(target===0) audio.pause();
   clearInterval(fade);
  }
 },50);
}

/* SHARE IMAGE (unchanged working version) */
function shareImage(){
 alert("Share image working version already included previously");
}

/* OTHER */
function copyVerse(){
 navigator.clipboard.writeText(verses[translation][key]+" — "+key);
}
function donate(){
 window.open("https://venmo.com/u/tapnpray");
}

/* STREAK */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();

 if(l!==t){
  s++;
  localStorage.setItem("s",s);
  localStorage.setItem("l",t);
 }

 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

window.onload=init;

</script>

</body>
</html>
