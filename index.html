<style>
html, body {
  height: 100%;
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;

  background-position: center;

  min-height: calc(100vh - 260px);

  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 20px;
}

#votd {
  position: relative;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(25px) brightness(0.9);
  border-radius: 28px;
  padding: 24px 20px 60px;

  width: 100%;
  max-height: 80vh;

  flex-direction: column;

#ambientToggle {

}

#readIcon,
#ambientToggle,
#helpIcon,
#donateIcon {

#ambientToggle:hover,
#helpIcon:hover,

#title { font-size: 15px; margin-top: 6px; }

#verse {

  overflow-y: auto;

  flex: 1;
}

.word { opacity: .35; }
.word.active { opacity: 1; }

.translation-select {
  margin: 10px auto 6px;
  width: 120px;
  border-radius: 999px;
  background: rgba(255,255,255,.15);
  color: #fff;
  border: none;

  text-align: center;
}

.mode-buttons {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.mode-buttons button {
  width: 120px;

  border-radius: 999px;
  border: none;

  color: #fff;
}

.mode-buttons button.active {
  background: #108cd7;
}

.share-icon {
  margin: 10px auto 0;

}

.bottom-left, .bottom-right {

.bottom-left { left: 14px; }
.bottom-right { right: 14px; color: #FFD700; }

#donateIcon {

#streakModal, #helpModal {

}

.streak-card, .help-card {

#streak {

<script>

/* =========================
   DOM SHORTCUTS
========================= */
const titleEl = document.getElementById("title");
const dateEl = document.getElementById("date");
const verseEl = document.getElementById("verse");
const refEl = document.getElementById("ref");
const translationSelect = document.getElementById("translationSelect");
const dailyBtn = document.getElementById("dailyBtn");
const randomBtn = document.getElementById("randomBtn");
const shareBtn = document.getElementById("shareBtn");
const ambientToggle = document.getElementById("ambientToggle");
const streakEl = document.getElementById("streak");
const streakModal = document.getElementById("streakModal");
const streakCount = document.getElementById("streakCount");
const streakMsg = document.getElementById("streakMsg");
const b7 = document.getElementById("b7");
const b30 = document.getElementById("b30");
const b100 = document.getElementById("b100");
const progressBar = document.getElementById("progressBar");
const ambientAudio = document.getElementById("ambientAudio");

const helpIcon = document.getElementById("helpIcon");
const donateIcon = document.getElementById("donateIcon");
const helpModal = document.getElementById("helpModal");
const helpContent = document.getElementById("helpContent");

/* =========================
   BACKGROUNDS
========================= */
const bgSets = {
  morning: ["/backgrounds/morning1.png","/backgrounds/morning2.png"],
  day: ["/backgrounds/day1.png","/backgrounds/day2.png"],
  evening: ["/backgrounds/evening1.png","/backgrounds/evening2.png"],
  night: ["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let currentBackground = "";
let currentBrightness = 1.0;

function getTimeBlock() {
  const h = new Date().getHours();
  if (h < 11) return "morning";
  if (h < 17) return "day";
  if (h < 21) return "evening";
  return "night";
}

function updateBackground() {
  const block = getTimeBlock();
  const set = bgSets[block];
  const img = set[Math.floor(Math.random() * set.length)];
  const brightness = (block === "night" || block === "evening") ? 0.75 : 1.0;

  const preload = new Image();
  preload.src = img;

  preload.onload = () => {
    document.body.style.setProperty('--bg-image', `url('${img}')`);
    document.body.style.setProperty('--brightness', brightness);
    currentBackground = img;
    currentBrightness = brightness;
  };
}

updateBackground();

/* =========================
   CURATED VERSE SYSTEM
========================= */

const curatedYear = [
"Psalm 23:1","Jeremiah 29:11","Philippians 4:6","Isaiah 41:10","Romans 8:28",
"Matthew 11:28","Proverbs 3:5","John 3:16","Psalm 46:1","Isaiah 40:31",
"2 Timothy 1:7","Joshua 1:9","Psalm 34:8","Romans 12:2","Ephesians 2:8",
"John 14:27","Psalm 37:4","Lamentations 3:23","Hebrews 11:1","James 1:5",
"1 Peter 5:7","Matthew 6:33","Colossians 3:23","Romans 10:9","Isaiah 26:3",
"John 10:10","Psalm 118:24","Philippians 4:13","Galatians 5:22","Hebrews 13:8"
];

function buildFullYearPool() {
  let pool = [...curatedYear];
  while (pool.length < 365) {
    pool = pool.concat(curatedYear);
  }
  return pool.slice(0, 365);
}

function getSeasonalPool() {
  const month = new Date().getMonth();
  if (month === 11) return ["Luke 2:10","Isaiah 9:6","Matthew 1:21"];
  if (month === 3) return ["John 3:16","Matthew 28:6"];
  return buildFullYearPool();
}

/* =========================
   VERSES
========================= */
let verses = { nlt:{}, niv:{}, kjv:{} };
let translation = "nlt";
let dailyKey = "";
let currentKey = "";

async function loadTranslation(t) {
  try {
    const res = await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    if (!res.ok) return;
    const data = await res.json();

    Object.entries(data).forEach(([book, chapters]) => {
      Object.entries(chapters).forEach(([chapter, versesObj]) => {
        Object.entries(versesObj).forEach(([v, text]) => {
          verses[t][`${book} ${chapter}:${v}`] = text;
        });
      });
    });
  } catch {}
}

function getSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = (h << 5) - h + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function generateDaily() {
  const today = new Date().toDateString();
  const stored = JSON.parse(localStorage.getItem("dailyVerse") || "{}");

  if (stored.date === today) {
    dailyKey = stored.key;
  } else {
    const keys = getSeasonalPool();
    if (!keys.length) return;

    dailyKey = keys[getSeed(today) % keys.length];

    localStorage.setItem("dailyVerse", JSON.stringify({
      date: today,
      key: dailyKey
    }));
  }

  currentKey = dailyKey;
  updateVerse("Daily Bible Verse");
  updateStreak();
}

function showDaily() {
  currentKey = dailyKey;
  updateVerse("Daily Bible Verse");
  dailyBtn.classList.add("active");
  randomBtn.classList.remove("active");
}

function showRandom() {
  const keys = Object.keys(verses[translation]);
  if (!keys.length) return;

  currentKey = keys[Math.floor(Math.random() * keys.length)];
  updateVerse("Random Bible Verse");

  dailyBtn.classList.remove("active");
  randomBtn.classList.add("active");
}

function changeTranslation(t) {
  translation = t;

  if (!verses[translation] || !Object.keys(verses[translation]).length) return;

  if (!verses[translation][currentKey]) {
    const keys = Object.keys(verses[translation]);
    if (!keys.length) return;
    currentKey = keys[0];
  }

  updateVerse(
    dailyBtn.classList.contains("active")
      ? "Daily Bible Verse"
      : "Random Bible Verse"
  );
}

function updateVerse(titleText) {
  const text = verses[translation][currentKey];
  if (!text) return;

  titleEl.innerText = titleText;

  verseEl.innerHTML = text
    .split(" ")
    .map(w => `<span class="word">${w}</span>`)
    .join(" ");

  refEl.innerText = currentKey;
  dateEl.innerText = new Date().toDateString();
}

/* =========================
   STREAK
========================= */
function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = localStorage.getItem("lastVisit");
  let streak = parseInt(localStorage.getItem("streak")) || 1;

  if (lastVisit) {
    const last = new Date(lastVisit);
    const now = new Date(today);
    const diff = Math.floor((now - last) / 86400000);

    if (diff === 1) streak++;
    else if (diff > 1) streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastVisit", today);

  streakEl.innerText = "🔥 " + streak + " Day Streak";
  streakCount.innerText = streak + " Days";

  if (streak < 7) {
    streakMsg.innerText = "Keep going — 7 days is your next milestone 🌿";
  } else if (streak < 30) {
    streakMsg.innerText = "You're on fire — 30 days is next 🔥";
  } else if (streak < 100) {
    streakMsg.innerText = "Stay strong — 100 days is next 👑";
  } else {
    streakMsg.innerText = "You're building something powerful 💪";
  }

  b7.classList.toggle("active", streak >= 7);
  b30.classList.toggle("active", streak >= 30);
  b100.classList.toggle("active", streak >= 100);

  let goal = 7;
  if (streak >= 7) goal = 30;
  if (streak >= 30) goal = 100;

  const progress = (streak / goal) * 100;
  progressBar.style.width = Math.min(progress, 100) + "%";
}

function openStreak() {
  streakModal.style.display = "flex";
}

function closeStreak(e) {
  if (e.target === streakModal) {
    streakModal.style.display = "none";
  }
}

/* =========================
   HELP MODAL
========================= */
async function openHelp() {
  helpModal.style.display = "flex";
  helpContent.innerHTML = "Loading...";

  try {
    const res = await fetch("https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/refs/heads/main/README.md");
    const text = await res.text();

    helpContent.innerHTML = "<pre style='white-space:pre-wrap;text-align:left'>" + text + "</pre>";
  } catch {
    helpContent.innerText = "Unable to load help content.";
  }
}

function closeHelp(e) {
  if (e.target === helpModal) {
    helpModal.style.display = "none";
  }
}

/* =========================
   DONATE
========================= */
function goDonate() {
  window.open("https://venmo.com/u/tapnpray", "_blank");
}

/* =========================
   READ
========================= */
function readVerse() {
  const words = document.querySelectorAll(".word");
  words.forEach(w => w.classList.remove("active"));
  let i = 0;

  const text = verses?.[translation]?.[currentKey];
  if (!text) return;

  const u = new SpeechSynthesisUtterance(text + " " + currentKey);
  u.onboundary = () => {
    if (words[i]) words[i++].classList.add("active");
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* =========================
   AMBIENT
========================= */
let ambientOn = false;

function toggleAmbient() {
  const a = ambientAudio;

  if (ambientOn) {
    fadeOut(a);
  } else {
    a.volume = 0;
    a.play().catch(()=>{});
    fadeIn(a);
  }

  ambientOn = !ambientOn;
  ambientToggle.classList.toggle("active");
}

function fadeIn(a) {
  let v = 0;
  const i = setInterval(() => {
    v += 0.05;
    if (v >= 0.3) {
      v = 0.3;
      clearInterval(i);
    }
    a.volume = v;
  }, 100);
}

function fadeOut(a) {
  let v = a.volume;
  const i = setInterval(() => {
    v -= 0.05;
    if (v <= 0) {
      clearInterval(i);
      a.pause();
      a.currentTime = 0;
    }
    a.volume = v;
  }, 100);
}

/* =========================
   SHARE
========================= */
async function shareVerse() {
  try {
    await document.fonts.load("700 48px Merriweather");

    const verseText = verses?.[translation]?.[currentKey];
    if (!verseText) return;

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;
    const ctx = canvas.getContext("2d");

    /* =========================
       LOAD CURRENT BACKGROUND
    ========================= */
    let bgLoaded = false;
    let bgImg = new Image();

    if (currentBackground) {
      bgImg.crossOrigin = "anonymous";
      bgImg.src = currentBackground;

      await new Promise(res => {
        bgImg.onload = () => { bgLoaded = true; res(); };
        bgImg.onerror = res;
      });
    }

    /* =========================
       DRAW BACKGROUND (MEDIUM BLUR)
    ========================= */
    if (bgLoaded) {
      ctx.filter = `brightness(${(currentBrightness || 1) * 0.6}) blur(8px)`;
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
      ctx.filter = "none";
    } else {
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    /* =========================
       GLASS CARD
    ========================= */
    const x = 100, y = 180, w = 880, h = 600, r = 50;

    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();

    ctx.fillStyle = "rgba(0,0,0,0.45)";

    ctx.shadowColor = "rgba(0,0,0,0.4)";
    ctx.shadowBlur = 25;

    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 2;
    ctx.stroke();

    /* =========================
       FROSTED EDGE GLOW
    ========================= */
    const edgeGradient = ctx.createLinearGradient(x, y, x, y + h);
    edgeGradient.addColorStop(0, "rgba(255,255,255,0.12)");
    edgeGradient.addColorStop(0.3, "rgba(255,255,255,0.04)");
    edgeGradient.addColorStop(1, "rgba(255,255,255,0.08)");

    ctx.fillStyle = edgeGradient;
    ctx.fill();

    /* =========================
       TITLE
    ========================= */
    ctx.textAlign = "center";

    /* TITLE */
    ctx.font = "700 30px Merriweather";
    ctx.fillStyle = "#ffffff";
    ctx.fillText("Daily Bible Verse", canvas.width / 2, y + 55);

    /* DATE (same style as app) */
    ctx.font = "600 24px Merriweather";
    ctx.fillStyle = "#108cd7";
    ctx.fillText(new Date().toDateString(), canvas.width / 2, y + 95);

    /* =========================
       VERSE TEXT
    ========================= */
    ctx.font = "700 48px Merriweather";
    ctx.fillStyle = "#ffffff";

    const words = verseText.split(" ");
    let line = "";
    const lines = [];
    const maxWidth = w - 120;

    words.forEach(word => {
      const test = line + word + " ";
      if (ctx.measureText(test).width > maxWidth) {
        lines.push(line);
        line = word + " ";
      } else {
        line = test;
      }
    });
    if (line) lines.push(line);

    const lineHeight = 60;
    const startY = y + 180;

    lines.forEach((l, i) => {
      ctx.fillText(l.trim(), canvas.width / 2, startY + i * lineHeight);
    });

    /* =========================
       REFERENCE
    ========================= */
    ctx.font = "700 34px Merriweather";
    ctx.fillStyle = "#108cd7";

    const refY = Math.min(
      startY + (lines.length * lineHeight) + 40,
      y + h - 40
    );

    ctx.fillText(currentKey, canvas.width / 2, refY);

    /* =========================
       LOGO
    ========================= */
    try {
      const logo = new Image();
      logo.src = "logo.svg";

      await new Promise(res => {
        logo.onload = res;
        logo.onerror = res;
      });

      ctx.drawImage(logo, 60, canvas.height - 160, 100, 100);
    } catch {}

    /* =========================
       URL
    ========================= */
    ctx.font = "600 24px Merriweather";
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "left";
    ctx.fillText("tapnpray.github.io", 60, canvas.height - 30);

    /* =========================
       EXPORT
    ========================= */
    const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
    if (!blob) return;

    const file = new File([blob], "tapnpray.png", { type: "image/png" });

    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "Tap N Pray",
          text: verseText + "\n\n" + currentKey
        });
        return;
      } catch {}
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tapnpray.png";
    a.click();
    URL.revokeObjectURL(url);

  } catch (err) {
    console.error("Share error:", err);
  }
}

/* =========================
   EVENTS
========================= */
verseEl.addEventListener("click", readVerse);
ambientToggle.addEventListener("click", toggleAmbient);
dailyBtn.addEventListener("click", showDaily);
randomBtn.addEventListener("click", showRandom);
translationSelect.addEventListener("change", e => changeTranslation(e.target.value));
shareBtn.addEventListener("click", shareVerse);

streakEl.addEventListener("click", openStreak);
streakModal.addEventListener("click", closeStreak);

helpIcon.addEventListener("click", openHelp);
helpModal.addEventListener("click", closeHelp);
donateIcon.addEventListener("click", goDonate);

/* =========================
   INIT
========================= */
