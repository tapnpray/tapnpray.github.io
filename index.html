<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  color: #fff;
  padding-bottom: env(safe-area-inset-bottom);
  padding-top: env(safe-area-inset-top);
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-size: cover;
  background-position: center;
  background-image: var(--bg-image);
  transform: scale(1.05);
  filter: blur(2px);
  z-index: -1;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 600px) {
  body::before {
    transform: scale(1.03);
    filter: blur(1.5px);
  }
}

/* CENTER */
.center {
  min-height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* BOX */
#votd {
  position: relative;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 24px;
  max-width: 650px;
  width: 100%;
  max-height: calc(100vh - 120px);
  display: flex;
  flex-direction: column;
  text-align: center;
  overflow: hidden;
}

/* ICONS */
#readIcon, #ambientToggle {
  position: absolute;
  top: 12px;
  font-size: 26px;
  padding: 8px;
  cursor: pointer;
}

#readIcon { left: 12px; }
#ambientToggle { right: 12px; }

#readIcon.speaking { animation: pulse 1s infinite; }
@keyframes pulse { 50% { transform: scale(1.2); } }

#ambientToggle.active { color: #7CFFB2; }

/* TEXT */
#verse {
  font-size: clamp(22px, 5.5vw, 34px);
  line-height: 1.7;
  overflow-y: auto;
  cursor: pointer;
  -webkit-overflow-scrolling: touch;
  word-wrap: break-word;
}

.word { opacity: .35; }
.word.active { opacity: 1; }

#date, #ref { color: #108cd7; font-size: 14px; }
#title { font-size: 15px; }

/* CONTROLS */
.translation-select {
  margin-top: 6px;
  border-radius: 999px;
  background: rgba(255,255,255,.15);
  color: #fff;
  border: none;
  padding: 4px 10px;
}

.mode-buttons {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}

.mode-buttons button {
  flex: 1;
  padding: 12px;
  border-radius: 999px;
  border: none;
  background: rgba(255,255,255,.15);
  color: #fff;
}

.mode-buttons button.active { background: #108cd7; }

.actions { margin-top: 12px; }

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 999px;
  background: #108cd7;
  color: #fff;
}

/* STREAK */
#streak {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.6);
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
}

/* MODAL */
#streakModal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,.95);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow-y: auto;
  padding: 20px;
}

.badges {
  display: flex;
  gap: 15px;
  margin: 20px;
}

.badge { opacity: .3; font-size: 28px; }
.badge.active { opacity: 1; }

.progress {
  width: 80%;
  height: 10px;
  background: rgba(255,255,255,.2);
  border-radius: 999px;
}

.progress div {
  height: 100%;
  background: #108cd7;
}
</style>
</head>

<body>

<div class="center">
<div id="votd">

<div id="readIcon" onclick="readVerse()">🔊</div>
<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="title">Daily Bible Verse</div>
<div id="date"></div>
<div id="verse" onclick="readVerse()"></div>
<div id="ref"></div>

<select id="translationSelect" class="translation-select">
  <option value="nlt">NLT</option>
  <option value="niv">NIV</option>
  <option value="kjv">KJV</option>
</select>

<div class="mode-buttons">
  <button id="dailyBtn" class="active" onclick="showDaily()">Daily</button>
  <button id="randomBtn" onclick="showRandom()">Random</button>
</div>

<div class="actions">
  <button class="btn" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="streak" onclick="openStreak()"></div>

<div id="streakModal" onclick="closeStreak(event)">
  <h1 id="streakCount"></h1>
  <div id="streakMsg"></div>

  <div class="badges">
    <span class="badge" id="b7">🌿</span>
    <span class="badge" id="b30">🔥</span>
    <span class="badge" id="b100">👑</span>
  </div>

  <div class="progress"><div id="progressBar"></div></div>
</div>

<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>

<script>
/* BACKGROUND */
const bgSets = {
  morning: ["/backgrounds/morning1.png","/backgrounds/morning2.png"],
  day: ["/backgrounds/day1.png","/backgrounds/day2.png"],
  evening: ["/backgrounds/evening1.png","/backgrounds/evening2.png"],
  night: ["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let currentBackground = "", currentTimeBlock = "";

function getTimeBlock() {
  const h = new Date().getHours();
  if (h < 11) return "morning";
  if (h < 17) return "day";
  if (h < 21) return "evening";
  return "night";
}

function updateBackground() {
  const b = getTimeBlock();
  if (b !== currentTimeBlock) {
    currentTimeBlock = b;
    const set = bgSets[b];
    currentBackground = set[Math.floor(Math.random() * set.length)];
    document.body.style.setProperty('--bg-image', `url('${currentBackground}')`);
  }
}
updateBackground();

/* VERSES */
let verses = { nlt:{}, niv:{}, kjv:{} };
let translation = "nlt", dailyKey = "", currentKey = "";

async function loadTranslation(t) {
  try {
    const res = await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    if (!res.ok) throw new Error("Missing translation");
    const data = await res.json();

    Object.entries(data).forEach(([book, chapters]) => {
      Object.entries(chapters).forEach(([chapter, versesObj]) => {
        Object.entries(versesObj).forEach(([v, text]) => {
          verses[t][`${book} ${chapter}:${v}`] = text;
        });
      });
    });

  } catch (err) {
    alert("Error loading Bible data.");
  }
}

function getSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = (h << 5) - h + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function generateDaily() {
  const today = new Date().toDateString();
  const stored = JSON.parse(localStorage.getItem("dailyVerse") || "{}");

  if (stored.date === today) dailyKey = stored.key;
  else {
    const keys = Object.keys(verses.nlt);
    dailyKey = keys[getSeed(today) % keys.length];
    localStorage.setItem("dailyVerse", JSON.stringify({ date: today, key: dailyKey }));
  }

  currentKey = dailyKey;
  update("Daily Bible Verse");
  streak();
}

function update(t) {
  const text = verses[translation][currentKey];
  document.getElementById("title").innerText = t;
  document.getElementById("verse").innerHTML =
    text.split(" ").map(w => `<span class="word">${w}</span>`).join(" ");
  document.getElementById("ref").innerText = currentKey;
  document.getElementById("date").innerText = new Date().toDateString();
}

/* READ */
function readVerse() {
  const words = document.querySelectorAll(".word");
  words.forEach(w => w.classList.remove("active"));
  let i = 0;

  const u = new SpeechSynthesisUtterance(verses[translation][currentKey] + " " + currentKey);

  u.onboundary = e => {
    if (words[i]) words[i++].classList.add("active");
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* AMBIENT */
let ambientOn = false;

function toggleAmbient() {
  const a = document.getElementById("ambientAudio");
  if (ambientOn) fadeOut(a);
  else { a.volume = 0; a.play().catch(()=>{}); fadeIn(a); }
  ambientOn = !ambientOn;
  document.getElementById("ambientToggle").classList.toggle("active");
}

function fadeIn(a) {
  let v = 0;
  const i = setInterval(() => {
    v += .05;
    if (v >= .3) { v = .3; clearInterval(i); }
    a.volume = v;
  }, 100);
}

function fadeOut(a) {
  let v = a.volume;
  const i = setInterval(() => {
    v -= .05;
    if (v <= 0) { clearInterval(i); a.pause(); a.currentTime = 0; }
    a.volume = v;
  }, 100);
}

/* SHARE */
async function shareVerse() {
  try {
    const c = document.createElement("canvas");
    c.width = 1080; c.height = 1080;
    const x = c.getContext("2d");

    const bg = new Image();
    bg.src = currentBackground;
    await new Promise(r => bg.onload = r);
    x.drawImage(bg, 0, 0, 1080, 1080);

    x.fillStyle = "rgba(0,0,0,.5)";
    x.fillRect(120, 220, 840, 520);

    x.fillStyle = "#fff";
    x.font = "bold 48px Arial";
    x.textAlign = "center";

    wrapText(x, verses[translation][currentKey], 540, 320, 720, 60);

    x.fillStyle = "#108cd7";
    x.fillText(currentKey, 540, 680);

    const logo = new Image();
    logo.src = "logo.svg";
    await new Promise(r => logo.onload = r);
    x.drawImage(logo, 60, 880, 100, 100);

    let blob = await new Promise(r => c.toBlob(r, "image/png"));
    if (!blob) return;

    const file = new File([blob], "tapnpray.png", { type: "image/png" });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file] }); } catch {}
      return;
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "tapnpray.png"; a.click();

  } catch {
    alert("Unable to share image.");
  }
}

/* STREAK */
function streak() {
  let s = parseInt(localStorage.getItem("s")) || 1;
  localStorage.setItem("s", s);
  document.getElementById("streak").innerText = "🔥 " + s + " Day Streak";
  updateStreakUI(s);
}

function updateStreakUI(s) {
  document.getElementById("streakCount").innerText = s + " Days";
  document.getElementById("b7").classList.toggle("active", s >= 7);
  document.getElementById("b30").classList.toggle("active", s >= 30);
  document.getElementById("b100").classList.toggle("active", s >= 100);
  document.getElementById("progressBar").style.width = (s / 100 * 100) + "%";
}

function openStreak() {
  document.getElementById("streakModal").style.display = "flex";
}

function closeStreak(e) {
  if (e.target === e.currentTarget)
    document.getElementById("streakModal").style.display = "none";
}

/* INIT */
(async () => {
  await loadTranslation("nlt");
  await loadTranslation("niv");
  await loadTranslation("kjv");
  generateDaily();
})();
</script>
</body>
</html>
