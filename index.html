<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray – Verse of the Day</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#108cd7">
<link rel="manifest" href="manifest.json">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
    margin:0;
    font-family:'Inter',sans-serif;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    background:#000;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* overlays */
body::before {
    content:"";
    position:fixed;
    width:100%; height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.75));
    z-index:-2;
}
body::after {
    content:"";
    position:fixed;
    width:100%; height:100%;
    backdrop-filter:blur(10px);
    z-index:-1;
}

/* logo */
.logo-container {
    position:fixed;
    top:12px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:10;
}
.logo-container img {
    max-width:140px;
    width:55%;
}
.tagline {
    margin-top:4px;
    font-size:12px;
    opacity:0.85;
}

/* layout */
.center {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    padding-top:120px;
    padding-bottom:40px;
    width:100%;
}

/* card */
#votd {
    background:rgba(255,255,255,0.06);
    border-radius:24px;
    padding:28px;
    max-width:520px;
    width:100%;
    backdrop-filter:blur(25px);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.5),
        0 0 25px rgba(16,140,215,0.12);
    animation:breathe 8s ease-in-out infinite;
}

/* text */
#date {color:#108cd7;margin-bottom:8px;}
#verse {
    font-size:clamp(26px,6.5vw,36px);
    line-height:1.7;
}
#ref {margin-top:12px;color:#108cd7;}

/* buttons */
.actions {
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn {
    padding:10px 14px;
    border-radius:999px;
    border:none;
    background:rgba(255,255,255,0.15);
    color:white;
    cursor:pointer;
    transition:all .2s ease;
}
.btn:hover {background:rgba(255,255,255,0.25);}
.btn:active {
    transform:scale(0.92);
    box-shadow:0 0 10px rgba(16,140,215,0.4);
}

.small {font-size:13px;opacity:0.8;margin-top:10px;}

.favorite-item {
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
}

/* animation */
@keyframes breathe {
    0%{transform:scale(1);}
    50%{transform:scale(1.01);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="logo-container">
    <img src="logo.svg">
    <div class="tagline">One Tap Closer to Christ</div>
</div>

<div class="center">

<div id="votd">
    <div id="date"></div>
    <div id="verse">Loading...</div>
    <div id="ref"></div>

    <div class="small">
        <select id="translationSelect"></select>
    </div>

    <div class="actions">
        <button class="btn" onclick="playVerse()">Listen</button>
        <button class="btn" onclick="copyVerse()">Copy</button>
        <button class="btn" onclick="shareVerse()">Share</button>
        <button class="btn" onclick="saveFavorite()">⭐</button>
        <button class="btn" onclick="toggleFavorites()">Favorites</button>
        <button class="btn" onclick="toggleSound()">🌧️</button>
        <button class="btn" onclick="requestNotificationPermission()">🔔</button>
    </div>

    <div id="favoritesList" class="small" style="display:none;"></div>
    <div id="streak" class="small"></div>

    <button class="btn" onclick="togglePrayer()">Prayer</button>
    <div id="prayer" class="small" style="display:none;"></div>
</div>

</div>

<audio id="ambientAudio" loop>
    <source src="sounds/rain.mp3" type="audio/mpeg">
</audio>

<script>
/* BACKGROUNDS */
const backgrounds=[
 "backgrounds/morning1.png",
 "backgrounds/morning2.png",
 "backgrounds/day1.png"
];

let i=0;
function setBG(n){
 let el=document.createElement("div");
 Object.assign(el.style,{
  position:"fixed",top:0,left:0,width:"100%",height:"100%",
  backgroundImage:`url('${backgrounds[n]}')`,
  backgroundSize:"cover",zIndex:-3,opacity:0,transition:"1.5s"
 });
 document.body.appendChild(el);
 setTimeout(()=>el.style.opacity=1,50);
 setTimeout(()=>{document.body.style.backgroundImage=`url('${backgrounds[n]}')`;el.remove();},1500);
}
setBG(i);
setInterval(()=>{i=(i+1)%backgrounds.length;setBG(i)},25000);

/* VERSES */
let verses={},key="",translation="nlt";

async function load(t){
 if(verses[t])return;
 let r=await fetch(`https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 let j=await r.json(),f={};
 for(let b in j)for(let c in j[b])for(let v in j[b][c])f[`${b} ${c}:${v}`]=j[b][c][v];
 verses[t]=f;
}

function seed(l){let d=new Date();return(d.getFullYear()*1e4+d.getMonth()*100+d.getDate())%l;}

async function init(){
 await load(translation);
 let k=Object.keys(verses[translation]);
 key=k[seed(k.length)];
 update();
 setup();
 streak();
}

function update(){
 document.getElementById("verse").innerText=verses[translation][key];
 document.getElementById("ref").innerHTML=`<span style="color:#108cd7">${key}</span> (${translation})`;
 document.getElementById("date").innerText=new Date().toDateString();
}

function setup(){
 let s=document.getElementById("translationSelect");
 ["kjv","niv","nlt"].forEach(t=>{
  let o=document.createElement("option");
  o.value=t;o.textContent=t.toUpperCase();s.appendChild(o);
 });
 s.onchange=async e=>{translation=e.target.value;await load(translation);update();};
}

/* FAVORITES */
function saveFavorite(){
 let v=`${verses[translation][key]} — ${key}`;
 let f=JSON.parse(localStorage.getItem("fav")||"[]");
 if(!f.includes(v)){f.push(v);localStorage.setItem("fav",JSON.stringify(f));alert("Saved");}
}

function toggleFavorites(){
 let el=document.getElementById("favoritesList");
 if(el.style.display==="none"){renderFav();el.style.display="block";}
 else el.style.display="none";
}

function renderFav(){
 let f=JSON.parse(localStorage.getItem("fav")||"[]");
 let el=document.getElementById("favoritesList");
 el.innerHTML=f.map((v,i)=>`<div class="favorite-item">${v}<br><button class="btn" onclick="del(${i})">Delete</button></div>`).join("");
}

function del(i){
 let f=JSON.parse(localStorage.getItem("fav")||"[]");
 f.splice(i,1);
 localStorage.setItem("fav",JSON.stringify(f));
 renderFav();
}

/* AUDIO */
function playVerse(){
 let u=new SpeechSynthesisUtterance(verses[translation][key]);
 u.rate=.92;
 speechSynthesis.cancel();
 setTimeout(()=>speechSynthesis.speak(u),200);
}

/* AMBIENT */
let sound=false;
function toggleSound(){
 let a=document.getElementById("ambientAudio");
 if(!sound){a.volume=.3;a.play();sound=true;}
 else{a.pause();sound=false;}
}

/* NOTIFICATIONS */
function requestNotificationPermission(){
 if("Notification"in window){
  Notification.requestPermission().then(p=>{
   if(p==="granted")schedule();
  });
 }
}

function schedule(){
 let now=new Date();
 let t=new Date();
 t.setHours(8,0,0,0);
 if(now>t)t.setDate(t.getDate()+1);
 setTimeout(()=>{
  new Notification("Tap N Pray",{body:"Your daily verse is ready 🙏"});
  setInterval(()=>new Notification("Tap N Pray",{body:"Your daily verse is ready 🙏"}),86400000);
 },t-now);
}

/* OTHER */
function copyVerse(){navigator.clipboard.writeText(verses[translation][key]);}
function shareVerse(){navigator.share?navigator.share({text:verses[translation][key]}):copyVerse();}

function streak(){
 let s=+localStorage.getItem("s")||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("l",t);localStorage.setItem("s",s);}
 document.getElementById("streak").innerText="🔥 "+s;
}

function togglePrayer(){
 let p=document.getElementById("prayer");
 p.style.display=p.style.display==="none"?"block":"none";
 p.innerText="Lord guide me today.";
}

/* PWA */
if("serviceWorker"in navigator){
 navigator.serviceWorker.register("sw.js");
}

window.onload=init;
</script>

</body>
</html>
