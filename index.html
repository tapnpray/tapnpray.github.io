<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Arial,sans-serif;color:#fff;
 background-size:cover;background-position:center;
}

body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.9));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(12px);z-index:-1;
}

/* LOGO */
.logo-container{
 position:fixed;bottom:25px;left:20px;opacity:.7;
}
.logo-container img{max-width:55px}

/* MAIN */
.center{
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:120px 20px 180px;
 box-sizing:border-box;
}

/* CARD */
#votd{
 position:relative;
 background:rgba(0,0,0,.55);
 border-radius:28px;
 padding:30px;
 max-width:520px;width:100%;
 backdrop-filter:blur(30px);
 text-align:center;
}

/* ICONS */
#favoriteStar{
 position:absolute;top:12px;left:12px;
 font-size:22px;cursor:pointer;
}
#ambientToggle{
 position:absolute;top:12px;right:12px;
 cursor:pointer;
}

/* TEXT */
#date{color:#108cd7;margin-bottom:8px}
#verse{font-size:28px;line-height:1.6;opacity:0;transition:2.5s}
#verse.show{opacity:1}
#ref{color:#108cd7;margin-top:10px}

/* TOPICS */
#topics{
 display:flex;flex-wrap:wrap;gap:8px;
 justify-content:center;margin:10px 0;
}
#topics button{
 padding:6px 12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;font-size:12px;cursor:pointer;
}
#topics button.active{background:#108cd7}

/* BUTTONS */
.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;margin-top:15px;
}
.btn{
 padding:12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;
}
.primary{background:#108cd7}

/* FAVORITES MODAL */
#favoritesModal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.95);
 display:none;
 overflow:auto;
 padding:20px;
}
#favoritesContent{
 max-width:600px;margin:auto;
}
.favorite-item{
 margin-bottom:15px;
 padding:15px;
 background:rgba(255,255,255,.1);
 border-radius:12px;
}

/* FOOTER */
#bottomTagline{
 position:fixed;bottom:70px;width:100%;
 text-align:center;font-size:12px;
}
#streak{
 position:fixed;bottom:25px;left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:8px 16px;border-radius:999px;
}
</style>
</head>

<body>

<div class="logo-container"><img src="logo.svg"></div>

<div class="center">
<div id="votd">

<div id="favoriteStar" onclick="toggleFavorite()">☆</div>
<div id="ambientToggle">🌿</div>

<div id="date"></div>
<div id="verse"></div>
<div id="ref"></div>

<div id="topics">
<button onclick="pickTopic('peace')">Peace</button>
<button onclick="pickTopic('strength')">Strength</button>
<button onclick="pickTopic('hope')">Hope</button>
<button onclick="pickTopic('guidance')">Guidance</button>
<button onclick="pickTopic('faith')">Faith</button>
</div>

<div class="actions">
<button class="btn primary" onclick="readVerse()">Read Verse</button>
<button class="btn" onclick="openFavorites()">Favorites</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="bottomTagline">One Tap Closer to Christ</div>
<div id="streak"></div>

<!-- FAVORITES MODAL -->
<div id="favoritesModal" onclick="closeFavorites(event)">
  <div id="favoritesContent"></div>
</div>

<script>

/* BACKGROUND */
const backgrounds=[
 "backgrounds/morning1.png",
 "backgrounds/morning2.png",
 "backgrounds/day1.png"
];
let i=0;
document.body.style.backgroundImage=`url('${backgrounds[i]}')`;
setInterval(()=>{
 i=(i+1)%backgrounds.length;
 document.body.style.backgroundImage=`url('${backgrounds[i]}')`;
},60000);

/* LOAD VERSES */
let verses={},key="";

async function load(){
 const res=await fetch("BIBLE/NLT/NLT_bible.json");
 const data=await res.json();

 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];

 verses=flat;
 init();
}

/* TOPICS */
const topicMap={
 peace:["peace","rest"],
 strength:["strength","power"],
 hope:["hope","future"],
 guidance:["wisdom","path"],
 faith:["faith","trust"]
};

function pickTopic(t){
 let list=[];
 for(let ref in verses){
  let text=verses[ref].toLowerCase();
  if(topicMap[t].some(w=>text.includes(w))) list.push(ref);
 }

 if(list.length===0){
  randomVerse();
  return;
 }

 key=list[Math.floor(Math.random()*list.length)];
 update();
}

/* INIT */
function init(){
 randomVerse();
 streak();
}

function randomVerse(){
 const keys=Object.keys(verses);
 key=keys[Math.floor(Math.random()*keys.length)];
 update();
}

/* UPDATE */
function update(){
 const el=document.getElementById("verse");
 el.classList.remove("show");

 el.innerText=verses[key];
 document.getElementById("ref").innerText=key;
 document.getElementById("date").innerText=new Date().toDateString();

 setTimeout(()=>el.classList.add("show"),200);
 updateStar();
}

/* FAVORITES */
function getFavs(){
 return JSON.parse(localStorage.getItem("favs")||"[]");
}

function toggleFavorite(){
 let favs=getFavs();
 if(favs.includes(key)){
  favs=favs.filter(f=>f!==key);
 }else{
  favs.push(key);
 }
 localStorage.setItem("favs",JSON.stringify(favs));
 updateStar();
}

function updateStar(){
 document.getElementById("favoriteStar").innerText=
 getFavs().includes(key)?"⭐":"☆";
}

function openFavorites(){
 let modal=document.getElementById("favoritesModal");
 let content=document.getElementById("favoritesContent");

 let favs=getFavs();
 content.innerHTML="<h2>Saved Verses</h2>";

 favs.forEach(ref=>{
  content.innerHTML+=`
   <div class="favorite-item">
   <b>${ref}</b><br>${verses[ref]}
   </div>`;
 });

 modal.style.display="block";
}

function closeFavorites(e){
 if(e.target.id==="favoritesModal"){
  document.getElementById("favoritesModal").style.display="none";
 }
}

/* ACTIONS */
function copyVerse(){
 navigator.clipboard.writeText(verses[key]+" — "+key);
}

function shareVerse(){
 const text=verses[key]+" — "+key;

 if(navigator.share){
  navigator.share({text});
 }else{
  copyVerse();
  alert("Copied! Paste to share.");
 }
}

/* VOICE */
function readVerse(){
 speechSynthesis.cancel();
 const utter=new SpeechSynthesisUtterance(verses[key]);
 utter.rate=0.9;
 speechSynthesis.speak(utter);
}

/* STREAK */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();

 if(l!==t){
  s++;
  localStorage.setItem("s",s);
  localStorage.setItem("l",t);
 }

 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

load();

</script>

</body>
</html>
