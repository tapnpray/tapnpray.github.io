<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;
 margin:0;
 overflow:hidden;
 font-family:Arial,sans-serif;
 color:#fff;
}

/* STATIC BACKGROUND (NO ANIMATION) */
body::before{
 content:"";
 position:fixed;
 top:0;left:0;
 width:100%;
 height:100%;
 min-width:100vw;
 min-height:100vh;

 background-size:cover;
 background-position:center;
 background-image:var(--bg-image);

 transform:scale(1.15); /* prevents white edges */
 filter:blur(3px); /* subtle premium blur */

 z-index:-1;
}

/* CENTER */
.center{
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:
 20px
 env(safe-area-inset-right)
 calc(20px + env(safe-area-inset-bottom))
 env(safe-area-inset-left);
}

/* VERSE BOX */
#votd{
 position:relative;
 background:rgba(0,0,0,.6);
 backdrop-filter:blur(25px);
 border-radius:28px;
 padding:24px;
 max-width:650px;
 width:100%;
 max-height:calc(100vh - 120px);
 overflow:hidden;
 display:flex;
 flex-direction:column;
 text-align:center;
}

/* SPEAKER */
#readIcon{
 position:absolute;
 top:12px;
 left:12px;
 cursor:pointer;
 font-size:18px;
}
#readIcon.speaking{
 animation:pulse 1s infinite;
}
@keyframes pulse{
 0%{transform:scale(1);}
 50%{transform:scale(1.2);}
 100%{transform:scale(1);}
}

#ambientToggle{
 position:absolute;
 top:12px;
 right:12px;
 cursor:pointer;
}
#ambientToggle.active{color:#7CFFB2;}

/* TEXT */
#verse{
 font-size:clamp(22px,5.5vw,34px);
 line-height:1.7;
 overflow-y:auto;
 -webkit-overflow-scrolling:touch;
 cursor:pointer;
}
.word{opacity:.35;}
.word.active{opacity:1;}

#title{font-size:15px;}
#date{color:#108cd7;font-size:14px;}
#ref{color:#108cd7;margin-top:8px;font-size:14px;}

/* CONTROLS */
.translation-select{
 margin-top:6px;
 padding:4px 10px;
 border-radius:999px;
 background:rgba(255,255,255,.15);
 color:#fff;
 border:none;
}

.mode-buttons{
 display:flex;
 gap:10px;
 margin-top:14px;
}
.mode-buttons button{
 flex:1;
 padding:12px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,.15);
 color:#fff;
}
.mode-buttons button.active{background:#108cd7;}

.actions{margin-top:12px;}
.btn{
 padding:12px;
 border-radius:999px;
 border:none;
 background:#108cd7;
 color:#fff;
 width:100%;
}

/* STREAK */
#streak{
 position:fixed;
 bottom:max(25px, env(safe-area-inset-bottom));
 left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:6px 14px;
 border-radius:999px;
 cursor:pointer;
}

/* STREAK MODAL */
#streakModal{
 position:fixed;
 top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.95);
 display:none;
 align-items:center;
 justify-content:center;
 flex-direction:column;
 text-align:center;
}

.badges{
 display:flex;
 gap:15px;
 margin:20px 0;
}
.badge{
 font-size:28px;
 opacity:.3;
}
.badge.active{opacity:1;}

.progress{
 width:80%;
 height:10px;
 background:rgba(255,255,255,.2);
 border-radius:999px;
 overflow:hidden;
}
.progress div{
 height:100%;
 background:#108cd7;
}
</style>
</head>

<body>

<div class="center">
<div id="votd">

<div id="readIcon" onclick="readVerse()">🔊</div>
<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="title">Daily Bible Verse</div>
<div id="date"></div>
<div id="verse" onclick="readVerse()"></div>
<div id="ref"></div>

<select id="translationSelect" class="translation-select">
<option value="nlt">NLT</option>
<option value="niv">NIV</option>
<option value="kjv">KJV</option>
</select>

<div class="mode-buttons">
<button id="dailyBtn" class="active" onclick="showDaily()">Daily</button>
<button id="randomBtn" onclick="showRandom()">Random</button>
</div>

<div class="actions">
<button class="btn" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="streak" onclick="openStreak()"></div>

<div id="streakModal" onclick="closeStreak(event)">
<h1 id="streakCount"></h1>
<div id="streakMsg"></div>

<div class="badges">
<span class="badge" id="b7">🌿</span>
<span class="badge" id="b30">🔥</span>
<span class="badge" id="b100">👑</span>
</div>

<div class="progress"><div id="progressBar"></div></div>
</div>

<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>

<script>

/* BACKGROUNDS + PRELOAD */
const bgSets={
 morning:["/backgrounds/morning1.png","/backgrounds/morning2.png"],
 day:["/backgrounds/day1.png","/backgrounds/day2.png"],
 evening:["/backgrounds/evening1.png","/backgrounds/evening2.png"],
 night:["/backgrounds/night1.png","/backgrounds/night2.png"]
};

function preloadImages(){
 Object.values(bgSets).flat().forEach(src=>{
  const img=new Image();
  img.src=src;
 });
}

let currentBackground="";
let currentTimeBlock="";

function getTimeBlock(){
 const h=new Date().getHours();
 if(h>=5&&h<11) return "morning";
 if(h>=11&&h<17) return "day";
 if(h>=17&&h<21) return "evening";
 return "night";
}

function updateBackground(){
 const newBlock=getTimeBlock();
 if(newBlock!==currentTimeBlock){
  currentTimeBlock=newBlock;
  const set=bgSets[newBlock];
  currentBackground=set[Math.floor(Math.random()*set.length)];
  document.body.style.setProperty('--bg-image', `url('${currentBackground}')`);
 }
}

preloadImages();
updateBackground();
setInterval(updateBackground,60000);

/* VERSES */
let verses={nlt:{},niv:{},kjv:{}};
let translation="nlt";
let dailyKey="",currentKey="";

async function loadTranslation(t){
 if(Object.keys(verses[t]).length) return;
 const res=await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 const data=await res.json();
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    verses[t][`${b} ${c}:${v}`]=data[b][c][v];
}

function getSeed(str){
 let h=0;
 for(let i=0;i<str.length;i++){
  h=(h<<5)-h+str.charCodeAt(i);
  h|=0;
 }
 return Math.abs(h);
}

function generateDaily(){
 const today=new Date().toDateString();
 const stored=JSON.parse(localStorage.getItem("dailyVerse")||"{}");

 if(stored.date===today){
  dailyKey=stored.key;
 }else{
  const keys=Object.keys(verses["nlt"]);
  dailyKey=keys[getSeed(today)%keys.length];
  localStorage.setItem("dailyVerse",JSON.stringify({date:today,key:dailyKey}));
 }

 currentKey=dailyKey;
 update("Daily Bible Verse");
 streak();
}

/* BUTTONS */
function showDaily(){
 currentKey=dailyKey;
 setActive("dailyBtn");
 update("Daily Bible Verse");
}
function showRandom(){
 const keys=Object.keys(verses[translation]);
 currentKey=keys[Math.floor(Math.random()*keys.length)];
 setActive("randomBtn");
 update("Random Verse");
}
function setActive(id){
 document.getElementById("dailyBtn").classList.remove("active");
 document.getElementById("randomBtn").classList.remove("active");
 document.getElementById(id).classList.add("active");
}

/* UPDATE */
function update(title){
 const text=verses[translation][currentKey];
 if(!text) return;

 document.getElementById("title").innerText=title;
 document.getElementById("verse").innerHTML=
  text.split(" ").map(w=>`<span class="word">${w}</span>`).join(" ");
 document.getElementById("ref").innerText=currentKey;
 document.getElementById("date").innerText=new Date().toDateString();
}

/* READ */
function readVerse(){
 const icon=document.getElementById("readIcon");
 icon.classList.add("speaking");

 const words=document.querySelectorAll(".word");
 words.forEach(w=>w.classList.remove("active"));

 let i=0;
 const utter=new SpeechSynthesisUtterance(
  verses[translation][currentKey]+" "+currentKey
 );

 utter.onboundary=e=>{
  if(e.name==="word"&&words[i]){
   words[i].classList.add("active");i++;
  }
 };

 utter.onend=()=>icon.classList.remove("speaking");

 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* STREAK */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let last=localStorage.getItem("l");
 let today=new Date().toDateString();

 if(!last){s=1;}
 else{
  const diff=(new Date(today)-new Date(last))/(86400000);
  if(diff===1)s++;
  else if(diff>2)s=1;
 }

 localStorage.setItem("s",s);
 localStorage.setItem("l",today);

 document.getElementById("streak").innerText="🔥 "+s+" Day Streak";
 updateStreakUI(s);
}

function updateStreakUI(s){
 document.getElementById("streakCount").innerText=s+" Days";

 let msg="Stay consistent 🙏";
 if(s>=7) msg="1 Week Strong 💪";
 if(s>=30) msg="30 Days 🙌";
 if(s>=100) msg="Legend 👑";

 document.getElementById("streakMsg").innerText=msg;

 document.getElementById("b7").classList.toggle("active",s>=7);
 document.getElementById("b30").classList.toggle("active",s>=30);
 document.getElementById("b100").classList.toggle("active",s>=100);

 let next= s<7?7:s<30?30:100;
 document.getElementById("progressBar").style.width=(s/next*100)+"%";
}

function openStreak(){
 document.getElementById("streakModal").style.display="flex";
}
function closeStreak(e){
 if(e.target.id==="streakModal")
 document.getElementById("streakModal").style.display="none";
}

/* SHARE (FIXED MOBILE) */
async function shareVerse(){
 const canvas=document.createElement("canvas");
 canvas.width=1080;
 canvas.height=1080;
 const ctx=canvas.getContext("2d");

 const bg=new Image();
 bg.crossOrigin="anonymous";
 bg.src=currentBackground;
 await new Promise(r=>bg.onload=r);

 ctx.drawImage(bg,0,0,1080,1080);

 ctx.fillStyle="rgba(0,0,0,.55)";
 ctx.fillRect(0,0,1080,1080);

 ctx.fillStyle="rgba(0,0,0,.5)";
 ctx.fillRect(120,220,840,520);

 ctx.fillStyle="#fff";
 ctx.font="bold 48px Arial";
 ctx.textAlign="center";

 wrapText(ctx,verses[translation][currentKey],540,320,720,60);

 ctx.fillStyle="#108cd7";
 ctx.font="32px Arial";
 ctx.fillText(currentKey,540,680);

 const logo=new Image();
 logo.src="logo.svg";
 await new Promise(r=>logo.onload=r);

 ctx.drawImage(logo,60,880,100,100);

 ctx.fillStyle="rgba(255,255,255,.8)";
 ctx.font="22px Arial";
 ctx.textAlign="left";
 ctx.fillText("tapnpray.github.io",60,1000);

 canvas.toBlob(async (blob)=>{
  const file=new File([blob],"tapnpray.png",{type:"image/png"});

  try{
   if(navigator.canShare && navigator.canShare({files:[file]})){
    await navigator.share({files:[file], title:"Tap N Pray"});
   } else {
    throw new Error();
   }
  }catch{
   const url=URL.createObjectURL(blob);
   const a=document.createElement("a");
   a.href=url;
   a.download="tapnpray.png";
   a.click();
   setTimeout(()=>window.open(url,"_blank"),500);
  }
 });
}

/* INIT */
async function init(){
 await loadTranslation("nlt");
 await loadTranslation("niv");
 await loadTranslation("kjv");

 translation = localStorage.getItem("preferredTranslation") || "nlt";
 document.getElementById("translationSelect").value = translation;

 document.getElementById("translationSelect").onchange=(e)=>{
  translation=e.target.value;
  localStorage.setItem("preferredTranslation",translation);
  update(document.getElementById("title").innerText);
 };

 generateDaily();
}

init();

</script>
</body>
</html>
