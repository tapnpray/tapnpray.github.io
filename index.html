<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Tap N Pray - One Tap, One Verse, One Step Closer to Christ.">

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<meta property="og:title" content="Tap N Pray">
<meta property="og:description" content="One Tap, One Verse, One Step Closer to Christ.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tapnpray.github.io/">
<meta property="og:image" content="https://tapnpray.github.io/og-image.png">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  color: #fff;
  padding-bottom: env(safe-area-inset-bottom);
  padding-top: env(safe-area-inset-top);
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-size: cover;
  background-position: center;
  background-image: var(--bg-image);
  filter: brightness(calc(var(--brightness) * 0.55)) blur(3px);
  transform: scale(1.05);
  transition: filter 1s ease;
  z-index: -1;
}

/* LOGO */
#topLogo {
  width: 120px;
  margin: 20px auto 10px;
  display: block;
}

/* LAYOUT */
.center {
  min-height: calc(100vh - 260px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
}

/* VERSE BOX */
#votd {
  position: relative;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(25px);
  border-radius: 28px;
  padding: 24px;
  max-width: 700px;
  width: 100%;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  text-align: center;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ICONS */
#readIcon, #ambientToggle {
  position: absolute;
  top: 12px;
  font-size: 26px;
  cursor: pointer;
}

#readIcon { left: 12px; }
#ambientToggle { right: 12px; }

#ambientToggle.active { color: #7CFFB2; }

/* CORNER ICONS */
#aboutIcon, #donateIcon {
  position: absolute;
  bottom: 12px;
  font-size: 18px;
  opacity: 0.6;
  text-decoration: none;
}

#aboutIcon { left: 14px; }
#donateIcon { right: 14px; }

#aboutIcon:hover, #donateIcon:hover {
  opacity: 1;
  transform: scale(1.15);
}

/* TEXT */
#title { font-size: 15px; }
#date, #ref { color: #108cd7; font-size: 14px; }

#verse {
  margin-top: 10px;
  font-size: clamp(22px, 5vw, 32px);
  line-height: 1.7;
  overflow-y: auto;
  flex: 1;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 999px;
  border: none;
  background: #108cd7;
  color: #fff;
}

/* STREAK */
#streak {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.6);
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
}

/* STREAK MODAL */
#streakModal {
  position: fixed;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
}

/* ABOUT MODAL */
#aboutModal {
  position: fixed;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(10px);
  display: none;
  justify-content: center;
  align-items: center;
}

#aboutContent {
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(25px);
  border-radius: 28px;
  max-width: 700px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px;
}

.about-section { margin-bottom: 20px; }
.about-section h3 { color: #108cd7; }
.about-donate {
  margin-top: 20px;
  padding: 15px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  text-align: center;
}
.about-donate a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 16px;
  border-radius: 999px;
  background: #108cd7;
  color: #fff;
  text-decoration: none;
}
</style>
</head>
<body>

<!-- LOGO -->
<img id="topLogo" src="logo.svg" alt="Tap N Pray Logo">

<div class="center">
  <div id="votd">

    <!-- TOP ICONS -->
    <div id="readIcon">🔊</div>
    <div id="ambientToggle">🌿</div>

    <!-- CONTENT -->
    <div id="title">Daily Bible Verse</div>
    <div id="date"></div>
    <div id="verse"></div>
    <div id="ref"></div>

    <!-- CONTROLS -->
    <select id="translationSelect">
      <option value="nlt">NLT</option>
      <option value="niv">NIV</option>
      <option value="kjv">KJV</option>
    </select>

    <div class="mode-buttons">
      <button id="dailyBtn" class="active">Daily</button>
      <button id="randomBtn">Random</button>
    </div>

    <button class="btn" id="shareBtn">Share</button>

    <!-- CORNER ICONS -->
    <a id="aboutIcon" title="About">❓</a>

    <a href="https://venmo.com/u/tapnpray"
       target="_blank"
       id="donateIcon"
       title="Donate">
      ❤️
    </a>

  </div>
</div>

<!-- STREAK BADGE -->
<div id="streak"></div>

<!-- STREAK MODAL -->
<div id="streakModal">
  <div id="streakContent">
    <h1 id="streakCount"></h1>
    <div id="streakMsg"></div>

    <div class="badges">
      <span class="badge" id="b7">🌿</span>
      <span class="badge" id="b30">🔥</span>
      <span class="badge" id="b100">👑</span>
    </div>

    <div class="progress">
      <div id="progressBar"></div>
    </div>
  </div>
</div>

<!-- ABOUT MODAL -->
<div id="aboutModal">
  <div id="aboutContent">
    <h2>About Tap N Pray</h2>
    <div id="aboutBody">Loading...</div>
  </div>
</div>

<!-- AUDIO -->
<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>
<script>

/* =========================
   DOM REFERENCES
========================= */
const titleEl = document.getElementById("title");
const dateEl = document.getElementById("date");
const verseEl = document.getElementById("verse");
const refEl = document.getElementById("ref");

const translationSelect = document.getElementById("translationSelect");
const dailyBtn = document.getElementById("dailyBtn");
const randomBtn = document.getElementById("randomBtn");
const shareBtn = document.getElementById("shareBtn");

const readIcon = document.getElementById("readIcon");
const ambientToggle = document.getElementById("ambientToggle");

const streakEl = document.getElementById("streak");
const streakModal = document.getElementById("streakModal");
const streakCount = document.getElementById("streakCount");
const streakMsg = document.getElementById("streakMsg");

const b7 = document.getElementById("b7");
const b30 = document.getElementById("b30");
const b100 = document.getElementById("b100");
const progressBar = document.getElementById("progressBar");

const ambientAudio = document.getElementById("ambientAudio");

/* ABOUT */
const aboutIcon = document.getElementById("aboutIcon");
const aboutModal = document.getElementById("aboutModal");
const aboutBody = document.getElementById("aboutBody");

/* =========================
   BACKGROUND SYSTEM
========================= */
const bgSets = {
  morning: ["/backgrounds/morning1.png","/backgrounds/morning2.png"],
  day: ["/backgrounds/day1.png","/backgrounds/day2.png"],
  evening: ["/backgrounds/evening1.png","/backgrounds/evening2.png"],
  night: ["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let currentBackground = "";
let currentBrightness = 1.0;

function getTimeBlock() {
  const h = new Date().getHours();
  if (h < 11) return "morning";
  if (h < 17) return "day";
  if (h < 21) return "evening";
  return "night";
}

function updateBackground() {
  const block = getTimeBlock();
  const set = bgSets[block];

  const img = set[Math.floor(Math.random() * set.length)];
  currentBackground = img;

  const brightness = (block === "night" || block === "evening") ? 0.75 : 1.0;
  currentBrightness = brightness;

  document.body.style.setProperty('--bg-image', `url('${img}')`);
  document.body.style.setProperty('--brightness', brightness);
}

updateBackground();

/* =========================
   VERSE ENGINE
========================= */
let verses = { nlt:{}, niv:{}, kjv:{} };
let translation = "nlt";
let dailyKey = "";
let currentKey = "";

async function loadTranslation(t) {
  try {
    const res = await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    if (!res.ok) return;

    const data = await res.json();

    Object.entries(data).forEach(([book, chapters]) => {
      Object.entries(chapters).forEach(([chapter, versesObj]) => {
        Object.entries(versesObj).forEach(([v, text]) => {
          verses[t][`${book} ${chapter}:${v}`] = text;
        });
      });
    });

  } catch {}
}

function getSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = (h << 5) - h + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function generateDaily() {
  const today = new Date().toDateString();
  const stored = JSON.parse(localStorage.getItem("dailyVerse") || "{}");

  if (stored.date === today) {
    dailyKey = stored.key;
  } else {
    const keys = Object.keys(verses.nlt);
    if (!keys.length) return;

    dailyKey = keys[getSeed(today) % keys.length];

    localStorage.setItem("dailyVerse", JSON.stringify({
      date: today,
      key: dailyKey
    }));
  }

  currentKey = dailyKey;
  updateVerse("Daily Bible Verse");
  updateStreak();
}

function showDaily() {
  currentKey = dailyKey;
  updateVerse("Daily Bible Verse");

  dailyBtn.classList.add("active");
  randomBtn.classList.remove("active");
}

function showRandom() {
  const keys = Object.keys(verses[translation]);
  if (!keys.length) return;

  currentKey = keys[Math.floor(Math.random() * keys.length)];
  updateVerse("Random Bible Verse");

  dailyBtn.classList.remove("active");
  randomBtn.classList.add("active");
}

function changeTranslation(t) {
  translation = t;

  if (!verses[translation][currentKey]) {
    const keys = Object.keys(verses[translation]);
    if (!keys.length) return;
    currentKey = keys[0];
  }

  updateVerse(
    dailyBtn.classList.contains("active")
      ? "Daily Bible Verse"
      : "Random Bible Verse"
  );
}

function updateVerse(titleText) {
  const text = verses[translation][currentKey];
  if (!text) return;

  titleEl.innerText = titleText;
  verseEl.innerText = text;
  refEl.innerText = currentKey;
  dateEl.innerText = new Date().toDateString();
}

/* =========================
   STREAK SYSTEM
========================= */
function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = localStorage.getItem("lastVisit");

  let streak = parseInt(localStorage.getItem("streak")) || 1;

  if (lastVisit) {
    const last = new Date(lastVisit);
    const now = new Date(today);
    const diff = Math.floor((now - last) / 86400000);

    if (diff === 1) streak++;
    else if (diff > 1) streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastVisit", today);

  streakEl.innerText = "🔥 " + streak + " Day Streak";
  streakCount.innerText = streak + " Days";

  b7.classList.toggle("active", streak >= 7);
  b30.classList.toggle("active", streak >= 30);
  b100.classList.toggle("active", streak >= 100);

  progressBar.style.width = Math.min(100, streak) + "%";
}

function openStreak() {
  streakModal.style.display = "flex";
}

function closeStreak(e) {
  if (e.target === streakModal) {
    streakModal.style.display = "none";
  }
}

/* =========================
   ABOUT (PREMIUM)
========================= */
async function loadAbout() {
  try {
    const res = await fetch("https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/refs/heads/main/README.md");
    const text = await res.text();

    const sections = text.split("## ");
    let html = "";

    sections.forEach((sec, i) => {
      if (!sec.trim()) return;

      let title = "";
      let body = sec;

      if (i !== 0) {
        const split = sec.split("\n");
        title = split.shift();
        body = split.join("\n");
      }

      body = body
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\n- (.*)/g, "<li>$1</li>")
        .replace(/\n/g, "<br>");

      if (body.includes("<li>")) {
        body = "<ul>" + body + "</ul>";
      }

      html += `
        <div class="about-section">
          ${title ? `<h3>${title}</h3>` : ""}
          <div class="about-text">${body}</div>
        </div>
      `;
    });

    html += `
      <div class="about-donate">
        <p>Support the mission and help spread God's Word.</p>
        <a href="https://venmo.com/u/tapnpray" target="_blank">❤️ Donate</a>
      </div>
    `;

    aboutBody.innerHTML = html;

  } catch {
    aboutBody.innerHTML = "Unable to load content.";
  }
}

function openAbout() {
  aboutModal.style.display = "flex";

  if (!aboutBody.dataset.loaded) {
    loadAbout();
    aboutBody.dataset.loaded = "true";
  }
}

function closeAbout(e) {
  if (e.target === aboutModal) {
    aboutModal.style.display = "none";
  }
}

/* =========================
   TEXT TO SPEECH
========================= */
function readVerse() {
  const text = verses?.[translation]?.[currentKey];
  if (!text) return;

  const u = new SpeechSynthesisUtterance(text + " " + currentKey);

  try {
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  } catch {}
}

/* =========================
   AMBIENT AUDIO
========================= */
let ambientOn = false;

function toggleAmbient() {
  const a = ambientAudio;

  if (ambientOn) {
    fadeOut(a);
  } else {
    a.volume = 0;
    a.play().catch(()=>{});
    fadeIn(a);
  }

  ambientOn = !ambientOn;
  ambientToggle.classList.toggle("active");
}

function fadeIn(a) {
  let v = 0;
  const i = setInterval(() => {
    v += 0.05;
    if (v >= 0.3) {
      v = 0.3;
      clearInterval(i);
    }
    a.volume = v;
  }, 100);
}

function fadeOut(a) {
  let v = a.volume;
  const i = setInterval(() => {
    v -= 0.05;
    if (v <= 0) {
      clearInterval(i);
      a.pause();
      a.currentTime = 0;
    }
    a.volume = v;
  }, 100);
}

/* =========================
   PREMIUM SHARE (FINAL)
========================= */
async function shareVerse() {
  try {
    if (!verses || !translation || !currentKey) return;

    const verseText = verses?.[translation]?.[currentKey];
    if (!verseText) return;

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;
    const ctx = canvas.getContext("2d");

    let bgLoaded = false;
    let bgImg = new Image();

    if (currentBackground) {
      bgImg.crossOrigin = "anonymous";
      bgImg.src = currentBackground;

      await new Promise(res => {
        bgImg.onload = () => { bgLoaded = true; res(); };
        bgImg.onerror = res;
      });
    }

    if (bgLoaded) {
      ctx.filter = `brightness(${(currentBrightness || 1) * 0.6}) blur(6px)`;
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
      ctx.filter = "none";
    } else {
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    const x = 120, y = 200, w = 840, h = 520, r = 40;

    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();

    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fill();

    ctx.fillStyle = "#F2F2F2";
    ctx.textAlign = "center";
    ctx.font = "bold 46px Georgia";

    const words = verseText.split(" ");
    let line = "";
    const lines = [];
    const maxWidth = w - 120;

    words.forEach(word => {
      const test = line + word + " ";
      if (ctx.measureText(test).width > maxWidth) {
        lines.push(line);
        line = word + " ";
      } else {
        line = test;
      }
    });
    if (line) lines.push(line);

    const lineHeight = 60;
    const totalTextHeight = lines.length * lineHeight;
    const startY = y + (h / 2) - (totalTextHeight / 2);

    lines.forEach((l, i) => {
      ctx.fillText(l.trim(), canvas.width / 2, startY + i * lineHeight);
    });

    const refY = Math.min(
      startY + (lines.length * lineHeight) + 40,
      y + h - 30
    );

    ctx.font = "bold 36px Georgia";
    ctx.fillStyle = "#108cd7";
    ctx.fillText(currentKey, canvas.width / 2, refY);

    try {
      const logo = new Image();
      logo.src = "logo.svg";
      await new Promise(res => { logo.onload = res; logo.onerror = res; });
      ctx.drawImage(logo, 60, canvas.height - 160, 100, 100);
    } catch {}

    ctx.font = "bold 26px Georgia";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "left";
    ctx.fillText("tapnpray.github.io", 60, canvas.height - 30);

    const blob = await new Promise(res => canvas.toBlob(res, "image/png"));
    if (!blob) return;

    const file = new File([blob], "tapnpray.png", { type: "image/png" });

    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "Tap N Pray",
          text: verseText + "\n\n" + currentKey
        });
        return;
      } catch {}
    }

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tapnpray.png";
    a.click();
    URL.revokeObjectURL(url);

  } catch (err) {
    console.error("Share error:", err);
  }
}

/* =========================
   EVENTS
========================= */
readIcon.addEventListener("click", readVerse);
ambientToggle.addEventListener("click", toggleAmbient);

dailyBtn.addEventListener("click", showDaily);
randomBtn.addEventListener("click", showRandom);

translationSelect.addEventListener("change", e => changeTranslation(e.target.value));
shareBtn.addEventListener("click", shareVerse);

streakEl.addEventListener("click", openStreak);
streakModal.addEventListener("click", closeStreak);

aboutIcon.addEventListener("click", openAbout);
aboutModal.addEventListener("click", closeAbout);

/* =========================
   INIT
========================= */
(async () => {
  await loadTranslation("nlt");
  await loadTranslation("niv");
  await loadTranslation("kjv");

  generateDaily();
})();
</script>

</body>
</html>
