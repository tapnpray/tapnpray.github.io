<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="description" content="Tap N Pray - One Tap, One Verse, One Step Closer to Christ.">

<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

/* =========================
   BASE
========================= */
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: 'Merriweather', serif;
  color: #fff;
}

/* =========================
   BACKGROUND
========================= */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  transform: scale(1.05);
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  backdrop-filter: blur(22px);
  background: radial-gradient(
    circle at center,
    rgba(0,0,0,0.3),
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.9)
  );
  z-index: -1;
}

/* =========================
   LOGO
========================= */
#topLogo {
  width: 90px;
  margin: 20px auto 10px;
  display: block;
  opacity: 0.9;
}

/* =========================
   CENTER CONTENT
========================= */
.center {
  height: calc(100vh - 140px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;
}

/* =========================
   TEXT
========================= */
#title {
  font-size: 13px;
  opacity: 0.7;
  text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

#date {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 10px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

#verse {
  font-size: clamp(26px, 6vw, 36px);
  line-height: 1.7;
  max-width: 90%;
  text-shadow: 0 6px 30px rgba(0,0,0,0.8);
}

#ref {
  margin-top: 14px;
  color: #108cd7;
  font-weight: bold;
  text-shadow: 0 2px 10px rgba(0,0,0,0.6);
}

/* word highlight */
.word { opacity: .35; }
.word.active { opacity: 1; }

/* =========================
   TAP HINT
========================= */
#tapHint {
  margin-top: 12px;
  font-size: 13px;
  opacity: 0.6;
  transition: opacity 0.5s;
}

/* =========================
   FAB (CENTER)
========================= */
#fab {
  position: fixed;
  bottom: 35px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
}

.fab-main {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  cursor: pointer;
  transition: 0.25s;
}

.fab-main:active {
  transform: scale(0.95);
}

/* =========================
   MENU (CENTER ABOVE FAB)
========================= */
.fab-menu {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);

  width: 90%;
  max-width: 420px;

  display: flex;
  flex-direction: column;
  gap: 12px;

  padding: 18px;

  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  border-radius: 22px;

  opacity: 0;
  pointer-events: none;
  transition: all 0.25s ease;
}

.fab-menu.open {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

/* menu item */
.fab-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.fab-item:hover {
  background: rgba(255,255,255,0.08);
}

.fab-icon {
  width: 24px;
  text-align: center;
}

</style>
</head>
<body>

<!-- LOGO -->
<img id="topLogo" src="logo.svg" alt="Tap N Pray Logo">

<!-- MAIN CENTER CONTENT -->
<div class="center">

  <div id="title">Daily Bible Verse</div>
  <div id="date"></div>

  <div id="verse"></div>

  <div id="ref"></div>

  <!-- Tap hint (restored + subtle) -->
  <div id="tapHint">Tap verse to listen 🔊</div>

</div>

<!-- =========================
     FAB BUTTON (CENTER)
========================= -->
<div id="fab">
  <div class="fab-main" id="fabMain">✚</div>
</div>

<!-- =========================
     MENU (CENTER ABOVE FAB)
========================= -->
<div class="fab-menu" id="fabMenu">

  <div class="fab-item" id="dailyBtn">
    <div class="fab-icon">📅</div>
    Daily Verse
  </div>

  <div class="fab-item" id="randomBtn">
    <div class="fab-icon">🔀</div>
    Random Verse
  </div>

  <div class="fab-item" data-t="nlt">
    <div class="fab-icon">🅝</div>
    NLT Translation
  </div>

  <div class="fab-item" data-t="niv">
    <div class="fab-icon">🅥</div>
    NIV Translation
  </div>

  <div class="fab-item" data-t="kjv">
    <div class="fab-icon">🅚</div>
    KJV Translation
  </div>

  <div class="fab-item" id="shareBtn">
    <div class="fab-icon">🔗</div>
    Share Verse
  </div>

  <div class="fab-item" id="ambientToggle">
    <div class="fab-icon">🌿</div>
    Ambient Sound
  </div>

  <div class="fab-item" id="streakBtn">
    <div class="fab-icon">🔥</div>
    Streak
  </div>

  <div class="fab-item" id="helpIcon">
    <div class="fab-icon">❓</div>
    Help
  </div>

  <div class="fab-item" id="donateIcon">
    <div class="fab-icon">♥</div>
    Support
  </div>

</div>

<!-- =========================
     STREAK MODAL
========================= -->
<div id="streakModal" style="
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
">
  <div style="
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(20px);
    padding:25px;
    border-radius:20px;
    text-align:center;
  ">
    <h1 id="streakCount"></h1>
    <div id="streakMsg"></div>
  </div>
</div>

<!-- =========================
     HELP MODAL
========================= -->
<div id="helpModal" style="
  display:none;
  position:fixed;
  inset:0;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
">
  <div id="helpContent" style="
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(20px);
    padding:20px;
    border-radius:20px;
    max-width:500px;
    max-height:80vh;
    overflow:auto;
  ">
    Loading...
  </div>
</div>

<!-- =========================
     AUDIO
========================= -->
<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>
<script>

/* =========================
   READ ALOUD (KEPT ✅)
========================= */
function readVerse() {
  const words = document.querySelectorAll(".word");
  words.forEach(w => w.classList.remove("active"));

  let i = 0;
  const text = verses[translation][currentKey];
  if (!text) return;

  const u = new SpeechSynthesisUtterance(text + " " + currentKey);

  u.rate = 0.95;
  u.pitch = 1;

  u.onboundary = () => {
    if (words[i]) words[i++].classList.add("active");
  };

  speechSynthesis.cancel();
  setTimeout(() => speechSynthesis.speak(u), 100);
}

verseEl.addEventListener("click", readVerse);


/* =========================
   TAP HINT (REMINDER ✅)
========================= */
const hint = document.getElementById("tapHint");

function showHint() {
  hint.classList.add("show");
  setTimeout(() => hint.classList.remove("show"), 4000);
}


/* =========================
   AMBIENT SOUND (SMOOTH)
========================= */
let ambientOn = false;

function toggleAmbient() {
  if (ambientOn) {
    fadeOut(ambientAudio);
  } else {
    ambientAudio.volume = 0;
    ambientAudio.play().catch(()=>{});
    fadeIn(ambientAudio);
  }
  ambientOn = !ambientOn;
}

function fadeIn(a) {
  let v = 0;
  const i = setInterval(() => {
    v += 0.05;
    if (v >= 0.3) { v = 0.3; clearInterval(i); }
    a.volume = v;
  }, 100);
}

function fadeOut(a) {
  let v = a.volume;
  const i = setInterval(() => {
    v -= 0.05;
    if (v <= 0) {
      clearInterval(i);
      a.pause();
      a.currentTime = 0;
    }
    a.volume = v;
  }, 100);
}


/* =========================
   SHARE (PREMIUM IMAGE)
========================= */
async function shareVerse() {
  try {
    const verseText = verses[translation][currentKey];
    if (!verseText) return;

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;

    const ctx = canvas.getContext("2d");

    // Background
    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,1080,1080);

    // Title
    ctx.fillStyle = "#aaa";
    ctx.font = "28px Merriweather";
    ctx.textAlign = "center";
    ctx.fillText("Daily Bible Verse", 540, 150);

    // Verse
    ctx.fillStyle = "#fff";
    ctx.font = "700 42px Merriweather";

    const words = verseText.split(" ");
    let line = "";
    let y = 350;

    words.forEach(word => {
      const test = line + word + " ";
      if (ctx.measureText(test).width > 800) {
        ctx.fillText(line, 540, y);
        line = word + " ";
        y += 60;
      } else {
        line = test;
      }
    });

    ctx.fillText(line, 540, y);

    // Reference
    ctx.fillStyle = "#108cd7";
    ctx.font = "32px Merriweather";
    ctx.fillText(currentKey, 540, y + 100);

    const blob = await new Promise(res => canvas.toBlob(res));
    const file = new File([blob], "verse.png", { type: "image/png" });

    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file] });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "verse.png";
      a.click();
    }

  } catch(e) {
    console.error(e);
  }
}


/* =========================
   EVENTS
========================= */
dailyBtn.addEventListener("click", showDaily);
randomBtn.addEventListener("click", showRandom);
shareBtn.addEventListener("click", shareVerse);
ambientToggle.addEventListener("click", toggleAmbient);

streakBtn.addEventListener("click", openStreak);
helpIcon.addEventListener("click", openHelp);
donateIcon.addEventListener("click", goDonate);


/* =========================
   INIT (FINAL)
========================= */
(async () => {
  await loadTranslation("nlt");
  await loadTranslation("niv");
  await loadTranslation("kjv");

  generateDaily();
  changeTranslation("nlt");

  // 👇 Show hint on first load
  setTimeout(showHint, 800);
})();

</script>
   
</body>
</html>
