<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Arial,sans-serif;color:#fff;
 background-size:cover;background-position:center;
 transition:background-image 2s ease-in-out;
}

.center{
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:20px;
}

#votd{
 position:relative;
 background:rgba(0,0,0,.6);
 backdrop-filter:blur(25px);
 border-radius:28px;
 padding:28px;
 max-width:650px;
 width:100%;
 max-height:80vh;
 display:flex;
 flex-direction:column;
 text-align:center;
}

/* 🔊 Speaker Icon */
#readIcon{
 position:absolute;
 top:12px;
 left:12px;
 cursor:pointer;
 font-size:18px;
 opacity:.85;
 transition:.2s;
}
#readIcon:hover{
 opacity:1;
 transform:scale(1.1);
}

/* Pulse animation when speaking */
#readIcon.speaking{
 animation:pulse 1s infinite;
}
@keyframes pulse{
 0%{transform:scale(1);}
 50%{transform:scale(1.2);}
 100%{transform:scale(1);}
}

/* TEXT */
#verse{
 font-size:clamp(24px,6vw,34px);
 line-height:1.7;
 overflow-y:auto;
 cursor:pointer;
}
.word{opacity:.35;transition:.2s;}
.word.active{opacity:1;}

#title{font-size:15px;opacity:.85;}
#date{color:#108cd7;font-size:14px;}
#ref{color:#108cd7;margin-top:8px;font-size:14px;}

#ambientToggle{position:absolute;top:12px;right:12px;cursor:pointer;}
#ambientToggle.active{color:#7CFFB2;}

.translation-select{
 margin-top:6px;
 padding:4px 10px;
 font-size:12px;
 border-radius:999px;
 border:none;
 background:rgba(255,255,255,.15);
 color:#fff;
}

.mode-buttons{
 display:flex;
 gap:10px;
 margin-top:14px;
}
.mode-buttons button{
 flex:1;
 padding:12px;
 border:none;
 border-radius:999px;
 background:rgba(255,255,255,.15);
 color:#fff;
 cursor:pointer;
}
.mode-buttons button.active{background:#108cd7;}

.actions{
 display:grid;
 grid-template-columns:1fr;
 gap:10px;margin-top:12px;
}
.btn{
 padding:12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;
}
.primary{background:#108cd7}

#streak{
 position:fixed;bottom:25px;left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:6px 14px;border-radius:999px;
}
</style>
</head>

<body>

<div class="center">
<div id="votd">

<div id="readIcon" onclick="readVerse()" title="Listen">🔊</div>
<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="title">Daily Bible Verse</div>
<div id="date"></div>
<div id="verse" onclick="readVerse()"></div>
<div id="ref"></div>

<select id="translationSelect" class="translation-select">
<option value="nlt">NLT</option>
<option value="niv">NIV</option>
<option value="kjv">KJV</option>
</select>

<div class="mode-buttons">
<button id="dailyBtn" class="active" onclick="showDaily()">Daily</button>
<button id="randomBtn" onclick="showRandom()">Random</button>
</div>

<div class="actions">
<button class="btn primary" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="streak"></div>

<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>

<script>

/* BACKGROUNDS */
const bgSets={
 morning:["/backgrounds/morning1.png","/backgrounds/morning2.png"],
 day:["/backgrounds/day1.png","/backgrounds/day2.png"],
 evening:["/backgrounds/evening1.png","/backgrounds/evening2.png"],
 night:["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let currentBackground="";
let currentTimeBlock="";
let bgIndex=0;

function getTimeBlock(){
 const h=new Date().getHours();
 if(h>=5&&h<11) return "morning";
 if(h>=11&&h<17) return "day";
 if(h>=17&&h<21) return "evening";
 return "night";
}

function updateBackground(){
 const newBlock=getTimeBlock();
 if(newBlock!==currentTimeBlock){
  currentTimeBlock=newBlock;
  const set=bgSets[newBlock];
  bgIndex=Math.floor(Math.random()*set.length);
  currentBackground=set[bgIndex];
  document.body.style.backgroundImage=`url('${currentBackground}')`;
 }
}

updateBackground();
setInterval(updateBackground,60000);

/* VERSES */
let verses={nlt:{},niv:{},kjv:{}};
let translation="nlt";
let dailyKey="",currentKey="";

async function loadTranslation(t){
 if(Object.keys(verses[t]).length) return;
 const res=await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 const data=await res.json();
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    verses[t][`${b} ${c}:${v}`]=data[b][c][v];
}

function getSeed(str){
 let h=0;
 for(let i=0;i<str.length;i++){
  h=(h<<5)-h+str.charCodeAt(i);
  h|=0;
 }
 return Math.abs(h);
}

function generateDaily(){
 const today=new Date().toDateString();
 const stored=JSON.parse(localStorage.getItem("dailyVerse")||"{}");

 if(stored.date===today){
  dailyKey=stored.key;
 }else{
  const keys=Object.keys(verses["nlt"]);
  dailyKey=keys[getSeed(today)%keys.length];
  localStorage.setItem("dailyVerse",JSON.stringify({date:today,key:dailyKey}));
 }

 currentKey=dailyKey;
 update("Daily Bible Verse");
 streak();
}

function showDaily(){
 currentKey=dailyKey;
 setActive("dailyBtn");
 update("Daily Bible Verse");
}
function showRandom(){
 const keys=Object.keys(verses[translation]);
 currentKey=keys[Math.floor(Math.random()*keys.length)];
 setActive("randomBtn");
 update("Random Verse");
}
function setActive(id){
 document.getElementById("dailyBtn").classList.remove("active");
 document.getElementById("randomBtn").classList.remove("active");
 document.getElementById(id).classList.add("active");
}

function update(title){
 const text=verses[translation][currentKey];
 if(!text) return;

 document.getElementById("title").innerText=title;
 document.getElementById("verse").innerHTML=
  text.split(" ").map(w=>`<span class="word">${w}</span>`).join(" ");
 document.getElementById("ref").innerText=currentKey;
 document.getElementById("date").innerText=new Date().toDateString();
}

/* READ */
function readVerse(){
 const icon=document.getElementById("readIcon");
 icon.classList.add("speaking");

 const words=document.querySelectorAll(".word");
 words.forEach(w=>w.classList.remove("active"));

 let i=0;
 const utter=new SpeechSynthesisUtterance(
  verses[translation][currentKey] + " " + currentKey
 );

 utter.onboundary=e=>{
  if(e.name==="word"&&words[i]){
   words[i].classList.add("active");i++;
  }
 };

 utter.onend=()=>{
  icon.classList.remove("speaking");
 };

 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* AMBIENT */
let ambientOn=false;
function toggleAmbient(){
 const a=document.getElementById("ambientAudio");

 if(ambientOn){
  fadeOut(a);
 }else{
  a.volume=0;
  a.play();
  fadeIn(a);
 }

 ambientOn=!ambientOn;
 document.getElementById("ambientToggle").classList.toggle("active");
}

function fadeIn(a){
 let v=0;
 const i=setInterval(()=>{
  v+=0.05;
  if(v>=0.3){v=0.3;clearInterval(i);}
  a.volume=v;
 },100);
}

function fadeOut(a){
 let v=a.volume;
 const i=setInterval(()=>{
  v-=0.05;
  if(v<=0){
   v=0;clearInterval(i);
   a.pause();a.currentTime=0;
  }
  a.volume=v;
 },100);
}

/* SHARE (unchanged) */
async function shareVerse(){ /* same as before */ }

/* UTIL */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

/* INIT */
async function init(){
 await loadTranslation("nlt");
 await loadTranslation("niv");
 await loadTranslation("kjv");

 document.getElementById("translationSelect").onchange=(e)=>{
  translation=e.target.value;
  update(document.getElementById("title").innerText);
 };

 generateDaily();
}

init();

</script>
</body>
</html>
