<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-ELQ3E5WGCT');

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Arial,sans-serif;color:#fff;
 background-size:cover;background-position:center;
}

/* Background FX */
body{
 transition:background-image 1.5s ease-in-out;
 animation:zoom 60s linear infinite;
}
@keyframes zoom{
 0%{background-size:100%;}
 100%{background-size:110%;}
}

body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.9));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(12px);z-index:-1;
}

/* Layout */
.center{
 height:100%;
 display:flex;
 align-items:center;
 justify-content:center;
 padding:100px 15px 160px;
}

#votd{
 position:relative;
 background:rgba(0,0,0,.6);
 border-radius:28px;
 padding:24px;
 max-width:520px;width:100%;
 backdrop-filter:blur(30px);
 text-align:center;
 max-height:72vh;
 display:flex;
 flex-direction:column;
}

/* Logo */
.logo-container{
 position:fixed;bottom:25px;left:20px;opacity:.7;
}
.logo-container img{max-width:55px}

/* Verse */
#verse{
 font-size:clamp(22px,5vw,30px);
 line-height:1.6;
 overflow-y:auto;
}
.word{opacity:.35;transition:.2s;}
.word.active{opacity:1;}

/* Header */
#title{font-size:14px;opacity:.85;}
#date{color:#108cd7;font-size:14px;}
#ref{color:#108cd7;margin-top:8px;font-size:14px;}

/* Controls */
#favoriteStar{position:absolute;top:12px;left:12px;cursor:pointer;}
#ambientToggle{position:absolute;top:12px;right:12px;cursor:pointer;}
#ambientToggle.active{color:#7CFFB2;text-shadow:0 0 8px #7CFFB2;}

/* Translation */
.translation-select{
 padding:4px 10px;
 font-size:12px;
 border-radius:999px;
 border:none;
 background:rgba(255,255,255,0.15);
 color:#fff;
}

/* Topics */
#topics{
 display:flex;flex-wrap:wrap;gap:8px;
 justify-content:center;margin:10px 0;
}
#topics button{
 padding:6px 12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;font-size:12px;
}

/* Actions */
.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;margin-top:10px;
}
.btn{
 padding:12px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;
}
.primary{background:#108cd7}

/* Favorites */
#favoritesModal{
 position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,.95);
 display:none;overflow:auto;padding:20px;
}
.favorite-item{
 margin-bottom:15px;
 padding:15px;
 background:rgba(255,255,255,.1);
 border-radius:12px;
}

/* Streak */
#streak{
 position:fixed;bottom:25px;left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,.6);
 padding:8px 16px;border-radius:999px;
}
</style>
</head>

<body>

<div class="logo-container"><img src="logo.svg"></div>

<div class="center">
<div id="votd">

<div id="favoriteStar" onclick="toggleFavorite()">☆</div>
<div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

<div id="title">Daily Bible Verse</div>
<div id="date"></div>
<div id="verse"></div>
<div id="ref"></div>

<div style="display:flex;justify-content:center;margin-top:8px;">
<select id="translationSelect" class="translation-select">
<option value="nlt">NLT</option>
<option value="niv">NIV</option>
<option value="kjv">KJV</option>
</select>
</div>

<div id="topics">
<button onclick="goDaily()">Daily</button>
<button onclick="pickTopic('peace')">Peace</button>
<button onclick="pickTopic('strength')">Strength</button>
<button onclick="pickTopic('hope')">Hope</button>
<button onclick="pickTopic('guidance')">Guidance</button>
<button onclick="pickTopic('faith')">Faith</button>
</div>

<div class="actions">
<button class="btn primary" onclick="readVerse()">Read Verse</button>
<button class="btn" onclick="openFavorites()">Favorites</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
</div>

</div>
</div>

<div id="streak"></div>

<div id="favoritesModal" onclick="closeFavorites(event)">
<div id="favoritesContent"></div>
</div>

<audio id="ambientAudio" loop>
<source src="/sounds/calm.mp3">
</audio>

<script>

/* BACKGROUNDS */
const bgSets={
 morning:["/backgrounds/morning1.png","/backgrounds/morning2.png"],
 day:["/backgrounds/day1.png","/backgrounds/day2.png"],
 evening:["/backgrounds/evening1.png","/backgrounds/evening2.png"],
 night:["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let bgIndex=0,currentTimeBlock="";

function getTimeBlock(){
 const h=new Date().getHours();
 if(h>=5&&h<11)return"morning";
 if(h>=11&&h<17)return"day";
 if(h>=17&&h<21)return"evening";
 return"night";
}

function setBackground(){
 const set=bgSets[getTimeBlock()];
 document.body.style.backgroundImage=`url('${set[bgIndex]}')`;
}

function rotateBackground(){
 const t=getTimeBlock();
 if(t!==currentTimeBlock){bgIndex=0;currentTimeBlock=t;}
 const set=bgSets[t];
 bgIndex=(bgIndex+1)%set.length;
 setBackground();
}

setBackground();
setInterval(rotateBackground,60000);

/* VERSES */
let verses={nlt:{},niv:{},kjv:{}};
let translation="nlt";
let key="",dailyKey="";

async function loadTranslation(t){
 if(Object.keys(verses[t]).length) return;

 const res=await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 const data=await res.json();

 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];

 verses[t]=flat;
}

function getSeed(str){
 let h=0;
 for(let i=0;i<str.length;i++){h=(h<<5)-h+str.charCodeAt(i);h|=0;}
 return Math.abs(h);
}

/* DAILY LOCK */
function generateDaily(){
 const today=new Date().toDateString();
 const stored=JSON.parse(localStorage.getItem("dailyVerse")||"{}");

 if(stored.date===today){
  key=stored.key;
 }else{
  const keys=Object.keys(verses["nlt"]);
  key=keys[getSeed(today)%keys.length];
  localStorage.setItem("dailyVerse",JSON.stringify({date:today,key}));
 }

 update("Daily Bible Verse");
 streak();
}

/* TOPICS */
function pickTopic(topic){
 const today=new Date().toDateString();
 let store=JSON.parse(localStorage.getItem("topicDaily")||"{}");

 if(store[topic]?.date===today){
  key=store[topic].key;
 }else{
  const refs=Object.keys(verses[translation]);
  const filtered=refs.filter(r=>verses[translation][r]?.toLowerCase().includes(topic));
  key=filtered[getSeed(today+topic)%filtered.length];
  store[topic]={date:today,key};
  localStorage.setItem("topicDaily",JSON.stringify(store));
 }

 update("Daily Bible Verse - "+topic);
}

/* UPDATE */
function update(title){
 const text=verses[translation][key];
 if(!text) return;

 const words=text.split(" ");
 document.getElementById("title").innerText=title;
 document.getElementById("verse").innerHTML=
  words.map(w=>`<span class="word">${w}</span>`).join(" ");
 document.getElementById("ref").innerText=key;
 document.getElementById("date").innerText=new Date().toDateString();
}

/* SHARE */
async function shareVerse(){
 const canvas=document.createElement("canvas");
 canvas.width=1080;canvas.height=1080;
 const ctx=canvas.getContext("2d");

 ctx.fillStyle="#000";ctx.fillRect(0,0,1080,1080);

 ctx.fillStyle="rgba(255,255,255,0.08)";
 ctx.fillRect(140,260,800,500);

 ctx.fillStyle="#fff";
 ctx.font="40px Arial";
 wrapText(ctx,verses[translation][key],540,400,600,50);

 ctx.fillStyle="#108cd7";
 ctx.fillText(key,540,650);

 const logo=new Image();
 logo.src="logo.svg";

 await new Promise(r=>logo.onload=r);

 ctx.drawImage(logo,60,860,120,120);

 ctx.fillStyle="rgba(255,255,255,.7)";
 ctx.fillText("tapnpray.github.io",60,1020);

 canvas.toBlob(blob=>{
  const file=new File([blob],"tapnpray.png",{type:"image/png"});
  navigator.share?.({files:[file]});
 });
}

/* HELPERS */
function wrapText(ctx,text,x,y,maxWidth,lineHeight){
 let words=text.split(" "),line="";
 for(let n=0;n<words.length;n++){
  let test=line+words[n]+" ";
  if(ctx.measureText(test).width>maxWidth){
   ctx.fillText(line,x,y);
   line=words[n]+" ";y+=lineHeight;
  }else line=test;
 }
 ctx.fillText(line,x,y);
}

/* AUDIO */
let ambientOn=false;
function toggleAmbient(){
 const a=document.getElementById("ambientAudio");
 if(ambientOn){a.pause();a.currentTime=0;}
 else{a.volume=0.3;a.play();}
 ambientOn=!ambientOn;
}

/* READ */
function readVerse(){
 const words=document.querySelectorAll(".word");
 words.forEach(w=>w.classList.remove("active"));

 let i=0;
 const utter=new SpeechSynthesisUtterance(verses[translation][key]+" "+key);

 utter.onboundary=e=>{
  if(e.name==="word"&&words[i]){
   words[i].classList.add("active");i++;
  }
 };

 speechSynthesis.cancel();
 speechSynthesis.speak(utter);
}

/* FAVORITES */
function getFavs(){return JSON.parse(localStorage.getItem("favs")||"[]");}
function toggleFavorite(){
 let f=getFavs();
 f.includes(key)?f=f.filter(x=>x!==key):f.push(key);
 localStorage.setItem("favs",JSON.stringify(f));
}
function openFavorites(){
 let c=document.getElementById("favoritesContent");
 c.innerHTML="<h2>Saved</h2>";
 getFavs().forEach(ref=>{
  c.innerHTML+=`<div class="favorite-item"><b>${ref}</b><br>${verses[translation][ref]}
  <br><button onclick="removeFav('${ref}')">Delete</button></div>`;
 });
 document.getElementById("favoritesModal").style.display="block";
}
function removeFav(ref){
 let f=getFavs().filter(x=>x!==ref);
 localStorage.setItem("favs",JSON.stringify(f));
 openFavorites();
}
function closeFavorites(e){
 if(e.target.id==="favoritesModal")
 document.getElementById("favoritesModal").style.display="none";
}

/* UTIL */
function copyVerse(){
 navigator.clipboard.writeText(verses[translation][key]+" — "+key);
}
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

/* INIT */
async function init(){
 await loadTranslation("nlt");
 await loadTranslation("niv");
 await loadTranslation("kjv");

 document.getElementById("translationSelect").onchange=(e)=>{
  translation=e.target.value;
  update(document.getElementById("title").innerText);
 };

 generateDaily();
}

init();

</script>

</body>
</html>
