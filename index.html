<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  color: #fff;
  padding-bottom: env(safe-area-inset-bottom);
  padding-top: env(safe-area-inset-top);
}

/* BACKGROUND (dimmer + smoother) */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-size: cover;
  background-position: center;
  background-image: var(--bg-image);
  filter: brightness(calc(var(--brightness) * 0.55)) blur(3px);
  transform: scale(1.05);
  transition: filter 1s ease;
  z-index: -1;
}

/* TOP LOGO */
#topLogo {
  width: 120px;
  margin: 20px auto 10px;
  display: block;
  z-index: 10;
  position: relative;
}

/* CENTER LAYOUT */
.center {
  min-height: calc(100vh - 180px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* FROSTED GLASS VERSE BOX */
#votd {
  position: relative;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(25px) brightness(0.9);
  border-radius: 28px;
  padding: 24px;
  max-width: 700px;
  width: 100%;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  text-align: center;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ICONS */
#readIcon, #ambientToggle {
  position: absolute;
  top: 12px;
  font-size: 26px;
  padding: 8px;
  cursor: pointer;
}

#readIcon { left: 12px; }
#ambientToggle { right: 12px; }

#ambientToggle.active { color: #7CFFB2; }

/* TEXT */
#title { font-size: 15px; margin-top: 6px; }
#date, #ref { color: #108cd7; font-size: 14px; }

#verse {
  margin-top: 10px;
  font-size: clamp(22px, 5vw, 32px);
  line-height: 1.7;
  overflow-y: auto;
  cursor: pointer;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

.word { opacity: .35; }
.word.active { opacity: 1; }

/* CONTROLS */
.translation-select {
  margin-top: 8px;
  border-radius: 999px;
  background: rgba(255,255,255,.15);
  color: #fff;
  border: none;
  padding: 4px 10px;
}

.mode-buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.mode-buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 999px;
  border: none;
  background: rgba(255,255,255,.15);
  color: #fff;
}

.mode-buttons button.active { background: #108cd7; }

.actions { margin-top: 10px; }

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 999px;
  background: #108cd7;
  color: #fff;
}

/* STREAK */
#streak {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.6);
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
}

/* MODAL */
#streakModal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,.95);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow-y: auto;
  padding: 20px;
}

.badges {
  display: flex;
  gap: 15px;
  margin: 20px;
}

.badge { opacity: .3; font-size: 28px; }
.badge.active { opacity: 1; }

.progress {
  width: 80%;
  height: 10px;
  background: rgba(255,255,255,.2);
  border-radius: 999px;
}

.progress div {
  height: 100%;
  background: #108cd7;
}
</style>
</head>

<body>

<!-- TOP LOGO (never overlaps verse box) -->
<img id="topLogo" src="logo.svg" alt="Tap N Pray Logo">

<div class="center">
  <div id="votd">

    <div id="readIcon" onclick="readVerse()">🔊</div>
    <div id="ambientToggle" onclick="toggleAmbient()">🌿</div>

    <div id="title">Daily Bible Verse</div>
    <div id="date"></div>
    <div id="verse" onclick="readVerse()"></div>
    <div id="ref"></div>

    <select id="translationSelect" class="translation-select" onchange="changeTranslation(this.value)">
      <option value="nlt">NLT</option>
      <option value="niv">NIV</option>
      <option value="kjv">KJV</option>
    </select>

    <div class="mode-buttons">
      <button id="dailyBtn" class="active" onclick="showDaily()">Daily</button>
      <button id="randomBtn" onclick="showRandom()">Random</button>
    </div>

    <div class="actions">
      <button class="btn" onclick="shareVerse()">Share</button>
    </div>

  </div>
</div>

<div id="streak" onclick="openStreak()"></div>

<div id="streakModal" onclick="closeStreak(event)">
  <h1 id="streakCount"></h1>
  <div id="streakMsg"></div>

  <div class="badges">
    <span class="badge" id="b7">🌿</span>
    <span class="badge" id="b30">🔥</span>
    <span class="badge" id="b100">👑</span>
  </div>

  <div class="progress"><div id="progressBar"></div></div>
</div>

<audio id="ambientAudio" loop src="/sounds/calm.mp3"></audio>

<script>
/* BACKGROUND */
const bgSets = {
  morning: ["/backgrounds/morning1.png","/backgrounds/morning2.png"],
  day: ["/backgrounds/day1.png","/backgrounds/day2.png"],
  evening: ["/backgrounds/evening1.png","/backgrounds/evening2.png"],
  night: ["/backgrounds/night1.png","/backgrounds/night2.png"]
};

let currentBackground = "";
let currentBrightness = 1.0;

function getTimeBlock() {
  const h = new Date().getHours();
  if (h < 11) return "morning";
  if (h < 17) return "day";
  if (h < 21) return "evening";
  return "night";
}

function updateBackground() {
  const block = getTimeBlock();
  const set = bgSets[block];
  const img = set[Math.floor(Math.random() * set.length)];
  currentBackground = img;

  const brightness = (block === "night" || block === "evening") ? 0.75 : 1.0;
  currentBrightness = brightness;

  document.body.style.setProperty('--bg-image', `url('${img}')`);
  document.body.style.setProperty('--brightness', brightness);
}

updateBackground();

/* VERSES */
let verses = { nlt:{}, niv:{}, kjv:{} };
let translation = "nlt", dailyKey = "", currentKey = "";

async function loadTranslation(t) {
  try {
    const res = await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    if (!res.ok) return;
    const data = await res.json();

    Object.entries(data).forEach(([book, chapters]) => {
      Object.entries(chapters).forEach(([chapter, versesObj]) => {
        Object.entries(versesObj).forEach(([v, text]) => {
          verses[t][`${book} ${chapter}:${v}`] = text;
        });
      });
    });
  } catch {}
}

function getSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = (h << 5) - h + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function generateDaily() {
  const today = new Date().toDateString();
  const stored = JSON.parse(localStorage.getItem("dailyVerse") || "{}");

  if (stored.date === today) {
    dailyKey = stored.key;
  } else {
    const keys = Object.keys(verses.nlt);
    if (!keys.length) return;
    dailyKey = keys[getSeed(today) % keys.length];
    localStorage.setItem("dailyVerse", JSON.stringify({ date: today, key: dailyKey }));
  }

  currentKey = dailyKey;
  update("Daily Bible Verse");
  updateStreak();
}

function showDaily() {
  currentKey = dailyKey;
  update("Daily Bible Verse");
  dailyBtn.classList.add("active");
  randomBtn.classList.remove("active");
}

function showRandom() {
  const keys = Object.keys(verses[translation]);
  if (!keys.length) return;
  currentKey = keys[Math.floor(Math.random() * keys.length)];
  update("Random Bible Verse");
  dailyBtn.classList.remove("active");
  randomBtn.classList.add("active");
}

function changeTranslation(t) {
  translation = t;
  if (!verses[translation][currentKey]) {
    const keys = Object.keys(verses[translation]);
    if (!keys.length) return;
    currentKey = keys[0];
  }
  update(dailyBtn.classList.contains("active") ? "Daily Bible Verse" : "Random Bible Verse");
}

function update(titleText) {
  const text = verses[translation][currentKey];
  if (!text) return;
  title.innerText = titleText;
  verse.innerHTML = text.split(" ").map(w => `<span class="word">${w}</span>`).join(" ");
  ref.innerText = currentKey;
  date.innerText = new Date().toDateString();
}

/* STREAK SYSTEM */
function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = localStorage.getItem("lastVisit");
  let streak = parseInt(localStorage.getItem("streak")) || 1;

  if (lastVisit) {
    const last = new Date(lastVisit);
    const now = new Date(today);
    const diff = Math.floor((now - last) / 86400000);

    if (diff === 1) streak++;
    else if (diff > 1) streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastVisit", today);

  streakEl.innerText = "🔥 " + streak + " Day Streak";
  streakCount.innerText = streak + " Days";

  b7.classList.toggle("active", streak >= 7);
  b30.classList.toggle("active", streak >= 30);
  b100.classList.toggle("active", streak >= 100);

  progressBar.style.width = Math.min(100, streak) + "%";
}

function openStreak() { streakModal.style.display = "flex"; }
function closeStreak(e) { if (e.target === e.currentTarget) streakModal.style.display = "none"; }

/* READ */
function readVerse() {
  const words = document.querySelectorAll(".word");
  words.forEach(w => w.classList.remove("active"));
  let i = 0;

  const text = verses[translation][currentKey];
  if (!text) return;

  const u = new SpeechSynthesisUtterance(text + " " + currentKey);
  u.onboundary = () => { if (words[i]) words[i++].classList.add("active"); };

  try { speechSynthesis.cancel(); speechSynthesis.speak(u); } catch {}
}

/* AMBIENT */
let ambientOn = false;

function toggleAmbient() {
  const a = ambientAudio;
  if (ambientOn) fadeOut(a);
  else { a.volume = 0; a.play().catch(()=>{}); fadeIn(a); }
  ambientOn = !ambientOn;
  ambientToggle.classList.toggle("active");
}

function fadeIn(a) {
  let v = 0;
  const i = setInterval(() => {
    v += .05;
    if (v >= .3) { v = .3; clearInterval(i); }
    a.volume = v;
  }, 100);
}

function fadeOut(a) {
  let v = a.volume;
  const i = setInterval(() => {
    v -= .05;
    if (v <= 0) { clearInterval(i); a.pause(); a.currentTime = 0; }
    a.volume = v;
  }, 100);
}

/* PREMIUM SHARE ENGINE (same as before, unchanged) */
/* ——— (Your existing premium share code goes here unchanged) ——— */

(async () => {
  await loadTranslation("nlt");
  await loadTranslation("niv");
  await loadTranslation("kjv");
  generateDaily();
})();
</script>

</body>
</html>
