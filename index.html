<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap N Pray</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#108cd7">
<link rel="manifest" href="manifest.json">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ELQ3E5WGCT"></script>
<script>
window.dataLayer=[];function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-ELQ3E5WGCT');
</script>

<style>
html,body{
 height:100%;margin:0;overflow:hidden;
 font-family:Inter,sans-serif;color:#fff;
 background-size:cover;background-position:center;
}
body::before{
 content:"";position:fixed;width:100%;height:100%;
 background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.8));
 z-index:-2;
}
body::after{
 content:"";position:fixed;width:100%;height:100%;
 backdrop-filter:blur(10px);z-index:-1;
}

/* HEADER */
.logo-container{
 position:fixed;top:10px;left:50%;
 transform:translateX(-50%);
 text-align:center;
}
.logo-container img{max-width:100px;}
.tagline{font-size:11px;opacity:.8}

/* MAIN */
.center{
 height:100%;
 display:flex;flex-direction:column;
 align-items:center;
 padding-top:140px;
 padding-bottom:140px;
}

/* CARD */
#votd{
 position:relative;
 background:rgba(0,0,0,.7);
 border-radius:24px;
 padding:30px 22px;
 width:92%;max-width:520px;
 backdrop-filter:blur(20px);
 display:flex;flex-direction:column;
 align-items:center;gap:14px;
}

/* SOUND ICON */
#soundIcon{
 position:absolute;top:14px;right:16px;
 cursor:pointer;
}

/* TEXT */
#date{color:#108cd7;font-size:14px;}
#verse{
 font-size:clamp(26px,6vw,36px);
 text-align:center;line-height:1.6;
}
#ref{color:#108cd7}

/* BUTTONS */
.actions{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;width:100%;max-width:320px;
}
.btn{
 padding:14px;border-radius:999px;
 border:none;background:rgba(255,255,255,.15);
 color:#fff;cursor:pointer;
}
.primary{background:#108cd7}

/* STREAK */
#streak{
 position:fixed;bottom:18px;
 left:50%;transform:translateX(-50%);
 background:rgba(0,0,0,.5);
 padding:6px 14px;border-radius:999px;
}

/* INSTALL OVERLAY */
.install-overlay{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:rgba(0,0,0,0.95);
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
 padding:20px;
 z-index:9999;
}

.install-overlay h2{margin-bottom:20px;}
.install-overlay p{margin-bottom:15px;font-size:16px;}
.install-overlay .arrow{
 font-size:40px;
 margin:15px 0;
 animation:bounce 1.5s infinite;
}
@keyframes bounce{
 0%,100%{transform:translateY(0);}
 50%{transform:translateY(-10px);}
}

.install-overlay button{
 margin-top:20px;
 padding:12px 22px;
 border:none;
 border-radius:999px;
 background:#108cd7;
 color:#fff;
}
</style>
</head>

<body>

<div class="logo-container">
<img src="logo.svg">
<div class="tagline">One Tap Closer to Christ</div>
</div>

<div class="center">
<div id="votd">

<div id="soundIcon" onclick="toggleSound()">🎧</div>

<div id="date"></div>
<div id="verse">Loading...</div>
<div id="ref"></div>

<select id="translationSelect"></select>

<div class="actions">
<button class="btn primary" onclick="playVerse()">Listen</button>
<button class="btn" onclick="copyVerse()">Copy</button>
<button class="btn" onclick="shareVerse()">Share</button>
<button class="btn" onclick="donate()">💙 Support</button>
</div>

</div>
</div>

<div id="streak"></div>

<audio id="ambientAudio" loop>
<source src="sounds/calm.mp3">
</audio>

<script>

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('/sw.js');
}

/* BACKGROUND */
const backgrounds=["backgrounds/morning1.png","backgrounds/morning2.png","backgrounds/day1.png"];
let i=0;
function setBG(n){document.body.style.backgroundImage=`url('${backgrounds[n]}')`;}
setBG(i);
setInterval(()=>{i=(i+1)%backgrounds.length;setBG(i);},60000);

/* VERSES */
let verses={kjv:{},niv:{},nlt:{}};
let key="",translation="nlt";

async function loadTranslation(t){
 if(Object.keys(verses[t]).length)return;
 const res=await fetch(`https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
 const data=await res.json();
 let flat={};
 for(let b in data)
  for(let c in data[b])
   for(let v in data[b][c])
    flat[`${b} ${c}:${v}`]=data[b][c][v];
 verses[t]=flat;
}

function seed(len){
 const d=new Date();
 return (d.getFullYear()*10000+d.getMonth()*100+d.getDate())%len;
}

async function init(){
 await loadTranslation("nlt");
 const keys=Object.keys(verses.nlt);
 key=keys[seed(keys.length)];
 setupTranslations();
 update();
 streak();
 maybeShowInstall();
}

/* TRANSLATION */
function setupTranslations(){
 const s=document.getElementById("translationSelect");
 ["kjv","niv","nlt"].forEach(t=>{
  let o=document.createElement("option");
  o.value=t;o.textContent=t.toUpperCase();
  if(t==="nlt")o.selected=true;
  s.appendChild(o);
 });
 s.onchange=async e=>{
  translation=e.target.value;
  await loadTranslation(translation);
  update();
 };
}

/* UPDATE */
function update(){
 document.getElementById("verse").innerText=verses[translation][key];
 document.getElementById("ref").innerHTML=`<span style="color:#108cd7">${key}</span> (${translation.toUpperCase()})`;
 document.getElementById("date").innerText=new Date().toDateString();
}

/* SOUND */
let sound=false;
function toggleSound(){
 const a=document.getElementById("ambientAudio");
 const icon=document.getElementById("soundIcon");
 if(!sound){a.volume=0;a.play();a.volume=.35;icon.innerText="🔊";sound=true;}
 else{a.pause();icon.innerText="🎧";sound=false;}
}

/* SHARE */
function shareVerse(){
 navigator.share?.({
  text:verses[translation][key]+" — "+key
 });
}

/* OTHER */
function playVerse(){speechSynthesis.speak(new SpeechSynthesisUtterance(verses[translation][key]));}
function copyVerse(){navigator.clipboard.writeText(verses[translation][key]+" — "+key);}
function donate(){window.open("https://venmo.com/u/tapnpray");}

/* STREAK */
function streak(){
 let s=parseInt(localStorage.getItem("s"))||0;
 let l=localStorage.getItem("l");
 let t=new Date().toDateString();
 if(l!==t){s++;localStorage.setItem("s",s);localStorage.setItem("l",t);}
 document.getElementById("streak").innerText="🔥 Tap Streak: "+s;
}

/* INSTALL UX */
function isIOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent);}
function isAndroid(){return /android/i.test(navigator.userAgent);}

function maybeShowInstall(){
 if(localStorage.getItem("installed")) return;

 setTimeout(()=>{
  if(isIOS()) showIOSInstall();
  else if(isAndroid()) showAndroidInstall();
 },3000);
}

function showIOSInstall(){
 createOverlay(`
 <h2>Install Tap N Pray</h2>
 <p>Tap the <b>browser Share button</b></p>
 <div class="arrow">⬆️</div>
 <p>Then tap <b>Add to Home Screen</b></p>
 `);
}

function showAndroidInstall(){
 createOverlay(`
 <h2>Install Tap N Pray</h2>
 <p>Add this app to your home screen</p>
 <button onclick="installApp()">Install</button>
 `);
}

function createOverlay(content){
 const d=document.createElement("div");
 d.className="install-overlay";
 d.innerHTML=content + `<button onclick="this.parentElement.remove()">Continue</button>`;
 document.body.appendChild(d);
}

let deferredPrompt;
window.addEventListener("beforeinstallprompt",(e)=>{
 e.preventDefault();
 deferredPrompt=e;
});

async function installApp(){
 if(!deferredPrompt)return;
 deferredPrompt.prompt();
 await deferredPrompt.userChoice;
 localStorage.setItem("installed","true");
}
window.onload=init;

</script>

</body>
</html>
