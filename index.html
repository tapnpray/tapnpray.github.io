<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verse of the Day</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* --- GLOBAL STYLES --- */
body {
    margin:0;
    font-family:Arial,sans-serif;
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100vh;
    text-align:center;

    /* Smooth fade-in */
    opacity:0;
    animation:bgFadeIn 1.5s ease forwards;
}

@keyframes bgFadeIn {
    from { opacity:0; }
    to { opacity:1; }
}

/* Background gradient overlay */
body::before {
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.55));
    z-index:-2;
}

/* Background blur layer */
body::after {
    content:"";
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    backdrop-filter: blur(4px);
    z-index:-1;
}

/* --- LOGO (STATIC, UNALTERED SVG) --- */
.logo-container {margin-top:15px;}
.logo-container img {
    max-width:260px;
    width:70%;
}

/* --- TAGLINE --- */
.tagline {
    margin-top:10px;
    color:white;
    font-weight:bold;
    font-size:clamp(14px,4vw,18px);
    text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

/* --- MAIN CONTENT --- */
.center-container {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    width:100%;
    padding:10px;
}

#votd-header {
    color:white;
    font-weight:bold;
    font-size:clamp(18px,5vw,26px);
    margin-bottom:12px;
    text-shadow:0 2px 6px rgba(0,0,0,0.7);
}

/* Verse box with glow + blur */
#votd-container {
    font-size:clamp(22px,6.5vw,34px);
    font-weight:bold;
    line-height:1.5;
    color:white;
    background:rgba(0,0,0,0.55);
    padding:22px;
    border-radius:16px;
    max-width:92%;
    max-height:65vh;
    overflow:auto;

    /* Glow */
    box-shadow:
        0 0 25px rgba(255,255,255,0.25),
        0 0 60px rgba(255,255,255,0.15);

    /* Blur behind verse box */
    backdrop-filter: blur(6px);

    opacity:0;
    transform:translateY(10px);
    transition:opacity .6s ease, transform .6s ease;
}
#votd-container.show {
    opacity:1;
    transform:translateY(0);
}

#verse-ref {
    margin-top:12px;
    font-size:0.7em;
    opacity:0.85;
}

/* --- BUTTONS --- */
.btn {
    margin-top:12px;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#4db8ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:background .2s;
}
.btn:hover {background:#3399dd;}

.action-buttons {
    margin-top:10px;
    display:flex;
    gap:10px;
    justify-content:center;
}

.translation {
    margin-top:10px;
    color:white;
    font-size:14px;
}

/* --- TAP COUNTER --- */
#tap-counter {
    color:white;
    margin-top:20px;
    font-size:14px;
    opacity:0.8;
}

/* --- CROSS PULSE LOADER --- */
#voice-status {
    margin-top:12px;
    color:white;
    font-size:14px;
}

.cross {
    font-size:22px;
    color:white;
    animation:pulse 1.4s infinite ease-in-out;
    text-shadow:0 0 8px rgba(255,255,255,0.7);
    margin-bottom:6px;
    transition:opacity 0.6s ease;
}

@keyframes pulse {
    0% { opacity:0.4; transform:scale(1); }
    50% { opacity:1; transform:scale(1.15); }
    100% { opacity:0.4; transform:scale(1); }
}

/* --- MOBILE --- */
@media (max-width:480px) {
    .logo-container img {max-width:200px;}
}
</style>
</head>
<body>

<!-- LOGO -->
<div class="logo-container">
    <img src="logo.svg" alt="Logo">
    <div class="tagline">One Tap Closer to Christ</div>
</div>

<!-- MAIN CONTENT -->
<div class="center-container">
    <div id="votd-header">
        Verse of the Day - <span id="todays-date"></span>
    </div>

    <div id="votd-container">
        <div id="verse-text">Loading daily verse...</div>
        <div id="verse-ref"></div>
    </div>

    <div class="translation">
        Translation:
        <select onchange="changeTranslation(this.value)">
            <option value="kjv">KJV</option>
            <option value="niv">NIV</option>
            <option value="nlt">NLT</option>
        </select>
    </div>

    <div class="action-buttons">
        <button class="btn" onclick="readVerse()">Read</button>
        <button class="btn" onclick="copyVerse()">Copy</button>
        <button class="btn" onclick="shareVerse()">Share</button>
    </div>

    <div id="tap-counter">Total taps: Loading...</div>

    <!-- CROSS PULSE LOADER -->
    <div id="voice-status">
        <div class="cross">✝</div>
        Voice loading…
    </div>
</div>

<!-- VITS TTS LIBRARY -->
<script type="module">
    import * as tts from "https://cdn.jsdelivr.net/npm/@diffusionstudio/vits-web/dist/index.js";
    window.vits = tts;
</script>

<script>
/* ------------------------------
   BACKGROUND ROTATION
--------------------------------*/
const backgrounds = [
  "backgrounds/background.jpg",
  "backgrounds/cloud1.png",
  "backgrounds/cloud2.png",
  "backgrounds/cloud3.png",
  "backgrounds/cloud4.png",
  "backgrounds/cloud5.png",
  "backgrounds/sunrise1.jpg",
  "backgrounds/sunrise2.jpg",
  "backgrounds/sunrise3.jpg",
  "backgrounds/sunrise4.jpg",
  "backgrounds/sunrise5.jpg"
];

document.body.style.backgroundImage =
    `url('${backgrounds[Math.floor(Math.random() * backgrounds.length)]}')`;

/* ------------------------------
   VERSE SYSTEM
--------------------------------*/
let verses = { kjv:{}, niv:{}, nlt:{} };
let dailyKey = "";
let translation = "kjv";

function flattenJSON(json){
    let flat = {};
    for (const book in json) {
        const chapters = json[book];
        for (const chapterNum in chapters) {
            const versesObj = chapters[chapterNum];
            for (const verseNum in versesObj) {
                const ref = `${book} ${chapterNum}:${verseNum}`;
                flat[ref] = versesObj[verseNum];
            }
        }
    }
    return flat;
}

async function loadTranslation(trans, url){
    const res = await fetch(url);
    const data = await res.json();
    verses[trans] = flattenJSON(data);
}

function pickDailyVerse(){
    const keys = Object.keys(verses.kjv);
    const date = new Date();
    const seed = date.getFullYear()*10000 + (date.getMonth()+1)*100 + date.getDate();
    dailyKey = keys[seed % keys.length];
}

function displayVerse(){
    document.getElementById("votd-container").classList.add("show");
    document.getElementById("verse-text").innerText =
        verses[translation][dailyKey] || "Verse not available";
    document.getElementById("verse-ref").innerText =
        `${dailyKey} (${translation.toUpperCase()})`;
}

function changeTranslation(val){
    translation = val;
    displayVerse();
}

/* ------------------------------
   NATURAL TTS (VITS)
--------------------------------*/
let voiceReady = false;

async function initTTS() {
    try {
        await vits.download("en_US-hfc_female-medium", (p) => {
            const percent = Math.round(p.loaded * 100 / p.total);
            document.getElementById("voice-status").innerHTML =
                `<div class="cross">✝</div> Voice loading… ${percent}%`;
        });

        voiceReady = true;

        // Dim the cross but keep it visible
        document.getElementById("voice-status").innerHTML =
            `<div class="cross" style="opacity:0.4; animation:none;">✝</div> Voice ready`;

    } catch (err) {
        console.error("TTS init error:", err);
        document.getElementById("voice-status").innerHTML =
            `<div class="cross">✝</div> Voice failed to load`;
    }
}

async function readVerse() {
    const text = verses[translation][dailyKey] + " — " + dailyKey;

    if (!voiceReady) {
        alert("Voice is still loading. Try again in a moment.");
        return;
    }

    try {
        const wav = await vits.predict({
            text,
            voiceId: "en_US-hfc_female-medium"
        });

        const audio = new Audio();
        audio.src = URL.createObjectURL(wav);
        audio.play();
    } catch (err) {
        console.error("TTS error:", err);
    }
}

/* ------------------------------
   COPY + SHARE
--------------------------------*/
function copyVerse(){
    navigator.clipboard.writeText(
        `${verses[translation][dailyKey]} — ${dailyKey}`
    );
    alert("Verse copied!");
}

function shareVerse(){
    if (navigator.share){
        navigator.share({
            title:"Verse of the Day",
            text:`${verses[translation][dailyKey]} — ${dailyKey}`,
            url:"https://tapnpray.github.io"
        });
    } else {
        copyVerse();
    }
}

/* ------------------------------
   DATE
--------------------------------*/
function displayTodaysDate(){
    const today = new Date();
    const options = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById("todays-date").innerText =
        today.toLocaleDateString('en-US', options);
}

/* ------------------------------
   TOTAL TAPS (SIMPLE ANALYTICS)
--------------------------------*/
async function updateTapCounter() {
    try {
        const res = await fetch("https://simpleanalytics.com/tapnpray.github.io.json?version=5");
        const data = await res.json();
        document.getElementById("tap-counter").innerText =
            `Total taps: ${data.pageviews}`;
    } catch (err) {
        console.error("Tap counter error:", err);
        document.getElementById("tap-counter").innerText =
            "Total taps: unavailable";
    }
}

/* ------------------------------
   INIT
--------------------------------*/
async function init(){
    await Promise.all([
        loadTranslation("kjv","https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/KJV/KJV_bible.json"),
        loadTranslation("niv","https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/NIV/NIV_bible.json"),
        loadTranslation("nlt","https://raw.githubusercontent.com/tapnpray/tapnpray.github.io/main/BIBLE/NLT/NLT_bible.json")
    ]);

    pickDailyVerse();
    displayTodaysDate();
    displayVerse();
}

window.addEventListener("load", async () => {
    await init();
    updateTapCounter();
    initTTS(); // load natural voice
});
</script>

<!-- SIMPLE ANALYTICS -->
<script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
<noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt=""></noscript>

</body>
</html>
