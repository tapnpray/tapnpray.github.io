<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verse of the Day</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== FULL SCREEN FLEX ===== */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;

    height:100vh;
    text-align:center;
    overflow:hidden; /* prevents scrolling */
}

/* Gradient overlay for readability but more visible background */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.35));
    z-index:-1;
}

/* ===== LOGO (TOP) ===== */
.logo-container{
    margin-top:15px;
}

.logo-container img{
    max-width:260px;
    width:70%;
    height:auto;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
}

/* ===== CENTER VERSE ===== */
.center-container{
    flex:1; /* takes up all space between top logo and bottom tagline */
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    padding:10px;
}

#votd-container{
    font-size:clamp(20px, 6vw, 32px); /* large for mobile */
    font-weight:bold;
    line-height:1.4;
    color:white;

    background:rgba(0,0,0,0.6); /* semi-transparent for readability */
    padding:20px;
    border-radius:14px;

    max-width:90%;
    max-height:100%;
    overflow:hidden; /* prevents scrolling */
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* Links */
#votd-container a{
    color:#4db8ff;
    text-decoration:none;
}
#votd-container a:hover{
    text-decoration:underline;
}

/* ===== BOTTOM TAGLINE ===== */
.tagline{
    margin-bottom:15px;
    color:white;
    font-weight:bold;
    font-size:clamp(14px, 4vw, 18px);
    padding:0 15px;
    text-shadow:0 2px 6px rgba(0,0,0,0.8);
}

/* ===== MOBILE TWEAKS ===== */
@media (max-width:480px){
    .logo-container img{
        max-width:200px;
    }
    #votd-container{
        font-size:clamp(18px, 7vw, 30px); /* really big on small screens */
        padding:16px;
    }
    .tagline{
        font-size:16px;
    }
}
</style>

</head>

<body>

<!-- TOP LOGO -->
<div class="logo-container">
    <img src="logo.png" alt="Logo">
</div>

<!-- CENTER VERSE -->
<div class="center-container">
    <div id="votd-container">
        <script src="https://www.biblegateway.com/votd/votd.write.callback.js"></script>
        <script src="https://www.biblegateway.com/votd/get/?format=json&version=NIV&callback=BG.votdWriteCallback"></script>
    </div>
</div>

<!-- BOTTOM TEXT -->
<div class="tagline">
    One Tap, One Verse, One Step Closer to Jesus.
</div>

<!-- FALLBACK -->
<noscript>
<iframe
src="https://www.biblegateway.com/votd/get/?format=html&version=NIV"
style="width:90%;max-width:700px;height:180px;background:rgba(0,0,0,0.6);border-radius:10px;">
</iframe>
</noscript>

</body>
</html>
