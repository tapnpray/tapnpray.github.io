function getTimeBlock() {
  const h = new Date().getHours();
  if (h < 11) return "morning";
  if (h < 17) return "day";
  if (h < 21) return "evening";
  return "night";
}

function updateBackground() {
  const block = getTimeBlock();
  const set = bgSets[block];
  const img = set[Math.floor(Math.random() * set.length)];
  const brightness = (block === "night" || block === "evening") ? 0.75 : 1.0;

  const preload = new Image();
  preload.src = img;

  preload.onload = () => {
    document.body.style.setProperty('--bg-image', `url('${img}')`);
    document.body.style.setProperty('--brightness', brightness);
    document.body.dataset.block = block;
    currentBackground = img;
    currentBrightness = brightness;
  };
}

updateBackground();

setInterval(() => {

/* =========================

function getEasterDate(year) {
  const f = Math.floor;
  const G = year % 19;
  const C = f(year / 100);
  const H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30;
  const I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11));
  const J = (year + f(year / 4) + I + 2 - C + f(C / 4)) % 7;
  const L = I - J;
  const month = 3 + f((L + 40) / 44);
  const day = L + 28 - 31 * f(month / 4);
  return new Date(year, month - 1, day);
}

function getSeasonalBoosts() {
  const today = new Date();
  const year = today.getFullYear();

  if (today.getMonth() === 11 && today.getDate() >= 20 && today.getDate() <= 26) {
    return ["Luke 2:10", "Isaiah 9:6", "Matthew 1:21"];
  }

  const easter = getEasterDate(year);
  const diffDays = Math.floor((today - easter) / 86400000);

  if (diffDays === 0) return ["Matthew 28:6"];
  if (diffDays === -2) return ["Luke 23:46"];
  if (diffDays >= -3 && diffDays <= 3) return ["John 3:16"];

  return [];
}

function buildWeightedPool() {
  let pool = [];

  curatedVerses.forEach(v => {
    for (let i = 0; i < v.weight; i++) {
      pool.push(v.ref);
    }
  });

  const seasonal = getSeasonalBoosts();
  seasonal.forEach(ref => {
    for (let i = 0; i < 6; i++) {
      pool.push(ref);
    }
  });

  return pool;
}


/* =========================
   VERSES (LOAD + DISPLAY)
========================= */
let verses = { nlt:{}, niv:{}, kjv:{} };
let translation = "nlt";
let dailyKey = "";
let currentKey = "";

async function loadTranslation(t) {
  try {
    const res = await fetch(`/BIBLE/${t.toUpperCase()}/${t.toUpperCase()}_bible.json`);
    if (!res.ok) return;
    const data = await res.json();

    Object.entries(data).forEach(([book, chapters]) => {
      Object.entries(chapters).forEach(([chapter, versesObj]) => {
        Object.entries(versesObj).forEach(([v, text]) => {
          verses[t][`${book} ${chapter}:${v}`] = text;
        });
      });
    });
  } catch {}
}

function getSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = (h << 5) - h + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

const stablePool = buildWeightedPool();

function generateDaily() {
  const today = new Date().toDateString();
  const stored = JSON.parse(localStorage.getItem("dailyVerse") || "{}");

  if (stored.date === today) {
    dailyKey = stored.key;
  } else {
    const keys = stablePool;
    if (!keys.length) return;

    dailyKey = keys[getSeed(today) % keys.length];

    localStorage.setItem("dailyVerse", JSON.stringify({
      date: today,
      key: dailyKey
    }));
  }

  currentKey = dailyKey;
  updateVerse("Daily Bible Verse");
  updateStreak();
}

function showDaily() {
  currentKey = dailyKey;
  updateVerse("Daily Bible Verse");
  dailyBtn.classList.add("active");
  randomBtn.classList.remove("active");
}

function showRandom() {
  const keys = Object.keys(verses[translation]);
  if (!keys.length) return;

  currentKey = keys[Math.floor(Math.random() * keys.length)];
  updateVerse("Random Bible Verse");

  dailyBtn.classList.remove("active");
  randomBtn.classList.add("active");
}

function changeTranslation(t) {
  translation = t;

  // ✅ Highlight active translation button
document.querySelectorAll('.fab-btn[data-t]').forEach(btn => {
  if (btn.dataset.t === t) {
    btn.classList.add('active');
  } else {
    btn.classList.remove('active');
  }
});


  // Keep your existing logic
  if (!verses[translation][currentKey]) {
    currentKey = dailyKey;
  }

  updateVerse(
    dailyBtn.classList.contains("active")
      ? "Daily Bible Verse"
      : "Random Bible Verse"
  );

  // 🔥 Optional polish (recommended)
  fabMenu.classList.remove("open");
}

function updateVerse(titleText) {
  const text = verses[translation][currentKey];
  if (!text) return;

  titleEl.innerText = titleText;

  verseEl.innerHTML = text
    .split(" ")
    .map(w => `<span class="word">${w}</span>`)
    .join(" ");

  refEl.innerText = currentKey;
  dateEl.innerText = new Date().toDateString();
}

/* =========================
   STREAK SYSTEM
========================= */
function updateStreak() {
  const today = new Date().toDateString();
  const lastVisit = localStorage.getItem("lastVisit");
  let streak = parseInt(localStorage.getItem("streak")) || 1;

  if (lastVisit) {
    const last = new Date(lastVisit);
    const now = new Date(today);
    const diff = Math.floor((now - last) / 86400000);

    if (diff === 1) streak++;
    else if (diff > 1) streak = 1;
  }

  localStorage.setItem("streak", streak);
  localStorage.setItem("lastVisit", today);

  streakEl.innerText = "🔥 " + streak + " Day Streak";
  streakCount.innerText = streak + " Days";

  if (streak < 7) {
    streakMsg.innerText = "Keep going — 7 days is your next milestone 🌿";
  } else if (streak < 30) {
    streakMsg.innerText = "You're on fire — 30 days is next 🔥";
  } else if (streak < 100) {
    streakMsg.innerText = "Stay strong — 100 days is next 👑";
  } else {
    streakMsg.innerText = "You're building something powerful 💪";
  }

  b7.classList.toggle("active", streak >= 7);
  b30.classList.toggle("active", streak >= 30);
  b100.classList.toggle("active", streak >= 100);

  let goal = 7;
  if (streak >= 7) goal = 30;
  if (streak >= 30) goal = 100;

  const progress = (streak / goal) * 100;
  progressBar.style.width = Math.min(progress, 100) + "%";
}

  const words = document.querySelectorAll(".word");
  words.forEach(w => w.classList.remove("active"));

  let i = 0;
  const text = verses[translation][currentKey];
  if (!text) return;

  const u = new SpeechSynthesisUtterance(text + " " + currentKey);

  u.rate = 0.95;
  u.pitch = 1;

  u.onboundary = () => {
    if (words[i]) words[i++].classList.add("active");
  };

  speechSynthesis.cancel();
  setTimeout(() => speechSynthesis.speak(u), 100);
}

/* =========================
   AMBIENT SOUND
========================= */
let ambientOn = false;

function toggleAmbient() {
  const a = ambientAudio;

  if (ambientOn) {
    fadeOut(a);
  } else {
    a.volume = 0;
    a.play().catch(()=>{});
    fadeIn(a);
  }

  ambientOn = !ambientOn;
}

function fadeIn(a) {
  let v = 0;
  const i = setInterval(() => {
    v += 0.05;
    if (v >= 0.3) { v = 0.3; clearInterval(i); }
    a.volume = v;
  }, 100);
}

function fadeOut(a) {
  let v = a.volume;
  const i = setInterval(() => {
    v -= 0.05;
    if (v <= 0) {
      clearInterval(i);
      a.pause();
      a.currentTime = 0;
    }
    a.volume = v;
  }, 100);
}

/* =========================
   SHARE (FULL CANVAS SYSTEM)
========================= */
async function shareVerse() {
  try {
    await document.fonts.load("700 48px Merriweather");

    const verseText = verses[translation][currentKey];
    if (!verseText) return;

    const canvas = document.createElement("canvas");
    canvas.width = 1080;
    canvas.height = 1080;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#111";
    ctx.fillRect(0,0,1080,1080);

    ctx.fillStyle = "#fff";
    ctx.font = "700 40px Merriweather";
    ctx.textAlign = "center";

    const words = verseText.split(" ");
    let line = "";
    let y = 400;

    words.forEach(word => {
      const test = line + word + " ";
      if (ctx.measureText(test).width > 800) {
        ctx.fillText(line, 540, y);
        line = word + " ";
        y += 60;
      } else {
        line = test;
      }
    });

    ctx.fillText(line, 540, y);
    ctx.fillText(currentKey, 540, y + 80);

    const blob = await new Promise(res => canvas.toBlob(res));
    const file = new File([blob], "verse.png", { type: "image/png" });

    if (navigator.share && navigator.canShare?.({ files: [file] })) {
      await navigator.share({ files: [file] });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "verse.png";
      a.click();
    }

  } catch (e) {
    console.error(e);
  }
}

/* =========================
   EVENTS
========================= */
verseEl.addEventListener("click", readVerse);
ambientToggle.addEventListener("click", toggleAmbient);
dailyBtn.addEventListener("click", showDaily);
randomBtn.addEventListener("click", showRandom);
shareBtn.addEventListener("click", shareVerse);

streakEl.addEventListener("click", openStreak);
helpIcon.addEventListener("click", openHelp);
donateIcon.addEventListener("click", goDonate);

   INIT
========================= */
(async () => {
  await loadTranslation("nlt");
  await loadTranslation("niv");
  await loadTranslation("kjv");

  generateDaily();

  // ✅ Set default translation + activate UI
  changeTranslation("nlt");

  // ✅ Tap hint animation
  const hint = document.getElementById("tapHintBubble");
  setTimeout(() => hint.classList.add("show"), 600);
  setTimeout(() => hint.classList.remove("show"), 5600);
})();
</script>
